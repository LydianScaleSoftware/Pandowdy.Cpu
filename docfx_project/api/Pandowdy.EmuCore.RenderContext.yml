  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Context for rendering a single video frame, containing frame buffer, memory access, and system status.
  remarks: >-
    <p>

    <strong>One-Shot Lifetime:</strong> A RenderContext is valid only until it is committed via

    <xref href="Pandowdy.EmuCore.Interfaces.IFrameGenerator.RenderFrame(Pandowdy.EmuCore.RenderContext)" data-throw-if-not-resolved="false"></xref>. After commit, the context is automatically invalidated

    and attempting to use it will throw <xref href="System.InvalidOperationException" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    <strong>Usage Pattern:</strong>


    <pre><code class="lang-csharp">var context = frameGenerator.AllocateRenderContext();  // Valid

    frameGenerator.RenderFrame(context);                    // Commits and invalidates

    // context is now invalid - do not reuse!</code></pre>

    </p>

    <p>

    <strong>Reference Type:</strong> RenderContext is a class (reference type), so invalidation state

    is naturally shared across all references to the same instance.

    </p>

    <p>

    <strong>Thread Safety:</strong> Not thread-safe. A context should be used by a single thread

    from allocation through commit.

    </p>
