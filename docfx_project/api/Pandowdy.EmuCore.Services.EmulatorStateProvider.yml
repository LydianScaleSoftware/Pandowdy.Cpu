  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Services
  summary: Reactive provider for emulator execution state, using a BehaviorSubject to publish state changes.
  remarks: >-
    <p>

    <strong>Implementation:</strong> Uses <xref href="System.Reactive.Subjects.BehaviorSubject%601" data-throw-if-not-resolved="false"></xref> 

    to maintain the current state and broadcast updates to all subscribers. The BehaviorSubject

    guarantees that new subscribers immediately receive the most recent state.

    </p>

    <p>

    <strong>Thread Safety:</strong> BehaviorSubject is thread-safe for publishing and subscribing.

    Multiple threads can safely call <xref href="Pandowdy.EmuCore.Services.EmulatorStateProvider.Update(Pandowdy.EmuCore.Services.StateSnapshot)" data-throw-if-not-resolved="false"></xref> and subscribe to <xref href="Pandowdy.EmuCore.Services.EmulatorStateProvider.Stream" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    <strong>Initial State:</strong> Initialized with a default snapshot (PC=0, SP=0, Cycles=0, not running).

    </p>

    <p>

    <strong>Control Methods:</strong> RequestPause(), RequestContinue(), and RequestStep() are currently

    placeholders. These will be implemented when the execution control loop is integrated with this provider.

    </p>
  example: []
  syntax:
    content: 'public sealed class EmulatorStateProvider : IEmulatorState'
    content.vb: Public NotInheritable Class EmulatorStateProvider Implements IEmulatorState
