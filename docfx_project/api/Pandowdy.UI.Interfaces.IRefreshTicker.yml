  name: Stream
  nameWithType: IRefreshTicker.Stream
  fullName: Pandowdy.UI.Interfaces.IRefreshTicker.Stream
  type: Property
  source:
    remote:
      path: Pandowdy.UI/Interfaces/IRefreshTicker.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: Stream
    path: ../Pandowdy.UI/Interfaces/IRefreshTicker.cs
    startLine: 52
  assemblies:
  - Pandowdy.UI
  namespace: Pandowdy.UI.Interfaces
  summary: Gets an observable stream that emits timestamps at approximately 60 Hz.
  remarks: >-
    The stream emits approximately 60 times per second when the ticker is running.

    Each emission provides the current <xref href="System.DateTime" data-throw-if-not-resolved="false"></xref> at the time of the tick,

    which can be used for time-based calculations or simply as a signal to perform

    periodic work.

    <p>

    Typical usage pattern:

    <pre><code class="lang-csharp">ticker.Stream
        .ObserveOn(RxApp.MainThreadScheduler)
        .Subscribe(_ =&gt; RenderFrame());</code></pre>
    </p>

    <p>

    The actual timing may vary slightly based on system load and UI thread scheduling,

    but should maintain an average rate close to 60 Hz for smooth animation.

    </p>
  example: []
  syntax:
    content: IObservable<DateTime> Stream { get; }
    parameters: []
    return:
      type: System.IObservable{System.DateTime}
      description: >-
        An <xref href="System.IObservable%601" data-throw-if-not-resolved="false"></xref> that emits the current timestamp each time

        the ticker fires. Subscribers can observe this stream to receive periodic

        notifications for driving frame updates.
    content.vb: ReadOnly Property Stream As IObservable(Of Date)
  overload: Pandowdy.UI.Interfaces.IRefreshTicker.Stream*
- uid: Pandowdy.UI.Interfaces.IRefreshTicker.Start
