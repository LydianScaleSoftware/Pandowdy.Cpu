  source:
    remote:
      path: Pandowdy.UI/Interfaces/IRefreshTicker.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: Start
    path: ../Pandowdy.UI/Interfaces/IRefreshTicker.cs
    startLine: 65
  assemblies:
  - Pandowdy.UI
  namespace: Pandowdy.UI.Interfaces
  summary: Starts the refresh ticker, causing it to begin emitting periodic signals.
  remarks: >-
    After calling this method, the <xref href="Pandowdy.UI.Interfaces.IRefreshTicker.Stream" data-throw-if-not-resolved="false"></xref> will begin emitting timestamps

    at approximately 60 Hz. This method is typically called when the emulator starts

    running or when the UI becomes visible and ready to display frames.

    <p>

    Calling <xref href="Pandowdy.UI.Interfaces.IRefreshTicker.Start" data-throw-if-not-resolved="false"></xref> on an already-running ticker should be safe (idempotent).

    </p>
  example: []
  syntax:
    content: void Start()
    content.vb: Sub Start()
  overload: Pandowdy.UI.Interfaces.IRefreshTicker.Start*
- uid: Pandowdy.UI.Interfaces.IRefreshTicker.Stop
  commentId: M:Pandowdy.UI.Interfaces.IRefreshTicker.Stop
  id: Stop
  parent: Pandowdy.UI.Interfaces.IRefreshTicker
  langs:
  - csharp
  - vb
  name: Stop()
  nameWithType: IRefreshTicker.Stop()
  fullName: Pandowdy.UI.Interfaces.IRefreshTicker.Stop()
  type: Method
  source:
    remote:
      path: Pandowdy.UI/Interfaces/IRefreshTicker.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: Stop
    path: ../Pandowdy.UI/Interfaces/IRefreshTicker.cs
    startLine: 78
  assemblies:
  - Pandowdy.UI
  namespace: Pandowdy.UI.Interfaces
  summary: Stops the refresh ticker, causing it to cease emitting signals.
  remarks: >-
    After calling this method, the <xref href="Pandowdy.UI.Interfaces.IRefreshTicker.Stream" data-throw-if-not-resolved="false"></xref> will stop emitting timestamps

    until <xref href="Pandowdy.UI.Interfaces.IRefreshTicker.Start" data-throw-if-not-resolved="false"></xref> is called again. This method is typically called when

    the emulator is paused or when the UI is no longer visible.

    <p>

    Calling <xref href="Pandowdy.UI.Interfaces.IRefreshTicker.Stop" data-throw-if-not-resolved="false"></xref> on an already-stopped ticker should be safe (idempotent).

    </p>
  example: []
  syntax:
    content: void Stop()
    content.vb: Sub [Stop]()
  overload: Pandowdy.UI.Interfaces.IRefreshTicker.Stop*
