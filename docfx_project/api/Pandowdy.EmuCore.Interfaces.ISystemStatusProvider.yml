  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Gets the state of annunciator 3 / double hi-res enable ($C05E/$C05F).
  remarks: >-
    Annunciator 3 doubles as the double hi-res (DHR) enable switch.

    <p>

    <strong>Important:</strong> The logic is inverted for DHGR - when this value is

    <em>false</em> (annunciator off), double hi-res mode is <em>enabled</em>.

    When this value is <em>true</em> (annunciator on), double hi-res is <em>disabled</em>.

    </p>
  example: []
  syntax:
    content: bool StateAnn3_DGR { get; }
    parameters: []
    return:
      type: System.Boolean
      description: True if annunciator 3 is on; false if off.
    content.vb: ReadOnly Property StateAnn3_DGR As Boolean
  overload: Pandowdy.EmuCore.Interfaces.ISystemStatusProvider.StateAnn3_DGR*
