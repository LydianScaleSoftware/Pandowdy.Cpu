    startLine: 26
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Provides read-only access to the current state of Apple IIe system status and soft switches.
  remarks: >-
    This interface allows components (such as the UI, debugger, or video renderer) to query

    the current state of all Apple IIe soft switches and system flags without directly

    accessing the bus or memory. It provides a clean, observable interface for monitoring

    system state changes.

    <p>

    The provider supports three patterns for accessing status:

    <ul><li><strong>Direct property access</strong> - Query individual switch states synchronously</li><li><strong>Event-based</strong> - Subscribe to <xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider.Changed" data-throw-if-not-resolved="false"></xref> event for notifications</li><li><strong>Reactive (Rx.NET)</strong> - Subscribe to <xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider.Stream" data-throw-if-not-resolved="false"></xref> for reactive updates</li></ul>

    </p>

    <p>

    All state properties are read-only from the consumer's perspective. The underlying

    implementation is updated by the bus/soft switch manager through the <xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider.Mutate(System.Action%7bPandowdy.EmuCore.Services.SystemStatusSnapshotBuilder%7d)" data-throw-if-not-resolved="false"></xref>

    method, which is intended for internal use by the emulator core.

    </p>
  example: []
  syntax:
    content: public interface ISystemStatusProvider
    content.vb: Public Interface ISystemStatusProvider
