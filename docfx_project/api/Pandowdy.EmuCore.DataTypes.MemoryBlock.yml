  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.DataTypes
  summary: Reads a byte from the specified memory address.
  remarks: >-
    <p>

    <strong>Performance:</strong> Direct array access with no overhead. Fastest possible

    memory read implementation - no validation, no mapping, no locking.

    </p>

    <p>

    <strong>No Bounds Checking:</strong> This method does not validate the address range.

    Accessing beyond <xref href="Pandowdy.EmuCore.DataTypes.MemoryBlock.Size" data-throw-if-not-resolved="false"></xref> will throw <xref href="System.IndexOutOfRangeException" data-throw-if-not-resolved="false"></xref>.

    This is intentional for maximum performance in tight CPU emulation loops.

    </p>
  example: []
  syntax:
    content: public byte Read(ushort address)
    parameters:
    - id: address
      type: System.UInt16
      description: 16-bit memory address (0x0000-0xFFFF).
    return:
      type: System.Byte
      description: Byte value at the specified address.
    content.vb: Public Function Read(address As UShort) As Byte
  overload: Pandowdy.EmuCore.DataTypes.MemoryBlock.Read*
  exceptions:
  - type: System.IndexOutOfRangeException
    commentId: T:System.IndexOutOfRangeException
    description: Thrown if <code class="paramref">address</code> is beyond the memory block size.
