  namespace: Pandowdy.EmuCore.DataTypes
  summary: Gets or sets the byte value at the specified memory address using array-like indexer syntax.
  remarks: >-
    <p>

    <strong>Convenience Syntax:</strong> Provides array-like access to memory:

    <pre><code class="lang-csharp">memory[0x1000] = 0x42;      // Write

    byte value = memory[0x1000]; // Read</code></pre>

    </p>

    <p>

    <strong>Implementation:</strong> Getter provides direct array access for maximum

    performance. Setter delegates to <xref href="Pandowdy.EmuCore.DataTypes.MemoryBlock.Write(System.UInt16%2cSystem.Byte)" data-throw-if-not-resolved="false"></xref> for consistency. No additional

    logic or overhead.

    </p>
  example: []
