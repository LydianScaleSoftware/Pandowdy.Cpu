  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.DataTypes
  summary: Simple contiguous memory block implementation for testing and basic memory emulation.
  remarks: >-
    <p>

    <strong>Purpose:</strong> Provides a straightforward, flat memory space without the

    complexity of bank switching, soft switches, or memory mapping. Ideal for unit testing,

    CPU instruction validation, and scenarios where simplified memory is sufficient.

    </p>

    <p>

    <strong>Key Characteristics:</strong>

    <ul><li><strong>Size:</strong> Configurable from 1 byte to 64KB (0x10000 bytes maximum)</li><li><strong>Memory Model:</strong> Flat, linear address space with no bank switching</li><li><strong>Access Control:</strong> No write protection - all addresses are read/write</li><li><strong>Thread Safety:</strong> Not thread-safe - intended for single-threaded use</li><li><strong>Performance:</strong> Direct array access with zero overhead</li><li><strong>Bounds Checking:</strong> None - throws <xref href="System.IndexOutOfRangeException" data-throw-if-not-resolved="false"></xref> on invalid access</li></ul>

    </p>

    <p>

    <strong>Usage Example:</strong>


    <pre><code class="lang-csharp">// Create 64KB memory block

    var memory = new MemoryBlock(0x10000);


    // Or use the convenience class

    var memory64k = new MemoryBlock64k();


    // Write test program

    memory.Write(0x0000, 0xA9); // LDA #$42

    memory.Write(0x0001, 0x42);


    // Read back

    byte opcode = memory.Read(0x0000); // Returns 0xA9


    // Array-like indexer

    memory[0x0200] = 0xFF;

    byte value = memory[0x0200]; // Returns 0xFF</code></pre>

    </p>

    <p>

    <strong>Design Philosophy:</strong>

    This class prioritizes simplicity and performance over features. It provides the bare

    minimum needed to implement the <xref href="Emulator.IMemory" data-throw-if-not-resolved="false"></xref> interface, making it ideal for:

    <ul><li>Unit testing CPU instructions in isolation</li><li>Simple emulators that don't need memory mapping</li><li>Rapid prototyping and experimentation</li><li>Educational purposes and learning 6502 programming</li></ul>

    For production emulation requiring bank switching, soft switches, or advanced memory

    management, consider implementing a more sophisticated memory manager tailored to

    your specific hardware architecture.

    </p>

    <p>

    <strong>Size Limit:</strong> Maximum size is 65,536 bytes (0x10000) because addresses

    are <xref href="System.UInt16" data-throw-if-not-resolved="false"></xref> (16-bit). Attempting to create a larger block throws

    <xref href="System.ArgumentOutOfRangeException" data-throw-if-not-resolved="false"></xref>. This matches the 6502 processor's

    addressing capabilities.

    </p>
  example: []
  syntax:
    content: 'public class MemoryBlock : ISystemRam, IMemory'
    content.vb: Public Class MemoryBlock Implements ISystemRam, IMemory
  exceptions:
  - type: System.ArgumentOutOfRangeException
    commentId: T:System.ArgumentOutOfRangeException
    description: Thrown if <code class="paramref">size</code> is less than 1 or greater than 65,536 (0x10000).
