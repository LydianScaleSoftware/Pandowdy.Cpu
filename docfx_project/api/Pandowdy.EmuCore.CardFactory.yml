  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Creates a new instance of a card by its numeric identifier.
  remarks: >-
    <p>

    This method is the fastest retrieval option since it uses direct numeric comparison.

    It's ideal for:

    </p>

    <ul><li>Deserializing saved configurations (IDs are stable)</li><li>Programmatic card installation where IDs are known</li><li>Performance-critical card lookups</li></ul>

    <p>

    <strong>Return Value:</strong><br />

    The method returns <code>null</code> if the ID is not found, allowing callers to detect

    and handle missing cards. The <xref href="Pandowdy.EmuCore.Interfaces.ISlots.InstallCard(System.Int32%2cPandowdy.EmuCore.Interfaces.SlotNumber)" data-throw-if-not-resolved="false"></xref>

    method converts this <code>null</code> into an <xref href="System.InvalidOperationException" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    Each call creates a new, independent instance via <xref href="Pandowdy.EmuCore.Interfaces.ICard.Clone" data-throw-if-not-resolved="false"></xref>, ensuring

    that slots don't share card state.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">// Install a Disk II controller (ID = 1) in slot 6

    slots.InstallCard(1, SlotNumber.Slot6);


    // Check if a card type is available

    ICard? serialCard = factory.GetCardWithId(2);

    if (serialCard != null)

    {
        // Serial card is available
    }</code></pre>
  syntax:
    content: public ICard? GetCardWithId(int internalId)
    parameters:
    - id: internalId
      type: System.Int32
      description: >-
        The unique numeric ID of the card type (see <xref href="Pandowdy.EmuCore.Interfaces.ICard.Id" data-throw-if-not-resolved="false"></xref>).

        Common values: 0 = NullCard, 1 = Disk II, 2 = Serial Card, etc.
    return:
      type: Pandowdy.EmuCore.Interfaces.ICard
      description: >-
        A new independent instance of the requested card type via <xref href="Pandowdy.EmuCore.Interfaces.ICard.Clone" data-throw-if-not-resolved="false"></xref>,

        or <code>null</code> if no card with the specified ID is registered.
    content.vb: Public Function GetCardWithId(internalId As Integer) As ICard
  overload: Pandowdy.EmuCore.CardFactory.GetCardWithId*
