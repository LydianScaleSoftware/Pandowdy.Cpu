  name: GetAllCardTypes()
  nameWithType: CardFactory.GetAllCardTypes()
  fullName: Pandowdy.EmuCore.CardFactory.GetAllCardTypes()
  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/CardFactory.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: GetAllCardTypes
    path: ../Pandowdy.EmuCore/CardFactory.cs
    startLine: 74
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Retrieves a list of all registered card types with their IDs and names.
  remarks: >-
    <p>

    This method provides a catalog of all available card types, useful for:

    </p>

    <ul><li>Populating UI card selection dropdowns/lists</li><li>Generating configuration documentation</li><li>Debugging and diagnostic tools</li><li>Validating configuration files against available cards</li></ul>

    <p>

    <strong>Ordering:</strong><br />

    The list is sorted by card ID in ascending order, placing <xref href="Pandowdy.EmuCore.NullCard" data-throw-if-not-resolved="false"></xref> (ID = 0)

    first, followed by actual peripheral cards in ID order.

    </p>

    <p>

    <strong>List Content:</strong><br />

    Each tuple contains:

    </p>

    <ul><li><strong>Item1 (int):</strong> The card's unique ID from <xref href="Pandowdy.EmuCore.Interfaces.ICard.Id" data-throw-if-not-resolved="false"></xref></li><li><strong>Item2 (string):</strong> The card's display name from <xref href="Pandowdy.EmuCore.Interfaces.ICard.Name" data-throw-if-not-resolved="false"></xref></li></ul>

    <p>

    The returned list is a new collection that can be freely modified without affecting

    the factory's internal state.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">// Display all available card types

    var cardTypes = factory.GetAllCardTypes();

    Console.WriteLine("Available cards:");

    foreach (var (id, name) in cardTypes)

    {
        Console.WriteLine($"  [{id}] {name}");
    }

    // Output:

    //   [0] Empty Slot

    //   [1] Disk II Controller

    //   [2] Super Serial Card

    //   [3] Thundercard Controller


    // Populate a UI dropdown

    cardListBox.ItemsSource = factory.GetAllCardTypes()
        .Where(card =&gt; card.Item1 != 0) // Exclude NullCard
        .Select(card =&gt; card.Item2);</code></pre>
  syntax:
    content: public List<(int, string)> GetAllCardTypes()
    return:
      type: System.Collections.Generic.List{System.ValueTuple{System.Int32,System.String}}
      description: >-
        A list of tuples containing (ID, Name) pairs for all registered cards, sorted by ID.

        Always includes at least the <xref href="Pandowdy.EmuCore.NullCard" data-throw-if-not-resolved="false"></xref> (0, "Empty Slot").
    content.vb: Public Function GetAllCardTypes() As List(Of (Integer, String))
  overload: Pandowdy.EmuCore.CardFactory.GetAllCardTypes*
  seealso:
