    commentId: M:Pandowdy.EmuCore.Interfaces.ICardFactory.GetCardWithId(System.Int32)
  - linkId: Pandowdy.EmuCore.NullCard
    commentId: T:Pandowdy.EmuCore.NullCard
  implements:
  - Pandowdy.EmuCore.Interfaces.ICardFactory.GetNullCard
