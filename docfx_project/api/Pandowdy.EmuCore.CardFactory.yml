    id: GetNullCard
    path: ../Pandowdy.EmuCore/CardFactory.cs
    startLine: 69
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Retrieves a new instance of the <xref href="Pandowdy.EmuCore.NullCard" data-throw-if-not-resolved="false"></xref> placeholder.
  remarks: >-
    <p>

    This is a convenience method equivalent to <code>GetCardWithId(0)</code>. It provides

    a clear, semantic way to obtain the empty slot placeholder without hard-coding the

    NullCard ID.

    </p>

    <p>

    <strong>Critical Requirement:</strong><br />

    This method must never return <code>null</code> in a properly configured emulator. The

    <xref href="Pandowdy.EmuCore.NullCard" data-throw-if-not-resolved="false"></xref> is required for:

    </p>

    <ul><li>Initializing all slots during <xref href="Pandowdy.EmuCore.Slots" data-throw-if-not-resolved="false"></xref> construction</li><li>Replacing removed cards via <xref href="Pandowdy.EmuCore.Interfaces.ISlots.RemoveCard(Pandowdy.EmuCore.Interfaces.SlotNumber)" data-throw-if-not-resolved="false"></xref></li><li>Providing a safe fallback when card creation fails</li></ul>

    <p>

    Both <xref href="Pandowdy.EmuCore.Slots" data-throw-if-not-resolved="false"></xref> constructor and <xref href="Pandowdy.EmuCore.Interfaces.ISlots.RemoveCard(Pandowdy.EmuCore.Interfaces.SlotNumber)" data-throw-if-not-resolved="false"></xref> throw

    <xref href="System.InvalidOperationException" data-throw-if-not-resolved="false"></xref> if this method returns <code>null</code>.

    </p>
  example: []
  syntax:
    content: public ICard? GetNullCard()
    return:
      type: Pandowdy.EmuCore.Interfaces.ICard
      description: >-
        A new <xref href="Pandowdy.EmuCore.NullCard" data-throw-if-not-resolved="false"></xref> instance, or <code>null</code> if NullCard is not registered

        (which indicates a critical factory configuration error).
    content.vb: Public Function GetNullCard() As ICard
  overload: Pandowdy.EmuCore.CardFactory.GetNullCard*
