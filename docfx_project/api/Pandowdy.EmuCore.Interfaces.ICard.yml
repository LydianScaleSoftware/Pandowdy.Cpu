  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Reads a byte from the card's I/O address space ($C0x0-$C0xF).
  remarks: >-
    <p>

    The I/O space maps to addresses $C0x0-$C0xF where 'x' represents the slot number plus 8

    (slot 1 = $C090-$C09F, slot 2 = $C0A0-$C0AF, etc.). This space is typically used for

    hardware control registers, device status, and triggering operations.

    </p>

    <p>

    Common usage patterns:

    <ul><li>Reading device status flags</li><li>Receiving data from the peripheral</li><li>Triggering actions via read-triggered soft switches</li></ul>

    </p>
  example: []
  syntax:
    content: byte? ReadIO(byte offset)
    parameters:
    - id: offset
      type: System.Byte
      description: 'The offset within the 16-byte I/O space (valid range: 0x00-0x0F).'
    return:
      type: System.Nullable{System.Byte}
      description: >-
        The byte value if the card responds at this address, or <code>null</code> if the card

        does not implement this I/O address. A <code>null</code> return allows the system to

        return floating bus values.
    content.vb: Function ReadIO(offset As Byte) As Byte?
  overload: Pandowdy.EmuCore.Interfaces.ICard.ReadIO*
  nameWithType.vb: ICard.ReadIO(Byte)
  fullName.vb: Pandowdy.EmuCore.Interfaces.ICard.ReadIO(Byte)
  name.vb: ReadIO(Byte)
