  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Represents an Apple II peripheral card that can be installed in expansion slots 1-7.
  remarks: >-
    <p>

    The Apple IIe provides seven expansion slots, each offering three distinct address spaces

    that cards can use for I/O operations, firmware, and extended functionality:

    </p>

    <ul><li><b>Card I/O</b> ($C0x0-$C0xF): 16 bytes for hardware control registers</li><li><b>Card ROM</b> ($Cx00-$CxFF): 256 bytes for boot/driver firmware</li><li><b>Extended ROM</b> ($C800-$CFFF): 2KB shared space for extended firmware</li></ul>

    <p>

    All read methods return nullable bytes (<xref href="System.Nullable%601" data-throw-if-not-resolved="false"></xref>). A <code>null</code> return

    indicates the card did not respond at that address, allowing the system to return floating

    bus values or fall back to system ROM.

    </p>

    <p>

    Each card type must implement the <xref href="Pandowdy.EmuCore.Interfaces.ICard.Clone" data-throw-if-not-resolved="false"></xref> method to support multiple instances

    being created from a single registered prototype in the <xref href="Pandowdy.EmuCore.Interfaces.ICardFactory" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    <strong>Configuration Management:</strong><br />

    Cards implement <xref href="Pandowdy.EmuCore.Interfaces.IConfigurable" data-throw-if-not-resolved="false"></xref>, enabling save/restore of card-specific

    configuration (drive images, serial port settings, etc.). The metadata format is

    card-specific, but cards with child components (like drives) should use the hierarchical

    configuration pattern, embedding child metadata within their own. See <xref href="Pandowdy.EmuCore.Interfaces.IConfigurable" data-throw-if-not-resolved="false"></xref>

    for detailed guidance on configuration strategies.

    </p>
  example: []
  syntax:
    content: 'public interface ICard : IConfigurable'
    content.vb: Public Interface ICard Inherits IConfigurable
