      repo: https://github.com/markdavidlong/Pandowdy.git
    id: Clone
    path: ../Pandowdy.EmuCore/Interfaces/ICard.cs
    startLine: 241
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Creates a new independent copy of this card instance.
  remarks: >-
    <p>

    The <xref href="Pandowdy.EmuCore.Interfaces.ICardFactory" data-throw-if-not-resolved="false"></xref> maintains a single prototype instance of each card type.

    When a card is requested (via <xref href="Pandowdy.EmuCore.Interfaces.ICardFactory.GetCardWithId(System.Int32)" data-throw-if-not-resolved="false"></xref> or

    <xref href="Pandowdy.EmuCore.Interfaces.ICardFactory.GetCardWithName(System.String)" data-throw-if-not-resolved="false"></xref>), the factory calls <xref href="Pandowdy.EmuCore.Interfaces.ICard.Clone" data-throw-if-not-resolved="false"></xref>

    to create a fresh, independent instance for the requesting slot.

    </p>

    <p>

    This ensures that:

    <ul><li>Each slot gets its own card instance with independent state</li><li>Multiple slots can use the same card type without interference</li><li>Removing a card from one slot doesn't affect cards in other slots</li></ul>

    </p>

    <p>

    Implementation should typically return a new instance via constructor:

    <pre><code class="lang-csharp">public ICard Clone() =&gt; new MyCard();</code></pre>

    If the card has configurable state, that state may need to be copied to the clone

    depending on the desired behavior.

    </p>
  example: []
  syntax:
    content: ICard Clone()
    return:
      type: Pandowdy.EmuCore.Interfaces.ICard
      description: A new <xref href="Pandowdy.EmuCore.Interfaces.ICard" data-throw-if-not-resolved="false"></xref> instance with the same type and configuration as this card.
    content.vb: Function Clone() As ICard
  overload: Pandowdy.EmuCore.Interfaces.ICard.Clone*
