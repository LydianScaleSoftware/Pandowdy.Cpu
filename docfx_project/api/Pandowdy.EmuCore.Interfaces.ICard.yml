    id: ReadRom
    path: ../Pandowdy.EmuCore/Interfaces/ICard.cs
    startLine: 145
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Reads a byte from the card's ROM address space ($Cx00-$CxFF).
  remarks: >-
    <p>

    The card ROM space maps to $Cx00-$CxFF where 'x' is the slot number (1-7).

    This space typically contains:

    <ul><li>Boot ROM code that the system executes during slot scanning</li><li>Driver routines for the peripheral</li><li>Interface tables and vectors</li></ul>

    </p>

    <p>

    The first few bytes ($Cx00-$Cx0F) are special:

    <ul><li>$Cx01: Must be $20, $00, $03, or $3C to be recognized during boot scan</li><li>$Cx03, $Cx05, $Cx07: May contain entry point code</li></ul>

    </p>
  example: []
  syntax:
    content: byte? ReadRom(byte offset)
    parameters:
    - id: offset
      type: System.Byte
      description: 'The offset within the 256-byte ROM space (valid range: 0x00-0xFF).'
    return:
      type: System.Nullable{System.Byte}
      description: >-
        The ROM byte if the card provides firmware at this address, or <code>null</code> if the

        card does not implement ROM or does not respond at this specific offset. A <code>null</code>

        return allows the system to fall back to internal ROM.
    content.vb: Function ReadRom(offset As Byte) As Byte?
  overload: Pandowdy.EmuCore.Interfaces.ICard.ReadRom*
  nameWithType.vb: ICard.ReadRom(Byte)
  fullName.vb: Pandowdy.EmuCore.Interfaces.ICard.ReadRom(Byte)
  name.vb: ReadRom(Byte)
