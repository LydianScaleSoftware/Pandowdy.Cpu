  summary: Writes a byte to the card's extended ROM address space ($C800-$CFFF).
  remarks: >-
    <p>

    Like <xref href="Pandowdy.EmuCore.Interfaces.ICard.WriteRom(System.Byte%2cSystem.Byte)" data-throw-if-not-resolved="false"></xref>, this is typically a no-op since extended ROM is

    usually read-only firmware. However, some cards may use this address range

    for writeable RAM or memory-mapped hardware.

    </p>

    <p>

    If the card does not support writes to extended ROM space, this method should

    perform no operation rather than throwing an exception.

    </p>
