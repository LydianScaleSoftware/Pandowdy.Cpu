    id: ReadExtendedRom
    path: ../Pandowdy.EmuCore/Interfaces/ICard.cs
    startLine: 193
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Reads a byte from the card's extended ROM address space ($C800-$CFFF).
  remarks: >-
    <p>

    The extended ROM space ($C800-$CFFF) is a 2KB region shared among all slots

    via bank switching. Only one card's extended ROM can be active at a time.

    The active card is determined by which slot last accessed address $CFFF.

    </p>

    <p>

    Extended ROM is typically used for:

    <ul><li>Additional driver code that doesn't fit in the 256-byte card ROM</li><li>Enhanced features and utilities</li><li>Configuration and diagnostic code</li></ul>

    </p>

    <p>

    The <xref href="Pandowdy.EmuCore.Interfaces.ISlots" data-throw-if-not-resolved="false"></xref> implementation manages the bank selection mechanism,

    so individual cards only need to return their ROM data when queried.

    </p>
  example: []
  syntax:
    content: byte? ReadExtendedRom(ushort offset)
    parameters:
    - id: offset
      type: System.UInt16
      description: 'The offset within the 2KB extended ROM space (valid range: 0x0000-0x07FF / 0-2047).'
    return:
      type: System.Nullable{System.Byte}
      description: >-
        The ROM byte if the card provides extended firmware at this address, or <code>null</code>

        if the card does not implement extended ROM. A <code>null</code> return allows the

        system to return floating bus values.
    content.vb: Function ReadExtendedRom(offset As UShort) As Byte?
  overload: Pandowdy.EmuCore.Interfaces.ICard.ReadExtendedRom*
  nameWithType.vb: ICard.ReadExtendedRom(UShort)
  fullName.vb: Pandowdy.EmuCore.Interfaces.ICard.ReadExtendedRom(UShort)
  name.vb: ReadExtendedRom(UShort)
