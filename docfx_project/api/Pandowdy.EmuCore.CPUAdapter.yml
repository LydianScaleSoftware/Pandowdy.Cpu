  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Triggers a Non-Maskable Interrupt (NMI), unconditionally jumping to the NMI handler.
  remarks: >-
    <p>

    <strong>NMI Process:</strong> Always executed (cannot be masked):

    <ol><li>Connects to the bus temporarily</li><li>Finishes current instruction</li><li>Pushes PC and Status to stack</li><li>Reads NMI vector from $FFFA/$FFFB</li><li>Sets PC to vector address</li><li>Sets I flag (prevent IRQ during NMI)</li><li>Disconnects from the bus</li></ol>

    </p>

    <p>

    <strong>Apple IIe Usage:</strong> NMI is rarely used on the Apple IIe. Some expansion

    cards may use it for critical events that must be handled immediately regardless of

    the interrupt disable flag state.

    </p>

    <p>

    <strong>Connection Pattern:</strong> Uses the Connect-Execute-Disconnect pattern

    required by the legacy CPU.

    </p>

    <p>

    <strong>Thread Safety:</strong> Thread safety is guaranteed by VA2M's command queue,

    which ensures this method executes serially on the emulator thread at instruction

    boundaries.

    </p>
  example: []
  syntax:
    content: public void NonMaskableInterrupt(IAppleIIBus bus)
    parameters:
    - id: bus
      type: Pandowdy.EmuCore.Interfaces.IAppleIIBus
      description: The system bus for pushing return address and reading NMI vector.
    content.vb: Public Sub NonMaskableInterrupt(bus As IAppleIIBus)
  overload: Pandowdy.EmuCore.CPUAdapter.NonMaskableInterrupt*
  implements:
