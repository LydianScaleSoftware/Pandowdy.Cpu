  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Gets the Processor Status register containing condition flags.
  remarks: Directly exposes the Processor Status register from the wrapped CPU. No adaptation needed.
  example: []
  syntax:
    content: public ProcessorStatus Status { get; }
    parameters: []
    return:
      type: Emulator.ProcessorStatus
      description: >-
        An 8-bit register containing seven status flags:

        <ul><li>Bit 7 (N): Negative flag - Set if result is negative (bit 7 = 1)</li><li>Bit 6 (V): Overflow flag - Set if signed arithmetic overflow occurred</li><li>Bit 5: Unused (always 1)</li><li>Bit 4 (B): Break flag - Set if interrupt was caused by BRK instruction</li><li>Bit 3 (D): Decimal mode flag - Enables BCD arithmetic (not used on Apple II)</li><li>Bit 2 (I): Interrupt disable flag - When set, IRQ interrupts are ignored</li><li>Bit 1 (Z): Zero flag - Set if result is zero</li><li>Bit 0 (C): Carry flag - Set by arithmetic operations and shifts</li></ul>
    content.vb: Public ReadOnly Property Status As ProcessorStatus
  overload: Pandowdy.EmuCore.CPUAdapter.Status*
