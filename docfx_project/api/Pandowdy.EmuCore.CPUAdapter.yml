    id: InterruptRequest
    path: ../Pandowdy.EmuCore/CPUAdapter.cs
    startLine: 285
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Triggers an Interrupt Request (IRQ), causing the CPU to jump to the IRQ handler.
  remarks: >-
    <p>

    <strong>IRQ Process:</strong> When triggered (and not masked by the I flag):

    <ol><li>Connects to the bus temporarily</li><li>Finishes current instruction</li><li>Pushes PC and Status to stack</li><li>Reads IRQ vector from $FFFE/$FFFF</li><li>Sets PC to vector address</li><li>Sets I flag (disable further IRQs)</li><li>Disconnects from the bus</li></ol>

    </p>

    <p>

    <strong>Apple IIe Usage:</strong> Used for peripheral interrupts, keyboard input,

    and timer-based events. The handler must eventually execute RTI (Return from Interrupt)

    to restore CPU state and clear the I flag.

    </p>

    <p>

    <strong>Connection Pattern:</strong> Uses the Connect-Execute-Disconnect pattern

    required by the legacy CPU.

    </p>

    <p>

    <strong>Thread Safety:</strong> Thread safety is guaranteed by VA2M's command queue,

    which ensures this method executes serially on the emulator thread at instruction

    boundaries.

    </p>
  example: []
  syntax:
    content: public void InterruptRequest(IAppleIIBus bus)
    parameters:
    - id: bus
      type: Pandowdy.EmuCore.Interfaces.IAppleIIBus
      description: The system bus for pushing return address and reading IRQ vector.
    content.vb: Public Sub InterruptRequest(bus As IAppleIIBus)
  overload: Pandowdy.EmuCore.CPUAdapter.InterruptRequest*
  implements:
  - Pandowdy.EmuCore.Interfaces.ICpu.InterruptRequest(Pandowdy.EmuCore.Interfaces.IAppleIIBus)
