    startLine: 216
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Resets the CPU to its power-on state.
  remarks: >-
    <p>

    <strong>Reset Sequence:</strong> The 6502 reset process:

    <ol><li>Connects to the bus temporarily</li><li>Reads the reset vector from $FFFC/$FFFD</li><li>Sets PC to the vector address</li><li>Initializes SP, Status register, and other state</li><li>Disconnects from the bus</li></ol>

    </p>

    <p>

    <strong>Connection Pattern:</strong> Uses the Connect-Execute-Disconnect pattern

    required by the legacy CPU. The bus connection is temporary and released after reset.

    </p>

    <p>

    <strong>Thread Safety:</strong> Thread safety is guaranteed by VA2M's command queue,

    which ensures this method executes serially on the emulator thread at instruction

    boundaries. No race conditions can occur.

    </p>
  example: []
  syntax:
    content: public void Reset(IAppleIIBus bus)
    parameters:
    - id: bus
      type: Pandowdy.EmuCore.Interfaces.IAppleIIBus
      description: The system bus for reading the reset vector.
    content.vb: Public Sub Reset(bus As IAppleIIBus)
  overload: Pandowdy.EmuCore.CPUAdapter.Reset*
  implements:
  - Pandowdy.EmuCore.Interfaces.ICpu.Reset(Pandowdy.EmuCore.Interfaces.IAppleIIBus)
