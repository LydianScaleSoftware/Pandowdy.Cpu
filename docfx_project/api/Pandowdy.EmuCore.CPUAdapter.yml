  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Checks if the current instruction has completed execution.
  remarks: >-
    <p>

    <strong>Multi-Cycle Instructions:</strong> 6502 instructions take 2-7 cycles to

    complete. This method allows the emulator to determine when an instruction boundary

    has been reached, which is useful for:

    <ul><li>Debugging (stepping through instructions)</li><li>Breakpoints (stopping at instruction boundaries)</li><li>Timing-sensitive operations (syncing with video refresh)</li></ul>

    </p>

    <p>

    <strong>Direct Delegation:</strong> Simply forwards to the wrapped CPU's method.

    </p>
  example: []
  syntax:
    content: public bool IsInstructionComplete()
    return:
      type: System.Boolean
      description: >-
        <code>true</code> if the current instruction has finished all its cycles;

        <code>false</code> if the instruction is still in progress.
    content.vb: Public Function IsInstructionComplete() As Boolean
  overload: Pandowdy.EmuCore.CPUAdapter.IsInstructionComplete*
  implements:
  - Pandowdy.EmuCore.Interfaces.ICpu.IsInstructionComplete
