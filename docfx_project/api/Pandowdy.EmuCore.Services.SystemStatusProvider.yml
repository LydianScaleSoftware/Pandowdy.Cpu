  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Services
  summary: Raised when any system status changes.
  remarks: >-
    This event fires whenever any soft switch or system flag changes state.

    The event args contain a <xref href="Pandowdy.EmuCore.Services.SystemStatusSnapshot" data-throw-if-not-resolved="false"></xref> with the new state.

    Subscribers can use this for event-driven updates to UI or other components.

    <p>

    For reactive programming patterns, consider using <xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider.Stream" data-throw-if-not-resolved="false"></xref> instead.

    </p>
  example: []
  syntax:
    content: public event EventHandler<SystemStatusSnapshot>? Changed
    return:
      type: System.EventHandler{Pandowdy.EmuCore.Services.SystemStatusSnapshot}
    content.vb: Public Event Changed As EventHandler(Of SystemStatusSnapshot)
  implements:
  - Pandowdy.EmuCore.Interfaces.ISystemStatusProvider.Changed
