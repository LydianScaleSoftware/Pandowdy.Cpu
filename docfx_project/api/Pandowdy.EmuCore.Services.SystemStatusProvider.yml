  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Services
  summary: Called when the language card pre-write state changes ($C080-$C08F).
  remarks: >-
    The language card uses a two-access sequence to enable writing, preventing

    accidental modification. The first access to certain addresses sets pre-write

    mode. A second consecutive access to the same address enables write mode.

    Any other memory access clears pre-write. This is an internal state used

    to implement the write protection mechanism.
  example: []
  syntax:
    content: public void SetPreWrite(bool enabled)
    parameters:
    - id: enabled
      type: System.Boolean
      description: True if pre-write sequence is active; false otherwise
    content.vb: Public Sub SetPreWrite(enabled As Boolean)
