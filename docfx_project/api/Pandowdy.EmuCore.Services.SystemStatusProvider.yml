  name: SystemStatusProvider
  nameWithType: SystemStatusProvider
  fullName: Pandowdy.EmuCore.Services.SystemStatusProvider
  type: Class
  source:
    remote:
      path: Pandowdy.EmuCore/Services/SystemStatusServices.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: SystemStatusProvider
    path: ../Pandowdy.EmuCore/Services/SystemStatusServices.cs
    startLine: 114
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Services
  summary: Provides observable system status tracking with soft switch response integration.
  remarks: >-
    <p>

    <strong>Dual Role:</strong> This class serves two roles in the emulator architecture:

    <ol><li><xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider" data-throw-if-not-resolved="false"></xref> - Read-only observable access for consumers

    (renderers, debuggers, UI) to query and subscribe to system state changes.</li><li><xref href="Pandowdy.EmuCore.Interfaces.ISoftSwitchResponder" data-throw-if-not-resolved="false"></xref> - Write interface for the bus/soft switch

    manager to update state when soft switches are toggled by programs.</li></ol>

    </p>

    <p>

    <strong>Observable Pattern:</strong> Uses <xref href="System.Reactive.Subjects.BehaviorSubject%601" data-throw-if-not-resolved="false"></xref>

    to provide reactive updates via <xref href="Pandowdy.EmuCore.Services.SystemStatusProvider.Stream" data-throw-if-not-resolved="false"></xref>. The BehaviorSubject replays the

    current state to new subscribers, ensuring they always have the latest snapshot.

    Traditional .NET events are also supported via <xref href="Pandowdy.EmuCore.Services.SystemStatusProvider.Changed" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    <strong>Default State:</strong> Initializes to Apple IIe power-on defaults:

    <ul><li>Text mode enabled</li><li>Internal ROM enabled (INTCXROM = true)</li><li>All other switches off</li></ul>

    This matches the behavior of a freshly powered-on Apple IIe before the monitor runs.

    </p>

    <p>

    <strong>Thread Safety:</strong> Updates via <xref href="Pandowdy.EmuCore.Services.SystemStatusProvider.Mutate(System.Action%7bPandowdy.EmuCore.Services.SystemStatusSnapshotBuilder%7d)" data-throw-if-not-resolved="false"></xref> are not inherently

    thread-safe. The caller (typically <xref href="Pandowdy.EmuCore.VA2MBus" data-throw-if-not-resolved="false"></xref>) must ensure serialized access

    from a single thread. Reads are safe from any thread due to immutable snapshots.

    </p>

    <p>

    <strong>Change Notification Order:</strong> When state changes, the observable stream

    (<xref href="Pandowdy.EmuCore.Services.SystemStatusProvider.Stream" data-throw-if-not-resolved="false"></xref>) is notified first, followed by the <xref href="Pandowdy.EmuCore.Services.SystemStatusProvider.Changed" data-throw-if-not-resolved="false"></xref> event.

    This ensures reactive subscribers see updates before event handlers.

    </p>
  example: []
  syntax:
    content: 'public sealed class SystemStatusProvider : ISystemStatusProvider, ISoftSwitchResponder'
    content.vb: Public NotInheritable Class SystemStatusProvider Implements ISystemStatusProvider, ISoftSwitchResponder
