    startLine: 242
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Services
  summary: Gets an observable stream of system status snapshots.
  remarks: >-
    This observable stream provides the same notifications as the <xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider.Changed" data-throw-if-not-resolved="false"></xref>

    event, but in a reactive (Rx.NET) format. Useful for composing reactive pipelines,

    throttling updates, or combining with other observables.

    <p>

    Example usage:

