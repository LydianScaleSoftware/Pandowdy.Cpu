    path: ../Pandowdy.EmuCore/Slots.cs
    startLine: 165
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Gets the size of the address space managed by this slots system.
  remarks: >-
    <p>

    Although the value indicates $C000-$CFFF (4KB), the slots system only handles

    $C090-$CFFF (3952 bytes). The range $C000-$C08F contains soft switches and other

    system I/O that's handled elsewhere (typically by <xref href="Pandowdy.EmuCore.VA2MBus" data-throw-if-not-resolved="false"></xref>).

    </p>

    <p>

    If <xref href="Pandowdy.EmuCore.Slots.Read(System.UInt16)" data-throw-if-not-resolved="false"></xref> or <xref href="Pandowdy.EmuCore.Slots.Write(System.UInt16%2cSystem.Byte)" data-throw-if-not-resolved="false"></xref> is called with an address in the

    $C000-$C08F range (0x0000-0x008F when offset), an <xref href="System.InvalidOperationException" data-throw-if-not-resolved="false"></xref>

    will be thrown.

    </p>
  example: []
  syntax:
    content: public int Size { get; }
    parameters: []
    return:
      type: System.Int32
      description: Always returns 0x1000 (4096 bytes), representing the $C000-$CFFF range.
    content.vb: Public ReadOnly Property Size As Integer
  overload: Pandowdy.EmuCore.Slots.Size*
  implements:
  - Emulator.IMemory.Size
- uid: Pandowdy.EmuCore.Slots.BankSelect
  commentId: P:Pandowdy.EmuCore.Slots.BankSelect
  id: BankSelect
  parent: Pandowdy.EmuCore.Slots
  langs:
  - csharp
