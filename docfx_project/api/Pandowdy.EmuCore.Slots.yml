  name: Write(ushort, byte)
  nameWithType: Slots.Write(ushort, byte)
  fullName: Pandowdy.EmuCore.Slots.Write(ushort, byte)
  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/Slots.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: Write
    path: ../Pandowdy.EmuCore/Slots.cs
    startLine: 378
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Writes a byte to the slots address space ($C090-$CFFF).
  remarks: >-
    <p>

    <strong>Address Decoding Logic:</strong>

    </p>

    <p>

    <strong>$C090-$C0FF (Card I/O Space):</strong><br />

    If INTCXROM is enabled, writes to system ROM (usually a no-op). Otherwise, extracts

    slot number from address bits 4-6 and calls the card's <xref href="Pandowdy.EmuCore.Interfaces.ICard.WriteIO(System.Byte%2cSystem.Byte)" data-throw-if-not-resolved="false"></xref>.

    Cards typically use this space for control registers, command triggers, and data output.

    This range never modifies <xref href="Pandowdy.EmuCore.Slots.BankSelect" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    <strong>$C100-$C7FF (Card ROM Space):</strong><br />

    If INTCXROM is enabled, writes to system ROM (usually a no-op). Otherwise, checks

    SLOTCXROM (or SLOTC3ROM for slot 3) to determine card vs. system ROM. If using card

    ROM, sets <xref href="Pandowdy.EmuCore.Slots.BankSelect" data-throw-if-not-resolved="false"></xref> to the slot number and calls <xref href="Pandowdy.EmuCore.Interfaces.ICard.WriteRom(System.Byte%2cSystem.Byte)" data-throw-if-not-resolved="false"></xref>.

    Most cards treat this as a no-op since ROM is read-only, but some cards may implement

    writeable RAM in this space.

    </p>

    <p>

    <strong>$C800-$CFFF (Extended ROM Space):</strong><br />

    If INTCXROM is enabled, writes to system ROM (usually a no-op). Otherwise, if

    <xref href="Pandowdy.EmuCore.Slots.BankSelect" data-throw-if-not-resolved="false"></xref> is non-zero, calls that card's <xref href="Pandowdy.EmuCore.Interfaces.ICard.WriteExtendedRom(System.UInt16%2cSystem.Byte)" data-throw-if-not-resolved="false"></xref>.

    If <xref href="Pandowdy.EmuCore.Slots.BankSelect" data-throw-if-not-resolved="false"></xref> is 0, the write is silently ignored (no floating bus effect).

    </p>

    <p>

    <strong>Special Behavior at $CFFF:</strong><br />

    Writing to $CFFF (0x0FFF) disables extended ROM by setting <xref href="Pandowdy.EmuCore.Slots.BankSelect" data-throw-if-not-resolved="false"></xref>

    to 0. The write still reaches the currently active card (if any) before being disabled.

    </p>
  example: []
  syntax:
    content: public void Write(ushort address, byte val)
    parameters:
    - id: address
      type: System.UInt16
      description: >-
        The address to write, offset by $C000. For example, to write to $C600, pass 0x0600.

        Valid range: 0x0090-0x0FFF.
    - id: val
      type: System.Byte
      description: The byte value to write.
    content.vb: Public Sub Write(address As UShort, val As Byte)
  overload: Pandowdy.EmuCore.Slots.Write*
  exceptions:
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown if the address is outside the valid range ($C090-$CFFF / 0x0090-0x0FFF).
  seealso:
  - linkId: Pandowdy.EmuCore.Slots.Read(System.UInt16)
    commentId: M:Pandowdy.EmuCore.Slots.Read(System.UInt16)
  - linkId: Pandowdy.EmuCore.Slots.BankSelect
    commentId: P:Pandowdy.EmuCore.Slots.BankSelect
  implements:
