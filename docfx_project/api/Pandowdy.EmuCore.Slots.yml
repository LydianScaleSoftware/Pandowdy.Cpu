  summary: Initializes a new instance of the <xref href="Pandowdy.EmuCore.Slots" data-throw-if-not-resolved="false"></xref> class with all slots empty.
  remarks: >-
    <p>

    All seven expansion slots (1-7) are initialized with <xref href="Pandowdy.EmuCore.NullCard" data-throw-if-not-resolved="false"></xref> instances,

    representing empty slots. Slot 0 is also filled with a NullCard since it's reserved

    for system use and should never be accessed.

    </p>

    <p>

    The constructor creates independent NullCard instances via <xref href="Pandowdy.EmuCore.Interfaces.ICard.Clone" data-throw-if-not-resolved="false"></xref>

    to ensure each slot has its own instance, even though NullCards are stateless.

    </p>
