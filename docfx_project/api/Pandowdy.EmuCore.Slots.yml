  name: BankSelect
  nameWithType: Slots.BankSelect
  fullName: Pandowdy.EmuCore.Slots.BankSelect
  type: Property
  source:
    remote:
      path: Pandowdy.EmuCore/Slots.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: BankSelect
    path: ../Pandowdy.EmuCore/Slots.cs
    startLine: 168
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Gets or sets the currently active slot for extended ROM at $C800-$CFFF.
  remarks: >-
    <p>

    This property implements the Apple IIe's extended ROM bank switching mechanism.

    The hardware allows only one slot's extended ROM to be visible at $C800-$CFFF

    at any given time. The active slot is determined by:

    </p>

    <ol><li>Reading/writing $Cn00-$CnFF sets <xref href="Pandowdy.EmuCore.Interfaces.ISlots.BankSelect" data-throw-if-not-resolved="false"></xref> to slot n</li><li>Reading/writing $CFFF sets <xref href="Pandowdy.EmuCore.Interfaces.ISlots.BankSelect" data-throw-if-not-resolved="false"></xref> to 0 (disabled)</li></ol>

    <p>

    The bank selection state is preserved even when INTCXROM is enabled (which overrides

    extended ROM with system ROM but doesn't clear the selection). This allows the

    previously selected card's extended ROM to reappear when INTCXROM is disabled.

    </p>

    <p>

    <strong>Example:</strong> A Disk II controller in slot 6 has boot ROM at $C600-$C6FF

    and extended driver code at its extended ROM. When the system reads $C600, slot 6's

    extended ROM becomes active at $C800-$CFFF. Reading $CFFF disables extended ROM.

    </p>
  example: []
  syntax:
    content: public byte BankSelect { get; set; }
    parameters: []
    return:
      type: System.Byte
      description: >-
        A value from 0-7 where:

        <ul><li>0 = No slot active (extended ROM disabled)</li><li>1-7 = That slot's extended ROM is active at $C800-$CFFF</li></ul>
    content.vb: Public Property BankSelect As Byte
  overload: Pandowdy.EmuCore.Slots.BankSelect*
  implements:
  - Pandowdy.EmuCore.Interfaces.ISlots.BankSelect
