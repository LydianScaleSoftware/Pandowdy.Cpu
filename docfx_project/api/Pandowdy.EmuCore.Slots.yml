  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Installs a peripheral card in the specified slot using its numeric card ID.
  remarks: >-
    <p>

    This method uses the <xref href="Pandowdy.EmuCore.Interfaces.ICardFactory" data-throw-if-not-resolved="false"></xref> to create a new instance of the

    specified card type via <xref href="Pandowdy.EmuCore.Interfaces.ICardFactory.GetCardWithId(System.Int32)" data-throw-if-not-resolved="false"></xref>. The card is

    cloned from a registered prototype, ensuring each slot gets an independent instance.

    </p>

    <p>

    If a card is already installed in the specified slot, it is replaced by the new card.

    No state from the previous card is preserved.

    </p>

    <p>

    Common card IDs:

    <ul><li>0 = NullCard (empty slot)</li><li>1 = Disk II Controller</li><li>2 = Super Serial Card</li></ul>

    </p>
  example: []
  syntax:
    content: public void InstallCard(int id, SlotNumber slot)
    parameters:
    - id: id
      type: System.Int32
      description: The unique numeric identifier of the card type to install (see <xref href="Pandowdy.EmuCore.Interfaces.ICard.Id" data-throw-if-not-resolved="false"></xref>).
    - id: slot
      type: Pandowdy.EmuCore.Interfaces.SlotNumber
      description: The slot number (1-7) where the card should be installed.
    content.vb: Public Sub InstallCard(id As Integer, slot As SlotNumber)
  overload: Pandowdy.EmuCore.Slots.InstallCard*
  exceptions:
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown if the card factory cannot create a card with the specified ID.
