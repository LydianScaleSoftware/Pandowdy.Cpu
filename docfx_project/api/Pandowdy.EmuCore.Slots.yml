  commentId: M:Pandowdy.EmuCore.Slots.Read(System.UInt16)
  id: Read(System.UInt16)
  parent: Pandowdy.EmuCore.Slots
  langs:
  - csharp
  - vb
  name: Read(ushort)
  nameWithType: Slots.Read(ushort)
  fullName: Pandowdy.EmuCore.Slots.Read(ushort)
  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/Slots.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: Read
    path: ../Pandowdy.EmuCore/Slots.cs
    startLine: 246
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Reads a byte from the slots address space ($C090-$CFFF).
  remarks: >-
    <p>

    <strong>Address Decoding Logic:</strong>

    </p>

    <p>

    <strong>$C090-$C0FF (Card I/O Space):</strong><br />

    If INTCXROM is enabled, returns system ROM. Otherwise, extracts slot number from

    address bits 4-6 and calls the card's <xref href="Pandowdy.EmuCore.Interfaces.ICard.ReadIO(System.Byte)" data-throw-if-not-resolved="false"></xref>. Returns floating

    bus if card returns <code>null</code>. This range never modifies <xref href="Pandowdy.EmuCore.Slots.BankSelect" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    <strong>$C100-$C7FF (Card ROM Space):</strong><br />

    If INTCXROM is enabled, returns system ROM. Otherwise, checks SLOTCXROM (or SLOTC3ROM

    for slot 3) to determine card vs. system ROM. If using card ROM, sets <xref href="Pandowdy.EmuCore.Slots.BankSelect" data-throw-if-not-resolved="false"></xref>

    to the slot number and calls <xref href="Pandowdy.EmuCore.Interfaces.ICard.ReadRom(System.Byte)" data-throw-if-not-resolved="false"></xref>. Returns floating bus if

    card returns <code>null</code>, or system ROM if soft switches indicate system ROM.

    </p>

    <p>

    <strong>$C800-$CFFF (Extended ROM Space):</strong><br />

    If INTCXROM is enabled, returns system ROM. Otherwise, checks <xref href="Pandowdy.EmuCore.Slots.BankSelect" data-throw-if-not-resolved="false"></xref>

    to determine which card's extended ROM is active. If <xref href="Pandowdy.EmuCore.Slots.BankSelect" data-throw-if-not-resolved="false"></xref> is non-zero,

    calls that card's <xref href="Pandowdy.EmuCore.Interfaces.ICard.ReadExtendedRom(System.UInt16)" data-throw-if-not-resolved="false"></xref>. Returns floating bus if

    <xref href="Pandowdy.EmuCore.Slots.BankSelect" data-throw-if-not-resolved="false"></xref> is 0 or if card returns <code>null</code>.

    </p>

    <p>

    <strong>Special Behavior at $CFFF:</strong><br />

    Reading from $CFFF (0x0FFF) disables extended ROM by setting <xref href="Pandowdy.EmuCore.Slots.BankSelect" data-throw-if-not-resolved="false"></xref>

    to 0. The read still returns the byte from the currently active card (if any) before

    being disabled.

    </p>
  example: []
  syntax:
    content: public byte Read(ushort address)
    parameters:
    - id: address
      type: System.UInt16
      description: >-
        The address to read, offset by $C000. For example, to read from $C600, pass 0x0600.

        Valid range: 0x0090-0x0FFF.
    return:
      type: System.Byte
      description: The byte value from the responding device (card, system ROM, or floating bus).
    content.vb: Public Function Read(address As UShort) As Byte
  overload: Pandowdy.EmuCore.Slots.Read*
  exceptions:
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown if the address is outside the valid range ($C090-$CFFF / 0x0090-0x0FFF).
  seealso:
  - linkId: Pandowdy.EmuCore.Slots.Write(System.UInt16,System.Byte)
    commentId: M:Pandowdy.EmuCore.Slots.Write(System.UInt16,System.Byte)
  - linkId: Pandowdy.EmuCore.Slots.BankSelect
    commentId: P:Pandowdy.EmuCore.Slots.BankSelect
