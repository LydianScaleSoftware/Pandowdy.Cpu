  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Determines whether the specified slot is empty (contains a NullCard).
  remarks: >-
    <p>

    This is a convenience method that checks whether the card in the specified slot

    has an <xref href="Pandowdy.EmuCore.Interfaces.ICard.Id" data-throw-if-not-resolved="false"></xref> of 0 (the NullCard identifier). It provides a more

    readable alternative to manually checking the card ID.

    </p>

    <p>

    <strong>Usage Examples:</strong>


    <pre><code class="lang-csharp">// Clear alternative to checking card ID

    if (slots.IsEmpty(SlotNumber.Slot6))

    {
        slots.InstallCard("Disk II Controller", SlotNumber.Slot6);
    }


    // List all installed cards

    for (int i = 1; i &lt;= 7; i++)

    {
        var slot = (SlotNumber)(i - 1);
        if (!slots.IsEmpty(slot))
        {
            Console.WriteLine($"Slot {i}: {slots.GetCardIn(slot).Name}");
        }
    }</code></pre>

    </p>

    <p>

    This method is equivalent to:

    <pre><code class="lang-csharp">bool IsEmpty(SlotNumber slot) =&gt; GetCardIn(slot).Id == 0;</code></pre>

    </p>
  example: []
  syntax:
    content: public bool IsEmpty(SlotNumber slot)
    parameters:
    - id: slot
      type: Pandowdy.EmuCore.Interfaces.SlotNumber
      description: The slot number (1-7) to check.
    return:
      type: System.Boolean
      description: >-
        <code>true</code> if the slot contains a <xref href="Pandowdy.EmuCore.Interfaces.ICardFactory.GetNullCard" data-throw-if-not-resolved="false"></xref> (empty slot);

        <code>false</code> if the slot contains an actual peripheral card.
