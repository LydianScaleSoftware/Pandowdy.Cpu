    path: ../Pandowdy.EmuCore/Slots.cs
    startLine: 58
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Implements the Apple IIe expansion slot system, managing peripheral cards and their I/O and ROM access.
  remarks: >-
    <p>

    The <xref href="Pandowdy.EmuCore.Slots" data-throw-if-not-resolved="false"></xref> class is the concrete implementation of <xref href="Pandowdy.EmuCore.Interfaces.ISlots" data-throw-if-not-resolved="false"></xref>, providing

    the complete address decoding logic for the Apple IIe's $C000-$CFFF peripheral I/O range.

    It coordinates between peripheral cards, system ROM, and soft switch settings to determine

    which device responds to memory accesses.

    </p>

    <p>

    <strong>Architecture:</strong><br />

    The slots system maintains an array of 8 card positions (0-7), where slot 0 is reserved

    for system use and slots 1-7 are available for peripheral cards. Empty slots are filled

    with <xref href="Pandowdy.EmuCore.NullCard" data-throw-if-not-resolved="false"></xref> instances that return <code>null</code> for all operations, causing

    floating bus behavior.

    </p>

    <p>

    <strong>Address Decoding Priority:</strong>

    </p>

    <ol><li><strong>INTCXROM check</strong> - If enabled, system ROM overrides all cards</li><li><strong>Address range decode</strong> - Determines I/O, ROM, or Extended ROM space</li><li><strong>SLOTCXROM/SLOTC3ROM check</strong> - Determines card vs. system ROM (when INTCXROM off)</li><li><strong>Card query</strong> - Asks the card for data (may return null)</li><li><strong>Fallback</strong> - Returns system ROM or floating bus value</li></ol>

    <p>

    <strong>Extended ROM Bank Selection:</strong><br />

    The <xref href="Pandowdy.EmuCore.Slots.BankSelect" data-throw-if-not-resolved="false"></xref> property tracks which slot (1-7) currently owns the $C800-$CFFF

    extended ROM space. Accessing a slot's ROM ($Cn00-$CnFF) activates that slot; accessing

    $CFFF disables all extended ROM.

    </p>

    <p>

    <strong>Configuration Management:</strong><br />

    The <xref href="Pandowdy.EmuCore.Slots" data-throw-if-not-resolved="false"></xref> class implements <xref href="Pandowdy.EmuCore.Interfaces.IConfigurable" data-throw-if-not-resolved="false"></xref> (via <xref href="Pandowdy.EmuCore.Interfaces.ISlots" data-throw-if-not-resolved="false"></xref>),

    enabling complete save/restore of the slot configuration. The metadata format includes:

    </p>

    <ul><li>Which cards are installed in which slots (by ID)</li><li>Each card's configuration metadata (hierarchical inclusion)</li><li>Current <xref href="Pandowdy.EmuCore.Slots.BankSelect" data-throw-if-not-resolved="false"></xref> state (optional)</li></ul>

    <p>

    This allows the entire peripheral configuration to be saved, shared, and restored,

    including disk images, serial port settings, and other card-specific configurations.

    Empty slots are omitted from the metadata to keep it concise.

    </p>

    <p>

    <strong>Threading:</strong><br />

    This class is not thread-safe. All methods must be called from the emulator worker thread.

    Card installation/removal during emulation may cause race conditions.

    </p>
  example: []
  syntax:
    content: 'public class Slots : ISlots, IMemory, IConfigurable'
