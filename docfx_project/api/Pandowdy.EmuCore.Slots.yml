- uid: Pandowdy.EmuCore.Slots.GetMetadata
  commentId: M:Pandowdy.EmuCore.Slots.GetMetadata
  id: GetMetadata
  parent: Pandowdy.EmuCore.Slots
  langs:
  - csharp
  - vb
  name: GetMetadata()
  nameWithType: Slots.GetMetadata()
  fullName: Pandowdy.EmuCore.Slots.GetMetadata()
  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/Slots.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: GetMetadata
    path: ../Pandowdy.EmuCore/Slots.cs
    startLine: 540
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Gets the current slot configuration as JSON metadata.
  remarks: >-
    <p>

    This method captures the current state of all expansion slots, including which cards

    are installed and their individual configurations. The metadata uses JSON format with

    the following structure:

    </p>


    <pre><code class="lang-csharp">{
      "version": 1,
      "bankSelect": 6,
      "slots": [
        {
          "slotNumber": 6,
          "cardId": 1,
          "cardName": "Disk II Controller",
          "metadata": "{...card-specific configuration...}"
        }
      ]
    }</code></pre>

    <p>

    <strong>Hierarchical Configuration:</strong><br />

    The slots system uses the inclusive approach to hierarchical configuration. Each

    installed card's metadata (obtained via <xref href="Pandowdy.EmuCore.Interfaces.IConfigurable.GetMetadata" data-throw-if-not-resolved="false"></xref>) is embedded

    within the slot configuration. This keeps the entire peripheral configuration

    self-contained and portable.

    </p>

    <p>

    <strong>Empty Slots:</strong><br />

    Empty slots (containing <xref href="Pandowdy.EmuCore.NullCard" data-throw-if-not-resolved="false"></xref>) are omitted from the metadata to

    keep it concise. On restoration, any slot not mentioned in the metadata is left empty.

    </p>

    <p>

    <strong>BankSelect State:</strong><br />

    The current <xref href="Pandowdy.EmuCore.Slots.BankSelect" data-throw-if-not-resolved="false"></xref> value is included in the metadata. While not

    strictly necessary for configuration (it's runtime state), including it allows for

    precise state restoration during debugging or save states.

    </p>
  example: []
  syntax:
    content: public string GetMetadata()
    return:
      type: System.String
      description: >-
        A JSON string containing the configuration of all installed cards and their metadata,

        or an empty string if serialization fails.
    content.vb: Public Function GetMetadata() As String
  overload: Pandowdy.EmuCore.Slots.GetMetadata*
  implements:
  - Pandowdy.EmuCore.Interfaces.IConfigurable.GetMetadata
- uid: Pandowdy.EmuCore.Slots.ApplyMetadata(System.String)
  commentId: M:Pandowdy.EmuCore.Slots.ApplyMetadata(System.String)
  id: ApplyMetadata(System.String)
  parent: Pandowdy.EmuCore.Slots
  langs:
  - csharp
  - vb
  name: ApplyMetadata(string)
  nameWithType: Slots.ApplyMetadata(string)
  fullName: Pandowdy.EmuCore.Slots.ApplyMetadata(string)
  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/Slots.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: ApplyMetadata
    path: ../Pandowdy.EmuCore/Slots.cs
    startLine: 632
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Applies slot configuration from JSON metadata, restoring installed cards and their configurations.
  remarks: >-
    <p>

    This method restores the slot configuration from metadata by:

    </p>

    <ol><li>Clearing all slots (removing all cards)</li><li>Parsing the JSON metadata</li><li>Installing each card by ID in its designated slot</li><li>Recursively applying each card's embedded metadata</li><li>Restoring the <xref href="Pandowdy.EmuCore.Slots.BankSelect" data-throw-if-not-resolved="false"></xref> state</li></ol>

    <p>

    <strong>Empty String Handling:</strong><br />

    Passing an empty or whitespace-only string clears all slots, leaving the system

    with empty slots (all <xref href="Pandowdy.EmuCore.NullCard" data-throw-if-not-resolved="false"></xref> instances). This represents the

    default/unconfigured state.

    </p>

    <p>

    <strong>Error Handling:</strong><br />

    If any card fails to install or configure, this method returns <code>false</code>. The

    slot system may be left in a partial state where some cards are installed and

    others are not. For transactional behavior, callers should capture the current

    metadata before applying new metadata to enable rollback.

    </p>

    <p>

    <strong>Card Factory Dependency:</strong><br />

    This method relies on <xref href="Pandowdy.EmuCore.Interfaces.ICardFactory.GetCardWithId(System.Int32)" data-throw-if-not-resolved="false"></xref> to create card

    instances. If a card ID in the metadata is not registered in the factory, that

    slot will remain empty and the method will return <code>false</code>.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">// Save current configuration

    string backup = slots.GetMetadata();


    // Load a different configuration

    if (!slots.ApplyMetadata(savedConfiguration))

    {
        // Restore backup on failure
        slots.ApplyMetadata(backup);
    }


    // Clear all slots

    slots.ApplyMetadata(string.Empty);</code></pre>
  syntax:
    content: public bool ApplyMetadata(string metadata)
    parameters:
    - id: metadata
      type: System.String
      description: >-
        A JSON metadata string previously obtained from <xref href="Pandowdy.EmuCore.Slots.GetMetadata" data-throw-if-not-resolved="false"></xref>, or an empty

        string to clear all slots.
    return:
      type: System.Boolean
      description: >-
        <code>true</code> if the configuration was successfully applied; <code>false</code> if the metadata

        was invalid or any card failed to apply its configuration.
    content.vb: Public Function ApplyMetadata(metadata As String) As Boolean
  overload: Pandowdy.EmuCore.Slots.ApplyMetadata*
  implements:
  - Pandowdy.EmuCore.Interfaces.IConfigurable.ApplyMetadata(System.String)
  nameWithType.vb: Slots.ApplyMetadata(String)
  fullName.vb: Pandowdy.EmuCore.Slots.ApplyMetadata(String)
  name.vb: ApplyMetadata(String)
