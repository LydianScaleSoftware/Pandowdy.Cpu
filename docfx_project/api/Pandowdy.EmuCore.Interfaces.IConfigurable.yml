  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Represents an object that can persist and restore its configuration state via metadata strings.
  remarks: >-
    <p>

    The <xref href="Pandowdy.EmuCore.Interfaces.IConfigurable" data-throw-if-not-resolved="false"></xref> interface provides a simple, format-agnostic mechanism for

    objects to serialize and deserialize their configuration state. Implementers choose their

    own metadata format (JSON, YAML, XML, binary, etc.) based on their complexity and requirements.

    </p>

    <p>

    <strong>Design Philosophy:</strong>

    </p>

    <ul><li><strong>Format Freedom:</strong> Each implementation chooses its own serialization format</li><li><strong>Self-Contained:</strong> Metadata strings are opaque to consumers</li><li><strong>Fail-Safe:</strong> <xref href="Pandowdy.EmuCore.Interfaces.IConfigurable.ApplyMetadata(System.String)" data-throw-if-not-resolved="false"></xref> returns success status rather than throwing exceptions</li><li><strong>Stateless Protocol:</strong> No assumptions about when/how metadata is captured or applied</li><li><strong>Hierarchical Freedom:</strong> Objects may include child configurations or manage them separately</li></ul>

    <p>

    <strong>Common Use Cases:</strong>

    </p>

    <ul><li>Persisting peripheral card configurations (drives, settings, etc.)</li><li>Saving/loading emulator state snapshots</li><li>Cloning configured objects with preserved state</li><li>Exporting/importing configurations between sessions</li></ul>

    <p>

    <strong>Hierarchical Configuration:</strong><br />

    Objects with child components (e.g., a disk controller with attached drives) have flexibility

    in how they handle child configuration:

    </p>

    <ul><li><strong>Inclusive Approach:</strong> Parent includes child metadata within its own (recommended for tight coupling)</li><li><strong>Separate Approach:</strong> Parent and children managed independently (useful for loose coupling)</li><li><strong>Hybrid Approach:</strong> Some children included, others referenced externally</li></ul>

    <p>

    <strong>Example: Disk Controller with Drives</strong>

    </p>


    <pre><code class="lang-csharp">// Inclusive approach - controller includes drive configurations

    {
      "controllerSettings": { "motorSpeed": "normal" },
      "drives": [
        { "slot": 0, "imagePath": "System.dsk", "writeProtected": true },
        { "slot": 1, "imagePath": "Data.dsk", "writeProtected": false }
      ]
    }


    // When applying metadata, the controller:

    // 1. Reads its own settings

    // 2. Creates/configures child drives based on embedded configuration

    // 3. Recursively applies metadata to each child</code></pre>

    <p>

    This approach keeps the configuration self-contained and ensures all related state

    travels together. The parent is responsible for creating and initializing its children

    during <xref href="Pandowdy.EmuCore.Interfaces.IConfigurable.ApplyMetadata(System.String)" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    <strong>Implementation Guidelines:</strong>

    </p>

    <ol><li><xref href="Pandowdy.EmuCore.Interfaces.IConfigurable.GetMetadata" data-throw-if-not-resolved="false"></xref> should never throw exceptions (return empty string on error)</li><li><xref href="Pandowdy.EmuCore.Interfaces.IConfigurable.ApplyMetadata(System.String)" data-throw-if-not-resolved="false"></xref> should validate input and return <code>false</code> on failure</li><li>Metadata format should be documented in implementing class remarks</li><li>Consider including version information in metadata for backward compatibility</li><li>Empty string metadata should represent default/unconfigured state</li><li>For hierarchical objects, decide whether children are included or referenced</li><li>Document the hierarchical strategy in the implementing class</li></ol>
  example:
  - >-
    <p>

    <strong>Simple Implementation (JSON-based):</strong>

    </p>


    <pre><code class="lang-csharp">public class SimpleDevice : IConfigurable

    {
        public string DeviceName { get; set; } = "Unnamed";
        public bool IsEnabled { get; set; } = true;

        public string GetMetadata()
        {
            try
            {
                return JsonSerializer.Serialize(new 
                { 
                    DeviceName, 
                    IsEnabled 
                });
            }
            catch
            {
                return string.Empty; // Fail-safe
            }
        }

        public bool ApplyMetadata(string metadata)
        {
            if (string.IsNullOrWhiteSpace(metadata))
            {
                // Reset to defaults
                DeviceName = "Unnamed";
                IsEnabled = true;
                return true;
            }

            try
            {
                var config = JsonSerializer.Deserialize&lt;dynamic&gt;(metadata);
                DeviceName = config.DeviceName;
                IsEnabled = config.IsEnabled;
                return true;
            }
            catch
            {
                return false; // Invalid metadata
            }
        }
    }


    // Usage

    var device = new SimpleDevice { DeviceName = "Serial Port", IsEnabled = false };

    string metadata = device.GetMetadata();


    var newDevice = new SimpleDevice();

    if (newDevice.ApplyMetadata(metadata))

    {
        Console.WriteLine($"Restored: {newDevice.DeviceName}");
    }</code></pre>

    <p>

    <strong>Hierarchical Implementation (Controller with Drives):</strong>

    </p>


    <pre><code class="lang-csharp">public class DiskController : IConfigurable

    {
        private List&lt;DiskDrive&gt; _drives = new();

        public string GetMetadata()
        {
            try
            {
                var config = new
                {
                    Version = 1,
                    ControllerSettings = new { /* controller-specific settings */ },
                    Drives = _drives.Select(d =&gt; new
                    {
                        Slot = d.Slot,
                        // Include child's metadata inline
                        DriveConfig = d.GetMetadata()
                    }).ToArray()
                };

                return JsonSerializer.Serialize(config);
            }
            catch
            {
                return string.Empty;
            }
        }

        public bool ApplyMetadata(string metadata)
        {
            if (string.IsNullOrWhiteSpace(metadata))
            {
                _drives.Clear();
                return true;
            }

            try
            {
                var config = JsonSerializer.Deserialize&lt;dynamic&gt;(metadata);

                // Apply controller settings first
                // ... apply controller-specific configuration ...

                // Recreate drives based on embedded configuration
                _drives.Clear();
                foreach (var driveConfig in config.Drives)
                {
                    var drive = new DiskDrive(driveConfig.Slot);

                    // Recursively apply child metadata
                    if (!drive.ApplyMetadata(driveConfig.DriveConfig.ToString()))
                    {
                        return false; // Child configuration failed
                    }

                    _drives.Add(drive);
                }

                return true;
            }
            catch
            {
                return false;
            }
        }
    }</code></pre>
