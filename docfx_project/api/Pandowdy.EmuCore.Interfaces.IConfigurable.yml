  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Applies configuration metadata to this object, restoring its state.
  remarks: >-
    <p>

    This method attempts to restore the object's configuration state from a metadata string.

    The method should validate the metadata format and contents before applying any changes.

    If validation fails at any point, the method should return <code>false</code> and leave the

    object in a consistent state (preferably unchanged).

    </p>

    <p>

    <strong>Empty String Handling:</strong><br />

    Passing an empty or whitespace-only string should reset the object to its default

    configuration state and return <code>true</code>. This provides a standard way to clear

    configuration without needing format-specific knowledge.

    </p>

    <p>

    <strong>Hierarchical Configuration:</strong><br />

    For objects with child components, <xref href="Pandowdy.EmuCore.Interfaces.IConfigurable.ApplyMetadata(System.String)" data-throw-if-not-resolved="false"></xref> is responsible for:

    </p>

    <ol><li>Parsing the parent's configuration from metadata</li><li>Creating or locating child objects based on metadata</li><li>Recursively applying embedded child metadata to each child</li><li>Validating the entire configuration hierarchy</li></ol>

    <p>

    If any child fails to apply its metadata, the parent should return <code>false</code> and

    either roll back all changes or leave the object in a consistent partial state

    (documented by the implementing class).

    </p>

    <p>

    <strong>Common Failure Scenarios:</strong>

    </p>

    <ul><li><strong>Format errors:</strong> Malformed JSON/XML, invalid syntax</li><li><strong>Schema mismatch:</strong> Missing required fields, unknown fields</li><li><strong>Version incompatibility:</strong> Metadata from newer version</li><li><strong>Resource errors:</strong> Referenced files don't exist, resources unavailable</li><li><strong>Validation errors:</strong> Values out of range, invalid combinations</li><li><strong>Child configuration failure:</strong> Child object failed to apply its embedded metadata</li></ul>

    <p>

    <strong>Partial Application:</strong><br />

    Implementations should apply changes atomically when possible. If metadata contains

    multiple settings and one fails validation, the implementation should either apply

    none of them (transactional) or document which settings were applied (partial).

    The return value indicates overall success/failure.

    </p>

    <p>

    <strong>Error Handling:</strong><br />

    This method should never throw exceptions. All errors should result in returning

    <code>false</code>. Implementations may log errors for diagnostic purposes.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">// Successful application

    var device = new Device();

    if (device.ApplyMetadata("{\"name\":\"COM1\",\"baud\":9600}"))

    {
        Console.WriteLine("Configuration applied successfully");
    }


    // Reset to defaults

    if (device.ApplyMetadata(string.Empty))

    {
        Console.WriteLine("Reset to default configuration");
    }


    // Handle failure

    if (!device.ApplyMetadata("invalid metadata"))

    {
        Console.WriteLine("Failed to apply configuration");
    }


    // Hierarchical application

    var controller = new DiskController();

    string metadata = @"{
        ""drives"": [
            { ""slot"": 0, ""driveConfig"": ""{...}"" },
            { ""slot"": 1, ""driveConfig"": ""{...}"" }
        ]
    }";


    if (controller.ApplyMetadata(metadata))

    {
        // Controller and all drives configured successfully
    }</code></pre>
  syntax:
    content: bool ApplyMetadata(string metadata)
    parameters:
    - id: metadata
      type: System.String
      description: >-
        A metadata string previously obtained from <xref href="Pandowdy.EmuCore.Interfaces.IConfigurable.GetMetadata" data-throw-if-not-resolved="false"></xref>, or an empty

        string to reset to default configuration.
    return:
      type: System.Boolean
      description: >-
        <code>true</code> if the metadata was successfully parsed and applied; <code>false</code> if

        the metadata was invalid, incompatible, or could not be applied for any reason.
    content.vb: Function ApplyMetadata(metadata As String) As Boolean
