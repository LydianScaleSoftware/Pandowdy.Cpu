  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Gets the current configuration state as a metadata string.
  remarks: >-
    <p>

    This method captures the current configuration state of the object in a format suitable

    for persistence, transmission, or cloning. The format is entirely up to the implementer

    and should be documented in the implementing class.

    </p>

    <p>

    <strong>Format Examples:</strong>

    </p>

    <ul><li><strong>Simple objects:</strong> JSON or key-value pairs</li><li><strong>Complex objects:</strong> YAML, XML, or custom formats</li><li><strong>Binary data:</strong> Base64-encoded binary blob</li><li><strong>No state:</strong> Empty string</li><li><strong>Hierarchical objects:</strong> Nested structures with child configurations embedded</li></ul>

    <p>

    <strong>Hierarchical Objects:</strong><br />

    Objects with child components that also implement <xref href="Pandowdy.EmuCore.Interfaces.IConfigurable" data-throw-if-not-resolved="false"></xref> may choose to:

    </p>

    <ul><li>Embed child metadata within the parent's metadata (keeps configuration self-contained)</li><li>Reference children externally (allows independent child management)</li><li>Use a hybrid approach based on business logic requirements</li></ul>

    <p>

    The choice depends on the relationship between parent and child—tightly coupled components

    (like a controller and its drives) typically use embedded metadata, while loosely coupled

    components might prefer external references.

    </p>

    <p>

    <strong>Error Handling:</strong><br />

    This method should never throw exceptions. If serialization fails for any reason,

    return an empty string. The caller can choose to treat empty string as "no configuration"

    or as an error condition.

    </p>

    <p>

    <strong>Thread Safety:</strong><br />

    Implementations should ensure this method is safe to call from any thread, though

    concurrent modification during serialization may produce inconsistent results.

    </p>
  example: []
  syntax:
    content: string GetMetadata()
    return:
      type: System.String
      description: >-
        A string containing serialized configuration data in an implementation-specific format,

        or an empty string if the object has no configuration state or if serialization fails.
    content.vb: Function GetMetadata() As String
