  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Creates a new instance of <xref href="Pandowdy.EmuCore.NullCard" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    <p>

    Although NullCard is stateless and all instances are functionally identical, the

    <xref href="Pandowdy.EmuCore.NullCard.Clone" data-throw-if-not-resolved="false"></xref> method creates a new instance to maintain consistency with the

    <xref href="Pandowdy.EmuCore.Interfaces.ICard" data-throw-if-not-resolved="false"></xref> contract and allow each slot to have its own card reference.

    </p>

    <p>

    This is used during <xref href="Pandowdy.EmuCore.Slots" data-throw-if-not-resolved="false"></xref> initialization to populate all slots with

    independent NullCard instances, even though they behave identically.

    </p>
  example: []
  syntax:
    content: public ICard Clone()
    return:
      type: Pandowdy.EmuCore.Interfaces.ICard
      description: A new <xref href="Pandowdy.EmuCore.NullCard" data-throw-if-not-resolved="false"></xref> instance.
    content.vb: Public Function Clone() As ICard
