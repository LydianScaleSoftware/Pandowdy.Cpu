- uid: Pandowdy.EmuCore.NullCard.ApplyMetadata(System.String)
  commentId: M:Pandowdy.EmuCore.NullCard.ApplyMetadata(System.String)
  id: ApplyMetadata(System.String)
  parent: Pandowdy.EmuCore.NullCard
  langs:
  - csharp
  - vb
  name: ApplyMetadata(string)
  nameWithType: NullCard.ApplyMetadata(string)
  fullName: Pandowdy.EmuCore.NullCard.ApplyMetadata(string)
  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/NullCard.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: ApplyMetadata
    path: ../Pandowdy.EmuCore/NullCard.cs
    startLine: 225
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Applies configuration metadata to this NullCard.
  remarks: >-
    <p>

    NullCard is completely stateless and cannot be configured. This method ignores

    the provided metadata and always returns <code>true</code> to indicate "success" in

    the sense that the NullCard remains in its expected state (no configuration).

    </p>

    <p>

    This implementation allows NullCard to participate in configuration restoration

    without requiring special-case handling. Empty slots are simply skipped during

    configuration, and any metadata provided is silently ignored.

    </p>
  example: []
  syntax:
    content: public bool ApplyMetadata(string metadata)
    parameters:
    - id: metadata
      type: System.String
      description: The configuration metadata (ignored).
    return:
      type: System.Boolean
      description: Always returns <code>true</code> since NullCard accepts any metadata without effect.
    content.vb: Public Function ApplyMetadata(metadata As String) As Boolean
  overload: Pandowdy.EmuCore.NullCard.ApplyMetadata*
  implements:
  - Pandowdy.EmuCore.Interfaces.IConfigurable.ApplyMetadata(System.String)
