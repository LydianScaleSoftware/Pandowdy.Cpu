  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Gets the configuration metadata for this NullCard.
  remarks: >-
    <p>

    NullCard is completely stateless and has no configuration to persist. This method

    always returns an empty string to indicate the absence of any configuration data.

    </p>

    <p>

    This implementation satisfies the <xref href="Pandowdy.EmuCore.Interfaces.IConfigurable" data-throw-if-not-resolved="false"></xref> contract inherited

    through <xref href="Pandowdy.EmuCore.Interfaces.ICard" data-throw-if-not-resolved="false"></xref>, allowing NullCard to participate in configuration

    serialization without requiring special-case handling.

    </p>
  example: []
  syntax:
    content: public string GetMetadata()
    return:
      type: System.String
      description: Always returns an empty string since NullCard has no configurable state.
    content.vb: Public Function GetMetadata() As String
  overload: Pandowdy.EmuCore.NullCard.GetMetadata*
