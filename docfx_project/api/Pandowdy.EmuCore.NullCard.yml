    path: ../Pandowdy.EmuCore/NullCard.cs
    startLine: 102
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Gets the unique identifier for the NullCard type.
  remarks: >-
    <p>

    The ID value of 0 is reserved for NullCard and serves as a sentinel value throughout

    the emulator. Code can check <code>card.Id == 0</code> to determine if a slot is empty,

    which is formalized in the <xref href="Pandowdy.EmuCore.Interfaces.ISlots.IsEmpty(Pandowdy.EmuCore.Interfaces.SlotNumber)" data-throw-if-not-resolved="false"></xref> convenience method.

    </p>

    <p>

    All other card types must use IDs ≥ 1 to avoid conflicts. The <xref href="Pandowdy.EmuCore.Interfaces.ICardFactory" data-throw-if-not-resolved="false"></xref>

    validates that no registered card uses ID 0 during registration.

    </p>
  example: []
  syntax:
    content: public int Id { get; }
    parameters: []
    return:
      type: System.Int32
      description: Always returns 0.
    content.vb: Public ReadOnly Property Id As Integer
  overload: Pandowdy.EmuCore.NullCard.Id*
  implements:
  - Pandowdy.EmuCore.Interfaces.ICard.Id
