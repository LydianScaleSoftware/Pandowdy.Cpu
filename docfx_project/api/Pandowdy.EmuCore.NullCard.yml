    startLine: 65
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Represents an empty expansion slot in the Apple IIe, providing no functionality.
  remarks: >-
    <p>

    The <xref href="Pandowdy.EmuCore.NullCard" data-throw-if-not-resolved="false"></xref> is a special implementation of <xref href="Pandowdy.EmuCore.Interfaces.ICard" data-throw-if-not-resolved="false"></xref> that

    represents the absence of a peripheral card. It is the only card type guaranteed to

    be available in the emulator and serves as the default state for all expansion slots

    upon initialization.

    </p>

    <p>

    <strong>Purpose and Design:</strong>

    </p>

    <ul><li><strong>Default State:</strong> All slots (1-7) are initialized with NullCard instances, representing empty slots</li><li><strong>Removal Placeholder:</strong> When a card is removed via <xref href="Pandowdy.EmuCore.Interfaces.ISlots.RemoveCard(Pandowdy.EmuCore.Interfaces.SlotNumber)" data-throw-if-not-resolved="false"></xref>, it's replaced with a NullCard</li><li><strong>Floating Bus Enabler:</strong> By returning <code>null</code> for all read operations, NullCard causes the slots system to return floating bus values</li><li><strong>Silent Writes:</strong> All write operations are no-ops, preventing any state changes or side effects</li></ul>

    <p>

    <strong>Behavioral Characteristics:</strong><br />

    The NullCard implements complete passivity:

    </p>

    <ul><li>All read methods return <code>null</code> (indicating "no response")</li><li>All write methods perform no operation</li><li>No internal state is maintained (completely stateless)</li><li>Cloning creates a new instance (though functionally identical)</li><li>Configuration methods are no-ops (<xref href="Pandowdy.EmuCore.NullCard.GetMetadata" data-throw-if-not-resolved="false"></xref> returns empty, <xref href="Pandowdy.EmuCore.NullCard.ApplyMetadata(System.String)" data-throw-if-not-resolved="false"></xref> always succeeds)</li></ul>

    <p>

    <strong>Configuration Support:</strong><br />

    NullCard implements <xref href="Pandowdy.EmuCore.Interfaces.IConfigurable" data-throw-if-not-resolved="false"></xref> (via <xref href="Pandowdy.EmuCore.Interfaces.ICard" data-throw-if-not-resolved="false"></xref>) with trivial

    behavior: <xref href="Pandowdy.EmuCore.NullCard.GetMetadata" data-throw-if-not-resolved="false"></xref> always returns an empty string, and <xref href="Pandowdy.EmuCore.NullCard.ApplyMetadata(System.String)" data-throw-if-not-resolved="false"></xref>

    always returns <code>true</code> while ignoring any provided metadata. This allows NullCard to

    participate in configuration serialization without requiring special-case handling.

    </p>

    <p>

    <strong>Real Hardware Analogy:</strong><br />

    The NullCard emulates the behavior of an actual Apple IIe with no card installed in a slot.

    When software accesses an empty slot's I/O or ROM space, the hardware returns whatever data

    happens to be floating on the bus at that moment, which this implementation delegates to

    the <xref href="Pandowdy.EmuCore.Interfaces.IFloatingBusProvider" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    <strong>Factory Integration:</strong><br />

    The <xref href="Pandowdy.EmuCore.Interfaces.ICardFactory" data-throw-if-not-resolved="false"></xref> must always be able to provide NullCard instances via

    <xref href="Pandowdy.EmuCore.Interfaces.ICardFactory.GetNullCard" data-throw-if-not-resolved="false"></xref>. This is enforced during <xref href="Pandowdy.EmuCore.Slots" data-throw-if-not-resolved="false"></xref>

    initialization and card removal operations, which throw exceptions if NullCard creation fails.

    </p>

    <p>

    <strong>Thread Safety:</strong><br />

    The NullCard is completely stateless and therefore inherently thread-safe. Multiple threads

    can safely call any methods simultaneously without synchronization, though normal emulator

    usage restricts all card operations to the emulator worker thread.

    </p>
  example: []
  syntax:
    content: 'public class NullCard : ICard, IConfigurable'
    content.vb: Public Class NullCard Implements ICard, IConfigurable
