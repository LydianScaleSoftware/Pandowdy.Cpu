  namespace: Pandowdy.EmuCore
  summary: Event arguments for memory access notifications to non-UI consumers.
  remarks: >-
    Used to notify observers (debuggers, trace logs, etc.) when memory is read or written.

    The <xref href="Pandowdy.EmuCore.MemoryAccessEventArgs.Value" data-throw-if-not-resolved="false"></xref> is null for read notifications, non-null for write notifications.
