    path: ../Pandowdy.EmuCore/Interfaces/ISlots.cs
    startLine: 99
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Manages Apple IIe expansion slots and coordinates peripheral card I/O and ROM access.
  remarks: >-
    <p>

    The <xref href="Pandowdy.EmuCore.Interfaces.ISlots" data-throw-if-not-resolved="false"></xref> interface coordinates all expansion card operations in the

    Apple IIe emulator, managing the complex address decoding logic that determines which

    device (card or system ROM) responds to memory accesses in the $C000-$CFFF range.

    </p>

    <p>

    <strong>Address Space Management:</strong>

    </p>

    <table><thead><tr><th class="term">Address Range</th><th class="description">Purpose</th></tr></thead><tbody><tr><td class="term">$C090-$C0FF</td><td class="description">Card I/O space (16 bytes per slot: $C0n0-$C0nF where n = slot + 8)</td></tr><tr><td class="term">$C100-$C7FF</td><td class="description">Card ROM space (256 bytes per slot: $Cn00-$CnFF where n = slot)</td></tr><tr><td class="term">$C800-$CFFF</td><td class="description">Extended ROM space (2KB shared via bank switching)</td></tr></tbody></table>

    <p>

    <strong>Soft Switch Control:</strong><br />

    The slots system respects three soft switches that control ROM visibility:

    </p>

    <ul><li><strong>INTCXROM</strong> ($C006/$C007): Master override—when enabled, internal ROM appears for entire $C100-$CFFF range, disabling all cards</li><li><strong>SLOTCXROM</strong> ($C00A/$C00B): When INTCXROM is off, controls whether slots 1,2,4-7 use card ROM or system ROM</li><li><strong>SLOTC3ROM</strong> ($C00C/$C00D): Independent control for slot 3 (typically 80-column firmware)</li></ul>

    <p>

    <strong>Extended ROM Bank Switching:</strong><br />

    The $C800-$CFFF region is shared among all slots via the <xref href="Pandowdy.EmuCore.Interfaces.ISlots.BankSelect" data-throw-if-not-resolved="false"></xref> mechanism:

    </p>

    <ul><li>Accessing a slot's ROM ($Cn00-$CnFF) activates that slot's extended ROM at $C800-$CFFF</li><li>Accessing $CFFF from any slot disables extended ROM (sets <xref href="Pandowdy.EmuCore.Interfaces.ISlots.BankSelect" data-throw-if-not-resolved="false"></xref> to 0)</li><li>Only one slot's extended ROM can be active at a time</li></ul>

    <p>

    <strong>Null Card Behavior:</strong><br />

    Empty slots are filled with <xref href="Pandowdy.EmuCore.Interfaces.ICardFactory.GetNullCard" data-throw-if-not-resolved="false"></xref> instances that return

    <code>null</code> for all operations, causing the slots system to return floating bus values

    for reads and no-op for writes.

    </p>

    <p>

    <strong>Configuration Management:</strong><br />

    The slots system implements <xref href="Pandowdy.EmuCore.Interfaces.IConfigurable" data-throw-if-not-resolved="false"></xref>, enabling complete save/restore

    of the entire peripheral configuration. The metadata includes which cards are installed

    in which slots, along with each card's configuration (hierarchically embedded). This

    allows the entire emulator peripheral setup to be persisted, shared, and restored,

    including disk images, serial settings, and other card-specific state. The metadata

    format is typically JSON. See <xref href="Pandowdy.EmuCore.Interfaces.IConfigurable" data-throw-if-not-resolved="false"></xref> for the configuration protocol.

    </p>
  example: []
  syntax:
    content: 'public interface ISlots : IMemory, IConfigurable'
    content.vb: Public Interface ISlots Inherits IMemory, IConfigurable
  seealso:
  - linkId: Emulator.IMemory
    commentId: T:Emulator.IMemory
