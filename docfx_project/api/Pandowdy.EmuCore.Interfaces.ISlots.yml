  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/Interfaces/ISlots.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: RemoveCard
    path: ../Pandowdy.EmuCore/Interfaces/ISlots.cs
    startLine: 219
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Removes the card from the specified slot, replacing it with an empty slot (NullCard).
  remarks: >-
    <p>

    This method replaces the card in the specified slot with a <xref href="Pandowdy.EmuCore.Interfaces.ICardFactory.GetNullCard" data-throw-if-not-resolved="false"></xref>

    instance. The NullCard returns <code>null</code> for all read operations and no-ops for all writes,

    causing the slot to behave as if it's empty (returning floating bus values for reads).

    </p>

    <p>

    Any state maintained by the removed card is lost. If the removed card was the active

    extended ROM slot (see <xref href="Pandowdy.EmuCore.Interfaces.ISlots.BankSelect" data-throw-if-not-resolved="false"></xref>), the extended ROM remains active

    but will return floating bus values since NullCard returns <code>null</code>.

    </p>

    <p>

    <strong>Note:</strong> This method cannot fail due to the card being "in use" since

    the emulator doesn't maintain references to installed cards outside the slots array.

    </p>
  example: []
  syntax:
    content: void RemoveCard(SlotNumber slot)
    parameters:
    - id: slot
      type: Pandowdy.EmuCore.Interfaces.SlotNumber
      description: The slot number (1-7) to clear.
    content.vb: Sub RemoveCard(slot As SlotNumber)
  overload: Pandowdy.EmuCore.Interfaces.ISlots.RemoveCard*
  exceptions:
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown if the card factory cannot create a NullCard replacement.
  seealso:
  - linkId: Pandowdy.EmuCore.Interfaces.ISlots.InstallCard(System.Int32,Pandowdy.EmuCore.Interfaces.SlotNumber)
    commentId: M:Pandowdy.EmuCore.Interfaces.ISlots.InstallCard(System.Int32,Pandowdy.EmuCore.Interfaces.SlotNumber)
