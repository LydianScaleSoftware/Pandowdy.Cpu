  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Installs a peripheral card in the specified slot using its human-readable name.
  remarks: >-
    <p>

    This method provides a more user-friendly alternative to <xref href="Pandowdy.EmuCore.Interfaces.ISlots.InstallCard(System.Int32%2cPandowdy.EmuCore.Interfaces.SlotNumber)" data-throw-if-not-resolved="false"></xref>

    by accepting the card's display name instead of its numeric ID. The card name must exactly

    match the value returned by <xref href="Pandowdy.EmuCore.Interfaces.ICard.Name" data-throw-if-not-resolved="false"></xref> (case-sensitive).

    </p>

    <p>

    Example usage:

    <pre><code class="lang-csharp">slots.InstallCard("Disk II Controller", SlotNumber.Slot6);

    slots.InstallCard("Super Serial Card", SlotNumber.Slot2);</code></pre>

    </p>

    <p>

    If a card is already installed in the specified slot, it is replaced by the new card.

    </p>
  example: []
  syntax:
    content: void InstallCard(string name, SlotNumber slot)
    parameters:
    - id: name
      type: System.String
      description: The name of the card type to install (see <xref href="Pandowdy.EmuCore.Interfaces.ICard.Name" data-throw-if-not-resolved="false"></xref>).
    - id: slot
      type: Pandowdy.EmuCore.Interfaces.SlotNumber
      description: The slot number (1-7) where the card should be installed.
    content.vb: Sub InstallCard(name As String, slot As SlotNumber)
  overload: Pandowdy.EmuCore.Interfaces.ISlots.InstallCard*
  exceptions:
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
