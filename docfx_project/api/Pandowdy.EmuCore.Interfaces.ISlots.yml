  fullName: Pandowdy.EmuCore.Interfaces.ISlots.InstallCard(int, Pandowdy.EmuCore.Interfaces.SlotNumber)
  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/Interfaces/ISlots.cs
