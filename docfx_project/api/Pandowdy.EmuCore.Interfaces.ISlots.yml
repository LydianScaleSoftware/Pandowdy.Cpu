- uid: Pandowdy.EmuCore.Interfaces.ISlots.GetCardIn(Pandowdy.EmuCore.Interfaces.SlotNumber)
  commentId: M:Pandowdy.EmuCore.Interfaces.ISlots.GetCardIn(Pandowdy.EmuCore.Interfaces.SlotNumber)
  id: GetCardIn(Pandowdy.EmuCore.Interfaces.SlotNumber)
  parent: Pandowdy.EmuCore.Interfaces.ISlots
  langs:
  - csharp
  - vb
  name: GetCardIn(SlotNumber)
  nameWithType: ISlots.GetCardIn(SlotNumber)
  fullName: Pandowdy.EmuCore.Interfaces.ISlots.GetCardIn(Pandowdy.EmuCore.Interfaces.SlotNumber)
  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/Interfaces/ISlots.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: GetCardIn
    path: ../Pandowdy.EmuCore/Interfaces/ISlots.cs
    startLine: 251
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Retrieves the card currently installed in the specified slot.
  remarks: >-
    <p>

    This method provides direct access to the card instance for inspection, debugging,

    or advanced operations. Normal emulator operation doesn't require calling this method

    since <xref href="Emulator.IMemory.Read(System.UInt16)" data-throw-if-not-resolved="false"></xref> and <xref href="Emulator.IMemory.Write(System.UInt16%2cSystem.Byte)" data-throw-if-not-resolved="false"></xref> automatically route

    to the appropriate card based on address.

    </p>

    <p>

    <strong>Usage Examples:</strong>


    <pre><code class="lang-csharp">// Check what's installed in slot 6

    ICard card = slots.GetCardIn(SlotNumber.Slot6);

    Console.WriteLine($"Slot 6: {card.Name}");


    // Verify a slot is empty

    if (slots.GetCardIn(SlotNumber.Slot3).Id == 0) // NullCard.Id == 0

    {
        Console.WriteLine("Slot 3 is empty");
    }</code></pre>

    </p>
  example: []
  syntax:
    content: ICard GetCardIn(SlotNumber slot)
    parameters:
    - id: slot
      type: Pandowdy.EmuCore.Interfaces.SlotNumber
      description: The slot number (1-7) to query.
    return:
      type: Pandowdy.EmuCore.Interfaces.ICard
      description: >-
        The <xref href="Pandowdy.EmuCore.Interfaces.ICard" data-throw-if-not-resolved="false"></xref> instance installed in the slot. Returns a <xref href="Pandowdy.EmuCore.Interfaces.ICardFactory.GetNullCard" data-throw-if-not-resolved="false"></xref>

        instance if the slot is empty.
    content.vb: Function GetCardIn(slot As SlotNumber) As ICard
  overload: Pandowdy.EmuCore.Interfaces.ISlots.GetCardIn*
- uid: Pandowdy.EmuCore.Interfaces.ISlots.IsEmpty(Pandowdy.EmuCore.Interfaces.SlotNumber)
  commentId: M:Pandowdy.EmuCore.Interfaces.ISlots.IsEmpty(Pandowdy.EmuCore.Interfaces.SlotNumber)
