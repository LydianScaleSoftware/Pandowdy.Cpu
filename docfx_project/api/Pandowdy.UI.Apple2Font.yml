    id: GetCharacterRow
    path: ../Pandowdy.UI/Apple2Font.cs
    startLine: 118
  assemblies:
  - Pandowdy.UI
  namespace: Pandowdy.UI
  summary: Gets a single row of pixels for a character.
  remarks: >-
    <p>

    This is more efficient than <xref href="Pandowdy.UI.Apple2Font.GetCharacterBitmap(System.Byte)" data-throw-if-not-resolved="false"></xref> when only a single row

    is needed for rendering or analysis.

    </p>

    <p>

    <strong>Bit Layout:</strong> Bit 0 (LSB) = leftmost pixel, Bit 6 = rightmost pixel, Bit 7 = unused.

    </p>
  example: []
  syntax:
    content: public static byte GetCharacterRow(byte charCode, int row)
    parameters:
    - id: charCode
      type: System.Byte
      description: ASCII character code (0-255)
    - id: row
      type: System.Int32
      description: Row index (0-7, where 0 is top row)
    return:
      type: System.Byte
      description: Byte representing 7 pixels (bits 0-6, where bit 0 is leftmost)
    content.vb: Public Shared Function GetCharacterRow(charCode As Byte, row As Integer) As Byte
  overload: Pandowdy.UI.Apple2Font.GetCharacterRow*
  exceptions:
  - type: System.ArgumentOutOfRangeException
    commentId: T:System.ArgumentOutOfRangeException
    description: Thrown if row is not in range 0-7.
  nameWithType.vb: Apple2Font.GetCharacterRow(Byte, Integer)
  fullName.vb: Pandowdy.UI.Apple2Font.GetCharacterRow(Byte, Integer)
