  assemblies:
  - Pandowdy.UI
  namespace: Pandowdy.UI
  summary: Gets the font bitmap data for a specific character.
  remarks: >-
    Each byte represents one row of the character, with bits 0-6 representing the 7 pixels

    (bit 0 = leftmost pixel, bit 6 = rightmost pixel). Bit 7 is unused.
  example: []
  syntax:
    content: public static byte[] GetCharacterBitmap(byte charCode)
    parameters:
    - id: charCode
      type: System.Byte
      description: ASCII character code (0-255)
    return:
      type: System.Byte[]
      description: 8-byte array containing the character bitmap (7 pixels wide, 8 pixels tall)
    content.vb: Public Shared Function GetCharacterBitmap(charCode As Byte) As Byte()
  overload: Pandowdy.UI.Apple2Font.GetCharacterBitmap*
  nameWithType.vb: Apple2Font.GetCharacterBitmap(Byte)
  fullName.vb: Pandowdy.UI.Apple2Font.GetCharacterBitmap(Byte)
  name.vb: GetCharacterBitmap(Byte)
