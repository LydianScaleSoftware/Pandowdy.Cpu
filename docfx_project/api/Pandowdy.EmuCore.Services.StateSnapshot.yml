  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Services
  summary: Immutable snapshot of the emulator's execution state at a specific point in time.
  remarks: >-
    This record is immutable and thread-safe. Each state change produces a new instance,

    which is published through <xref href="Pandowdy.EmuCore.Interfaces.IEmulatorState.Stream" data-throw-if-not-resolved="false"></xref> for reactive subscribers.
  example: []
  syntax:
    content: public StateSnapshot(ushort PC, byte SP, ulong Cycles, int? LineNumber, bool IsRunning, bool IsPaused)
    parameters:
    - id: PC
      type: System.UInt16
      description: Program Counter (16-bit address of the next instruction to execute)
    - id: SP
      type: System.Byte
      description: Stack Pointer (8-bit offset into the 6502 stack page at 0x0100-0x01FF)
    - id: Cycles
      type: System.UInt64
      description: Total CPU cycles executed since emulator start or reset
    - id: LineNumber
      type: System.Nullable{System.Int32}
      description: >-
        Optional line number in disassembly/source code corresponding to the current PC.

        Null if no source mapping is available.
    - id: IsRunning
      type: System.Boolean
      description: >-
        True if the emulator is actively executing instructions (RunAsync is active).

        False if stopped or not yet started.
    - id: IsPaused
      type: System.Boolean
      description: >-
        True if the emulator is paused (execution suspended but can be resumed).

        False if running or stopped.
    content.vb: Public Sub New(PC As UShort, SP As Byte, Cycles As ULong, LineNumber As Integer?, IsRunning As Boolean, IsPaused As Boolean)
  overload: Pandowdy.EmuCore.Services.StateSnapshot.#ctor*
