    startLine: 84
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Factory for creating instances of peripheral cards from registered prototypes.
  remarks: >-
    <p>

    The <xref href="Pandowdy.EmuCore.Interfaces.ICardFactory" data-throw-if-not-resolved="false"></xref> manages a registry of card prototypes and provides methods

    to create independent instances of cards for installation in expansion slots. This design

    allows multiple slots to use the same card type without sharing state.

    </p>

    <p>

    <strong>Prototype Pattern:</strong><br />

    The factory maintains a single prototype instance of each card type. When a card is requested,

    the factory calls the prototype's <xref href="Pandowdy.EmuCore.Interfaces.ICard.Clone" data-throw-if-not-resolved="false"></xref> method to create a fresh,

    independent instance. This ensures that:

    </p>

    <ul><li>Each slot gets its own card instance with independent state</li><li>Multiple slots can use the same card type simultaneously</li><li>Removing a card from one slot doesn't affect other slots</li><li>Card initialization occurs once during factory setup</li></ul>

    <p>

    <strong>Registration and Validation:</strong><br />

    Cards are registered during factory construction (typically via dependency injection).

    The factory validates that:

    </p>

    <ul><li>No two cards share the same ID (<xref href="Pandowdy.EmuCore.Interfaces.ICard.Id" data-throw-if-not-resolved="false"></xref>)</li><li>No two cards share the same name (<xref href="Pandowdy.EmuCore.Interfaces.ICard.Name" data-throw-if-not-resolved="false"></xref>, case-insensitive)</li><li>A <xref href="Pandowdy.EmuCore.NullCard" data-throw-if-not-resolved="false"></xref> (ID = 0) is always registered</li></ul>

    <p>

    Registration violations throw <xref href="System.InvalidOperationException" data-throw-if-not-resolved="false"></xref> during construction,

    preventing the emulator from starting with an invalid card configuration.

    </p>

    <p>

    <strong>Retrieval Methods:</strong><br />

    The factory provides three ways to retrieve cards:

    </p>

    <ol><li><xref href="Pandowdy.EmuCore.Interfaces.ICardFactory.GetCardWithId(System.Int32)" data-throw-if-not-resolved="false"></xref> - Look up by numeric ID (fastest, used for serialization)</li><li><xref href="Pandowdy.EmuCore.Interfaces.ICardFactory.GetCardWithName(System.String)" data-throw-if-not-resolved="false"></xref> - Look up by display name (user-friendly, used for configuration)</li><li><xref href="Pandowdy.EmuCore.Interfaces.ICardFactory.GetNullCard" data-throw-if-not-resolved="false"></xref> - Convenience method for empty slot placeholder (always succeeds)</li></ol>

    <p>

    All methods return <code>null</code> if the requested card is not registered, allowing callers

    to handle missing cards gracefully.

    </p>

    <p>

    <strong>Thread Safety:</strong><br />

    Implementations should be thread-safe for read operations (card creation). Write operations

    (card registration) occur only during factory construction. The prototype instances should

    not be modified after registration.

    </p>
  example:
  - >-
    <p>

    <strong>Typical usage in dependency injection:</strong>

    </p>


    <pre><code class="lang-csharp">// Register card prototypes

    services.AddSingleton&lt;ICardFactory&gt;(sp =&gt; new CardFactory(
        new ICard []
        {
            new NullCard(),
            new DiskIIController(),
            new SuperSerialCard(),
            new ThundercardController()
        }
    ));


    // Use factory to install cards

    var factory = serviceProvider.GetRequiredService&lt;ICardFactory&gt;();

    var slots = new Slots(factory, rom, floatingBus, status);


    slots.InstallCard("Disk II Controller", SlotNumber.Slot6);

    slots.InstallCard(2, SlotNumber.Slot2); // By ID</code></pre>
