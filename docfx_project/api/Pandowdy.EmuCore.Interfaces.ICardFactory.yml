  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Creates a new instance of a card by its human-readable name.
  remarks: >-
    <p>

    This method provides a user-friendly way to create cards using their display names

    instead of numeric IDs. The name comparison is case-insensitive to accommodate

    user input and configuration files. It's ideal for:

    </p>

    <ul><li>User configuration interfaces (card selection dialogs)</li><li>Text-based configuration files (JSON, XML, INI)</li><li>Command-line arguments and scripts</li></ul>

    <p>

    <strong>Return Value:</strong><br />

    The method returns <code>null</code> if the name is not found (or doesn't match any

    registered card after case-insensitive comparison). The <xref href="Pandowdy.EmuCore.Interfaces.ISlots.InstallCard(System.String%2cPandowdy.EmuCore.Interfaces.SlotNumber)" data-throw-if-not-resolved="false"></xref>

    method converts this <code>null</code> into an <xref href="System.InvalidOperationException" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    Each call creates a new, independent instance via <xref href="Pandowdy.EmuCore.Interfaces.ICard.Clone" data-throw-if-not-resolved="false"></xref>, ensuring

    that slots don't share card state.

    </p>

    <p>

    <strong>Name Uniqueness:</strong><br />

    The factory validates during construction that no two cards share the same name

    (case-insensitive). This ensures that name-based lookup is unambiguous.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">// Install a Disk II controller by name

    slots.InstallCard("Disk II Controller", SlotNumber.Slot6);


    // Case-insensitive lookup works

    slots.InstallCard("disk ii controller", SlotNumber.Slot5); // Also works


    // Check if a card type is available

    ICard? serialCard = factory.GetCardWithName("Super Serial Card");

    if (serialCard != null)

    {
        // Serial card is available
    }</code></pre>
  syntax:
    content: ICard? GetCardWithName(string name)
    parameters:
    - id: name
      type: System.String
      description: >-
        The display name of the card type (see <xref href="Pandowdy.EmuCore.Interfaces.ICard.Name" data-throw-if-not-resolved="false"></xref>).

        Comparison is case-insensitive. Examples: "Disk II Controller", "Super Serial Card".
    return:
      type: Pandowdy.EmuCore.Interfaces.ICard
      description: >-
        A new independent instance of the requested card type via <xref href="Pandowdy.EmuCore.Interfaces.ICard.Clone" data-throw-if-not-resolved="false"></xref>,

        or <code>null</code> if no card with the specified name is registered.
    content.vb: Function GetCardWithName(name As String) As ICard
  overload: Pandowdy.EmuCore.Interfaces.ICardFactory.GetCardWithName*
