  summary: Initializes a new instance of the <xref href="Pandowdy.EmuCore.Services.RandomFloatingBusProvider" data-throw-if-not-resolved="false"></xref> class with a specific seed.
  remarks: >-
    <p>

    Using a specific seed allows for reproducible behavior across multiple runs, which is

    useful for:

    <ul><li>Debugging - Reproduce specific floating bus sequences that trigger bugs</li><li>Testing - Ensure consistent test results across runs</li><li>Save states - Maintain consistent floating bus behavior when loading saved state</li></ul>

    </p>

    <p>

    <strong>Example:</strong>


    <pre><code class="lang-csharp">// Create deterministic floating bus provider for testing

    var floatingBus = new RandomFloatingBusProvider(12345);


    // Same seed produces same sequence

    var floatingBus2 = new RandomFloatingBusProvider(12345);

    Assert.Equal(floatingBus.Read(), floatingBus2.Read());</code></pre>

    </p>
