- uid: Pandowdy.UI.ViewModels.SystemStatusViewModel.#ctor(Pandowdy.EmuCore.Interfaces.ISystemStatusProvider)
  commentId: M:Pandowdy.UI.ViewModels.SystemStatusViewModel.#ctor(Pandowdy.EmuCore.Interfaces.ISystemStatusProvider)
  id: '#ctor(Pandowdy.EmuCore.Interfaces.ISystemStatusProvider)'
  parent: Pandowdy.UI.ViewModels.SystemStatusViewModel
  langs:
  - csharp
  - vb
  name: SystemStatusViewModel(ISystemStatusProvider)
  nameWithType: SystemStatusViewModel.SystemStatusViewModel(ISystemStatusProvider)
  fullName: Pandowdy.UI.ViewModels.SystemStatusViewModel.SystemStatusViewModel(Pandowdy.EmuCore.Interfaces.ISystemStatusProvider)
  type: Constructor
  source:
    remote:
      path: Pandowdy.UI/ViewModels/SystemStatusViewModel.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: .ctor
    path: ../Pandowdy.UI/ViewModels/SystemStatusViewModel.cs
    startLine: 463
  assemblies:
  - Pandowdy.UI
  namespace: Pandowdy.UI.ViewModels
  summary: Initializes a new instance of the <xref href="Pandowdy.UI.ViewModels.SystemStatusViewModel" data-throw-if-not-resolved="false"></xref> class.
  remarks: >-
    <p>

    <strong>Immediate Subscription:</strong> Unlike EmulatorStateViewModel, this view model

    subscribes immediately to the status stream without using WhenActivated. This ensures

    system status is always up-to-date and available for display.

    </p>

    <p>

    <strong>Initialization:</strong> After subscribing to the stream, applies the current

    snapshot from <xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider.Current" data-throw-if-not-resolved="false"></xref> to initialize all properties

    with correct starting values. This prevents a brief period where properties would be

    default (false) until the first update arrives.

    </p>

    <p>

    <strong>Update Frequency:</strong> System status updates are relatively infrequent

    (typically triggered by soft switch changes or periodic polling), so immediate subscription

    has minimal performance impact compared to the frequently-updating EmulatorState.

    </p>
  example: []
  syntax:
    content: public SystemStatusViewModel(ISystemStatusProvider status)
    parameters:
    - id: status
      type: Pandowdy.EmuCore.Interfaces.ISystemStatusProvider
      description: System status provider supplying reactive status updates.
    content.vb: Public Sub New(status As ISystemStatusProvider)
  overload: Pandowdy.UI.ViewModels.SystemStatusViewModel.#ctor*
  nameWithType.vb: SystemStatusViewModel.New(ISystemStatusProvider)
  fullName.vb: Pandowdy.UI.ViewModels.SystemStatusViewModel.New(Pandowdy.EmuCore.Interfaces.ISystemStatusProvider)
  name.vb: New(ISystemStatusProvider)
