  summary: Gets the size of the Language Card address space (12KB).
  remarks: >-
    Note: The Language Card uses 16KB of physical RAM, but only 12KB is addressable

    at any given time due to bank switching. The returned size matches the accessible

    address space ($D000-$FFFF).
  example: []
  syntax:
    content: public int Size { get; }
    parameters: []
    return:
      type: System.Int32
      description: Always returns 0x3000 (12,288 bytes), representing the $D000-$FFFF address range.
    content.vb: Public ReadOnly Property Size As Integer
