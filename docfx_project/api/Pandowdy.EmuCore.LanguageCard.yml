    id: Write
    path: ../Pandowdy.EmuCore/LanguageCard.cs
    startLine: 254
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Writes a byte to the Language Card address space.
  remarks: >-
    <p>

    <strong>Write Protection:</strong> Writes are only executed if

    <xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider.StateHighWrite" data-throw-if-not-resolved="false"></xref> is true. The Language Card

    uses a two-access sequence to enable writing, preventing accidental ROM overwrites.

    </p>

    <p>

    <strong>Write Decision Logic:</strong>


    <pre><code class="lang-csharp">If StateHighWrite is false:
      Return (no-op, ROM is write-protected)

    If StateRamWrt is true:
      Write to auxiliary RAM (or ignore if aux doesn't exist)
    Else:
      Write to main RAM</code></pre>
    </p>

    <p>

    <strong>Bank Selection:</strong> The <xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider.StateUseBank1" data-throw-if-not-resolved="false"></xref> flag determines

    which 4KB bank is written to for $D000-$DFFF. The $E000-$FFFF region is shared.

    </p>

    <p>

    <strong>ROM Write Attempts:</strong> Writes when StateHighWrite is false are

    silently ignored (no-op), matching Apple IIe hardware behavior where ROM writes

    have no effect.

    </p>

    <p>

    <strong>Performance:</strong> Aggressively inlined. Write protection check is

    the fast path (early return), keeping overhead minimal.

    </p>
  example: []
  syntax:
    content: public void Write(ushort address, byte data)
    parameters:
    - id: address
      type: System.UInt16
      description: >-
        Address to write to, typically in the $D000-$FFFF range (though any 16-bit

        address is accepted for calculation purposes).
    - id: data
      type: System.Byte
      description: Byte value to write.
    content.vb: Public Sub Write(address As UShort, data As Byte)
  overload: Pandowdy.EmuCore.LanguageCard.Write*
