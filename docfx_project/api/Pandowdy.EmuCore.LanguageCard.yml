    <strong>Convenience Syntax:</strong> Provides array-like access to the Language Card:

    <pre><code class="lang-csharp">byte value = languageCard[0xD000];  // Read

    languageCard[0xE000] = 0x42;        // Write</code></pre>

    </p>

    <p>

    <strong>Implementation:</strong> Getter delegates to <xref href="Pandowdy.EmuCore.LanguageCard.Read(System.UInt16)" data-throw-if-not-resolved="false"></xref>, setter

