  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Manages the Apple IIe Language Card memory banking for the $D000-$FFFF address space.
  remarks: >-
    <p>

    <strong>Purpose:</strong> Implements the Language Card banking mechanism that allows

    16KB of RAM to be mapped into the normally ROM-occupied address space ($D000-$FFFF),

    with two switchable 4KB banks for $D000-$DFFF and a shared 8KB region for $E000-$FFFF.

    </p>

    <p>

    <strong>Memory Layout:</strong>


    <pre><code class="lang-csharp">Apple IIe Address Space:

    $D000-$DFFF (4KB) - Bank 1 or Bank 2 (switchable)

    $E000-$FFFF (8KB) - Common area (shared between banks)


    Physical RAM Layout (16KB total):

    Bank 1: $0000-$0FFF (4KB) + $2000-$3FFF (8KB) = 12KB

    Bank 2: $1000-$3FFF (12KB)</code></pre>

    </p>

    <p>

    <strong>Banking Control:</strong> The Language Card reads state from

    <xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider" data-throw-if-not-resolved="false"></xref> to determine:

    <ul><li><xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider.StateHighRead" data-throw-if-not-resolved="false"></xref> - Read from RAM vs ROM</li><li><xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider.StateHighWrite" data-throw-if-not-resolved="false"></xref> - RAM write enable</li><li><xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider.StateUseBank1" data-throw-if-not-resolved="false"></xref> - Bank 1 vs Bank 2 selection</li><li><xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider.StateRamRd" data-throw-if-not-resolved="false"></xref> - Main vs auxiliary memory for reads</li><li><xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider.StateRamWrt" data-throw-if-not-resolved="false"></xref> - Main vs auxiliary memory for writes</li></ul>

    </p>

    <p>

    <strong>Design Philosophy:</strong> This class is a pure memory accessor that queries

    current state flags but does not manage state transitions. State management is handled

    by the soft switch controller, which updates the <xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider" data-throw-if-not-resolved="false"></xref>.

    This separation provides clean architecture, optimal performance, and excellent testability.

    </p>

    <p>

    <strong>Performance:</strong> All read/write methods use aggressive inlining for maximum

    performance in this hot path (called hundreds of thousands of times per second).

    </p>

    <p>

    <strong>Thread Safety:</strong> Not thread-safe. Assumes single-threaded CPU execution.

    The <xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider" data-throw-if-not-resolved="false"></xref> should handle any necessary synchronization.

    </p>
