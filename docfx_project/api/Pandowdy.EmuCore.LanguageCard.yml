    id: Read
    path: ../Pandowdy.EmuCore/LanguageCard.cs
    startLine: 199
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Reads a byte from the Language Card address space.
  remarks: >-
    <p>

    <strong>Read Decision Logic:</strong>


    <pre><code class="lang-csharp">If StateHighRead is true:
      If StateRamRd is true:
        Read from auxiliary RAM (or floating bus if aux doesn't exist)
      Else:
        Read from main RAM
    Else:
      Read from system ROM</code></pre>
    </p>

    <p>

    <strong>Floating Bus:</strong> If auxiliary memory is accessed but doesn't exist,

    returns the floating bus value instead. This models Apple IIe hardware behavior

    where unmapped memory reads return the last value on the data bus.

    </p>

    <p>

    <strong>Bank Selection:</strong> The <xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider.StateUseBank1" data-throw-if-not-resolved="false"></xref> flag determines

    which 4KB bank is accessed for $D000-$DFFF. The $E000-$FFFF region is shared.

    </p>

    <p>

    <strong>Performance:</strong> Aggressively inlined. Read from main RAM with ROM

    fallback is the common path and executes in ~7-10 cycles after inlining.

    </p>
  example: []
  syntax:
    content: public byte Read(ushort address)
    parameters:
    - id: address
      type: System.UInt16
      description: >-
        Address to read from, typically in the $D000-$FFFF range (though any 16-bit

        address is accepted for calculation purposes).
    return:
      type: System.Byte
      description: Byte value from RAM, ROM, or floating bus, depending on system state.
    content.vb: Public Function Read(address As UShort) As Byte
