  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Coordinates the generation of video frames from Apple IIe system state.
  remarks: >-
    This interface is responsible for orchestrating the frame rendering process by:

    <ul><li>Allocating render contexts with necessary dependencies (memory, status, frame buffer)</li><li>Invoking the appropriate renderer to convert video memory into displayable pixels</li><li>Managing the rendering pipeline from system state to final frame buffer</li></ul>

    <p>

    The frame generator acts as a coordinator between the emulator core (which provides

    system state and memory) and the renderer (which produces pixels). It abstracts

    the details of render context creation and renderer invocation, providing a simple

    interface for the UI or display subsystem to request rendered frames.

    </p>

    <p>

    Typical usage pattern:

    <pre><code class="lang-csharp">var context = frameGenerator.AllocateRenderContext();

    frameGenerator.RenderFrame(context);

    // context.FrameBuffer now contains the rendered frame</code></pre>

    </p>
  example: []
  syntax:
    content: public interface IFrameGenerator
    content.vb: Public Interface IFrameGenerator
- uid: Pandowdy.EmuCore.Interfaces.IFrameGenerator.AllocateRenderContext
  commentId: M:Pandowdy.EmuCore.Interfaces.IFrameGenerator.AllocateRenderContext
  id: AllocateRenderContext
  parent: Pandowdy.EmuCore.Interfaces.IFrameGenerator
  langs:
  - csharp
  - vb
  name: AllocateRenderContext()
  nameWithType: IFrameGenerator.AllocateRenderContext()
  fullName: Pandowdy.EmuCore.Interfaces.IFrameGenerator.AllocateRenderContext()
  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/Interfaces/IFrameGenerator.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: AllocateRenderContext
    path: ../Pandowdy.EmuCore/Interfaces/IFrameGenerator.cs
    startLine: 54
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Allocates and initializes a render context for frame generation.
  remarks: >-
    This method creates a render context that packages together all the dependencies

    needed for frame rendering:

    <ul><li><strong>Frame buffer</strong> - The writable bitmap where pixels will be rendered</li><li><strong>Memory access</strong> - Direct access to video memory (main and auxiliary)</li><li><strong>System status</strong> - Current soft switch states (video mode, page selection, etc.)</li></ul>

    <p>

    The allocated context is typically short-lived, used for rendering a single frame

    and then discarded. For performance, the underlying frame buffer may be reused

    through a double-buffering mechanism managed by the <xref href="Pandowdy.EmuCore.Interfaces.IFrameProvider" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    This method should be called once per frame, typically in response to a VBlank

    event or refresh timer tick (~60 Hz).

    </p>
  example: []
  syntax:
    content: RenderContext AllocateRenderContext()
    return:
      type: Pandowdy.EmuCore.RenderContext
      description: >-
        A <xref href="Pandowdy.EmuCore.RenderContext" data-throw-if-not-resolved="false"></xref> containing the frame buffer, memory access,

        and system status required for rendering a frame.
    content.vb: Function AllocateRenderContext() As RenderContext
  overload: Pandowdy.EmuCore.Interfaces.IFrameGenerator.AllocateRenderContext*
- uid: Pandowdy.EmuCore.Interfaces.IFrameGenerator.RenderFrame(Pandowdy.EmuCore.RenderContext)
  commentId: M:Pandowdy.EmuCore.Interfaces.IFrameGenerator.RenderFrame(Pandowdy.EmuCore.RenderContext)
  id: RenderFrame(Pandowdy.EmuCore.RenderContext)
  parent: Pandowdy.EmuCore.Interfaces.IFrameGenerator
  langs:
  - csharp
  - vb
  name: RenderFrame(RenderContext)
  nameWithType: IFrameGenerator.RenderFrame(RenderContext)
  fullName: Pandowdy.EmuCore.Interfaces.IFrameGenerator.RenderFrame(Pandowdy.EmuCore.RenderContext)
  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/Interfaces/IFrameGenerator.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: RenderFrame
    path: ../Pandowdy.EmuCore/Interfaces/IFrameGenerator.cs
    startLine: 88
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Renders the current Apple IIe video state into the provided context's frame buffer.
  remarks: >-
    This method invokes the configured renderer (typically <xref href="Pandowdy.EmuCore.Interfaces.IDisplayBitmapRenderer" data-throw-if-not-resolved="false"></xref>)

    to convert the current video memory contents and mode settings into a displayable

    bitmap. The rendering process:

    <ol><li>Examines the system status to determine active video mode (text/graphics, mixed, etc.)</li><li>Reads video memory from the appropriate pages (main/auxiliary, page 1/2)</li><li>Applies character ROM lookups for text modes or color generation for graphics modes</li><li>Writes the resulting pixels to the context's frame buffer</li><li>Invalidates the context to prevent reuse (implementation detail)</li></ol>

    <p>

    This method should complete quickly (ideally under 16ms for 60 fps) to maintain

    smooth frame rates. The actual rendering work is delegated to the renderer

    implementation, which may employ various optimizations (dirty rectangle tracking,

    scanline caching, etc.).

    </p>

    <p>

    <strong>Context Lifetime:</strong> After this method completes, the provided context

    is invalidated and cannot be reused. Attempting to access properties or call methods

    on the context after this method returns will throw <xref href="System.InvalidOperationException" data-throw-if-not-resolved="false"></xref>.

    Allocate a new context for each frame via <xref href="Pandowdy.EmuCore.Interfaces.IFrameGenerator.AllocateRenderContext" data-throw-if-not-resolved="false"></xref>.

    </p>
  example: []
  syntax:
    content: void RenderFrame(RenderContext context)
    parameters:
    - id: context
      type: Pandowdy.EmuCore.RenderContext
      description: >-
        The <xref href="Pandowdy.EmuCore.RenderContext" data-throw-if-not-resolved="false"></xref> containing the frame buffer, memory access,

        and system status. Typically obtained from <xref href="Pandowdy.EmuCore.Interfaces.IFrameGenerator.AllocateRenderContext" data-throw-if-not-resolved="false"></xref>.

        As a reference type, the context's invalidation state is shared across all references.
    content.vb: Sub RenderFrame(context As RenderContext)
  overload: Pandowdy.EmuCore.Interfaces.IFrameGenerator.RenderFrame*
