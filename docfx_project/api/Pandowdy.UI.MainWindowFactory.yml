    id: Create
    path: ../Pandowdy.UI/MainWindowFactory.cs
    startLine: 167
  assemblies:
  - Pandowdy.UI
  namespace: Pandowdy.UI
  summary: Creates a new <xref href="Pandowdy.UI.MainWindow" data-throw-if-not-resolved="false"></xref> instance and initializes it with all dependencies.
  remarks: >-
    <p>

    <strong>Atomic Operation:</strong> This method performs both construction and initialization

    as a single atomic operation, ensuring the returned window is always in a consistent,

    fully-initialized state.

    </p>

    <p>

    <strong>Creation Steps:</strong>

    <ol><li>Call MainWindow parameterless constructor (XAML loading, minimal setup)</li><li>Call window.Initialize() with all dependencies (complete setup)</li><li>Restore window position/size BEFORE showing (Windows 11 compatibility)</li><li>Return fully-initialized window</li></ol>

    </p>

    <p>

    <strong>Windows 11 Position Restore:</strong> Window position and size are restored

    BEFORE the window is shown. This significantly improves the chance that Windows 11

    will respect the saved position instead of applying its own "smart" placement algorithm.

    </p>

    <p>

    <strong>Multi-Monitor Support:</strong> Validates that saved positions are still on-screen.

    If the monitor was disconnected or position is invalid, falls back to centered on primary.

    </p>

    <p>

    <strong>What's Initialized:</strong>

    <ul><li>ViewModel and DataContext set</li><li>Machine and frame provider attached to Apple2Display</li><li>SoftSwitchStatusPanel initialized with its view model</li><li>ReactiveUI subscriptions set up (7 property subscriptions + 4 command bridges)</li><li>Window position/size restored from saved settings</li><li>Display settings restored from configuration file</li></ul>

    </p>

    <p>

    <strong>Exception Safety:</strong> If Initialize() throws an exception (e.g., ScreenDisplay

    control not found in XAML), the exception propagates to the caller. The partially-constructed

    window should be discarded.

    </p>

    <p>

    <strong>Usage:</strong>


    <pre><code class="lang-csharp">var factory = serviceProvider.GetRequiredService&lt;IMainWindowFactory&gt;();

    var window = factory.Create();

    window.Show(); // Window is ready to show at saved position</code></pre>

    </p>
  example: []
  syntax:
    content: public MainWindow Create()
    return:
      type: Pandowdy.UI.MainWindow
      description: >-
        A fully initialized MainWindow ready to be shown. All dependencies are injected,

        reactive subscriptions are set up, position/size restored, and settings loaded.
    content.vb: Public Function Create() As MainWindow
  overload: Pandowdy.UI.MainWindowFactory.Create*
  exceptions:
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: >-
      Thrown by MainWindow.Initialize() if called more than once (shouldn't happen in normal usage)

      or if required controls (e.g., ScreenDisplay) are not found in XAML.
