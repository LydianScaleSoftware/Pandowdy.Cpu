    parameters:
    - id: State80Store
      type: System.Boolean
      description: 80STORE switch - redirects page 2 to aux memory ($C000/$C001).
    - id: StateRamRd
      type: System.Boolean
      description: RAMRD switch - reads from aux memory ($C002/$C003).
    - id: StateRamWrt
      type: System.Boolean
      description: RAMWRT switch - writes to aux memory ($C004/$C005).
    - id: StateIntCxRom
      type: System.Boolean
      description: INTCXROM switch - uses internal ROM vs slot ROMs ($C006/$C007).
    - id: StateAltZp
      type: System.Boolean
      description: ALTZP switch - uses aux zero page and stack ($C008/$C009).
    - id: StateSlotC3Rom
      type: System.Boolean
      description: SLOTC3ROM switch - enables slot 3 ROM ($C00A/$C00B).
    - id: StatePb0
      type: System.Boolean
      description: Paddle button 0 state.
    - id: StatePb1
      type: System.Boolean
      description: Paddle button 1 state.
    - id: StatePb2
      type: System.Boolean
      description: Paddle button 2 state.
    - id: StateAnn0
      type: System.Boolean
      description: Annunciator 0 state ($C058/$C059).
    - id: StateAnn1
      type: System.Boolean
      description: Annunciator 1 state ($C05A/$C05B).
    - id: StateAnn2
      type: System.Boolean
      description: Annunciator 2 state ($C05C/$C05D).
    - id: StateAnn3_DGR
      type: System.Boolean
      description: Annunciator 3 / Double Graphics state ($C05E/$C05F).
    - id: StatePage2
      type: System.Boolean
      description: PAGE2 switch - selects page 1 or 2 ($C054/$C055).
    - id: StateHiRes
      type: System.Boolean
      description: HIRES switch - graphics vs text ($C056/$C057).
    - id: StateMixed
      type: System.Boolean
      description: MIXED switch - mixed graphics and text ($C052/$C053).
    - id: StateTextMode
      type: System.Boolean
      description: TEXT switch - text mode on/off ($C050/$C051).
    - id: StateShow80Col
      type: System.Boolean
      description: 80COL switch - 80-column display ($C00C/$C00D).
    - id: StateAltCharSet
      type: System.Boolean
      description: ALTCHARSET switch - alternate character set ($C00E/$C00F).
    - id: StateFlashOn
      type: System.Boolean
      description: Flash state for inverse/flashing characters (timing-based).
    - id: StatePrewrite
      type: System.Boolean
      description: PREWRITE flag for language card bank switching.
    - id: StateUseBank1
      type: System.Boolean
      description: Language card bank selection (bank 1 vs bank 2).
    - id: StateHighRead
      type: System.Boolean
      description: Language card read enable ($D000-$FFFF).
    - id: StateHighWrite
      type: System.Boolean
      description: Language card write enable ($D000-$FFFF).
