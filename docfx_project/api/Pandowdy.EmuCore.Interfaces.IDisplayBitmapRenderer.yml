  fullName: Pandowdy.EmuCore.Interfaces.IDisplayBitmapRenderer.Render(Pandowdy.EmuCore.RenderContext)
  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/Interfaces/IDisplayBitmapRenderer.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: Render
    path: ../Pandowdy.EmuCore/Interfaces/IDisplayBitmapRenderer.cs
    startLine: 48
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Renders the current Apple IIe video state into the provided frame buffer.
  remarks: >-
    This method examines the video mode flags in the context (text/graphics, mixed mode,

    hi-res/lo-res, page selection) and renders the appropriate video content:

    <ul><li>Reads from the correct video memory page (page 1 or page 2) based on soft switches</li><li>Interprets memory contents according to the active video mode</li><li>Handles character ROM lookups for text mode, including flashing characters and MouseText</li><li>Applies Apple IIe color generation rules for graphics modes</li><li>Renders mixed mode by combining graphics and text regions</li><li>Outputs pixels to the frame buffer in a format ready for display</li></ul>

    <p>

    This method should be called once per video frame (typically 60 times per second)

    to keep the display synchronized with video memory changes. The rendering process

    directly reads memory through <xref href="Pandowdy.EmuCore.Interfaces.IDirectMemoryPoolReader" data-throw-if-not-resolved="false"></xref> to access both

    main and auxiliary video pages without going through the CPU bus.

    </p>
  example: []
  syntax:
    content: void Render(RenderContext context)
    parameters:
    - id: context
      type: Pandowdy.EmuCore.RenderContext
      description: >-
        A <xref href="Pandowdy.EmuCore.RenderContext" data-throw-if-not-resolved="false"></xref> containing the frame buffer
            to render into, direct memory access for reading video RAM, and system status
            information including video mode soft switches.
    content.vb: Sub Render(context As RenderContext)
  overload: Pandowdy.EmuCore.Interfaces.IDisplayBitmapRenderer.Render*
