  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Defines a renderer capable of converting Apple IIe video memory into a displayable bitmap.
  remarks: >-
    This interface abstracts the process of rendering Apple IIe video modes (text mode,

    lo-res graphics, hi-res graphics, and mixed modes) into a bitmap format suitable for

    display. Implementations read directly from the video memory pages, interpret the

    video mode soft switches, and produce a pixel-accurate representation of what would

    appear on an Apple IIe monitor.

    <p>

    The Apple IIe supports several video modes:

    <ul><li>Text Mode: 40-column or 80-column text with 24 rows</li><li>Lo-Res Graphics: 40x48 color blocks (16 colors)</li><li>Hi-Res Graphics: 280x192 pixels (6 colors plus black and white)</li><li>Mixed Mode: Graphics on top 20 rows, text on bottom 4 rows</li></ul>

    Each mode may use page 1 ($0400/$2000) or page 2 ($0800/$4000) video memory.

    </p>
  example: []
  syntax:
    content: public interface IDisplayBitmapRenderer
    content.vb: Public Interface IDisplayBitmapRenderer
- uid: Pandowdy.EmuCore.Interfaces.IDisplayBitmapRenderer.Render(Pandowdy.EmuCore.RenderContext)
