      repo: https://github.com/markdavidlong/Pandowdy.git
    id: InterruptRequest
    path: ../Pandowdy.EmuCore/Interfaces/ICpu.cs
    startLine: 108
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Triggers an Interrupt Request (IRQ), causing the CPU to jump to the IRQ handler.
  remarks: >-
    IRQ is a maskable hardware interrupt that can be disabled by setting the I flag

    in the Status register. When triggered and not masked, the CPU:

    <ol><li>Finishes the current instruction</li><li>Pushes PC (high byte, then low byte) onto the stack</li><li>Pushes Status register onto the stack</li><li>Sets the I flag to disable further IRQs</li><li>Loads PC from the IRQ vector at $FFFE-$FFFF</li></ol>

    On the Apple IIe, IRQ is not commonly used.
  example: []
  syntax:
    content: void InterruptRequest(IAppleIIBus bus)
    parameters:
    - id: bus
      type: Pandowdy.EmuCore.Interfaces.IAppleIIBus
      description: The system bus for memory and I/O access
    content.vb: Sub InterruptRequest(bus As IAppleIIBus)
  overload: Pandowdy.EmuCore.Interfaces.ICpu.InterruptRequest*
