  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/Interfaces/ICpu.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: Reset
    path: ../Pandowdy.EmuCore/Interfaces/ICpu.cs
    startLine: 166
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Resets the CPU to its power-on state.
  remarks: >-
    Reset initializes the CPU to a known state:

    <ul><li>PC is loaded from the reset vector at $FFFC-$FFFD</li><li>SP is set to $FD (or $FF on some implementations)</li><li>Status register is initialized with I flag set (interrupts disabled)</li><li>A, X, Y registers are not initialized (undefined state)</li></ul>

    This simulates powering on the computer or pressing the reset key.

    On the Apple IIe, the reset vector typically points to the monitor ROM at $FF59.
  example: []
  syntax:
    content: void Reset(IAppleIIBus bus)
    parameters:
    - id: bus
      type: Pandowdy.EmuCore.Interfaces.IAppleIIBus
      description: The system bus for memory and I/O access
    content.vb: Sub Reset(bus As IAppleIIBus)
  overload: Pandowdy.EmuCore.Interfaces.ICpu.Reset*
