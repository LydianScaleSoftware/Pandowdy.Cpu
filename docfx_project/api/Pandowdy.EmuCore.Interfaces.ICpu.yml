  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Triggers a Non-Maskable Interrupt (NMI), causing the CPU to jump to the NMI handler.
  remarks: >-
    NMI is a high-priority hardware interrupt that cannot be disabled. When triggered,

    the CPU behaves similarly to IRQ but uses the NMI vector at $FFFA-$FFFB:

    <ol><li>Finishes the current instruction</li><li>Pushes PC (high byte, then low byte) onto the stack</li><li>Pushes Status register onto the stack</li><li>Sets the I flag to disable IRQs</li><li>Loads PC from the NMI vector at $FFFA-$FFFB</li></ol>
  example: []
  syntax:
    content: void NonMaskableInterrupt(IAppleIIBus bus)
    parameters:
    - id: bus
      type: Pandowdy.EmuCore.Interfaces.IAppleIIBus
      description: The system bus for memory and I/O access
    content.vb: Sub NonMaskableInterrupt(bus As IAppleIIBus)
  overload: Pandowdy.EmuCore.Interfaces.ICpu.NonMaskableInterrupt*
