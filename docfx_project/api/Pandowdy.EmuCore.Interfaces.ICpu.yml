    path: ../Pandowdy.EmuCore/Interfaces/ICpu.cs
    startLine: 120
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Checks whether the current instruction has completed execution.
  remarks: >-
    Since 6502 instructions take multiple clock cycles, this method allows external

    code to determine when an instruction boundary has been reached, which is useful

    for debugging, breakpoints, and cycle-accurate timing.
  example: []
  syntax:
    content: bool IsInstructionComplete()
    return:
      type: System.Boolean
      description: >-
        True if the current instruction is complete and the CPU is ready
            to fetch the next instruction; false if the instruction is still executing.
    content.vb: Function IsInstructionComplete() As Boolean
  overload: Pandowdy.EmuCore.Interfaces.ICpu.IsInstructionComplete*
