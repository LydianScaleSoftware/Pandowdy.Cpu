  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Initializes a new instance of the VA2MBus class.
  remarks: >-
    <p>

    <strong>Initialization Sequence:</strong>

    <ol><li>Store dependency references</li><li>Initialize I/O read handler dictionary (InitIoReadHandlers)</li><li>Initialize I/O write handler dictionary (InitIoWriteHandlers)</li><li>Register MemoryPool as soft switch responder (for memory remapping)</li><li>Register SystemStatusProvider as soft switch responder (for UI updates)</li></ol>

    </p>

    <p>

    <strong>I/O Handler Dictionaries:</strong> The bus maintains two dictionaries mapping I/O

    addresses to handler functions. This provides efficient dispatch and clear organization

    of I/O space behavior.

    </p>
  example: []
  syntax:
    content: public VA2MBus(MemoryPool mempool, ISystemStatusProvider statusProvider, ICpu cpu)
    parameters:
    - id: mempool
      type: Pandowdy.EmuCore.MemoryPool
      description: Memory pool managing 128KB Apple IIe memory space.
    - id: statusProvider
      type: Pandowdy.EmuCore.Interfaces.ISystemStatusProvider
      description: System status provider implementing ISoftSwitchResponder for status updates.
    - id: cpu
      type: Pandowdy.EmuCore.Interfaces.ICpu
      description: CPU instance (6502 emulator) to connect to this bus.
    content.vb: Public Sub New(mempool As MemoryPool, statusProvider As ISystemStatusProvider, cpu As ICpu)
  overload: Pandowdy.EmuCore.VA2MBus.#ctor*
