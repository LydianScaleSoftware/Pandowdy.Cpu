    path: ../Pandowdy.EmuCore/VA2MBus.cs
    startLine: 1291
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Disposes the bus, cleaning up resources and preventing further operation.
  remarks: >-
    <p>

    <strong>Cleanup Operations:</strong>

    <ul><li>Set _disposed flag to true</li><li>Clear VBlank event subscribers (prevent event handler leaks)</li></ul>

    </p>

    <p>

    <strong>Post-Disposal Behavior:</strong>

    <ul><li>Clock() becomes a no-op (returns immediately)</li><li>CpuRead/CpuWrite throw ObjectDisposedException</li><li>VBlank event is never fired again</li></ul>

    </p>

    <p>

    <strong>Idempotent:</strong> Multiple calls to Dispose() are safe (no-op after first call).

    </p>

    <p>

    <strong>Thread Safety:</strong> Should be called from the thread that owns the bus instance

    (typically after stopping emulation).

    </p>
  example: []
  syntax:
    content: public void Dispose()
    content.vb: Public Sub Dispose()
  overload: Pandowdy.EmuCore.VA2MBus.Dispose*
  implements:
  - System.IDisposable.Dispose
