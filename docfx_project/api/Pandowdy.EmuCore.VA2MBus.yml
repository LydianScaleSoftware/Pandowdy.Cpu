    id: VBlank
    path: ../Pandowdy.EmuCore/VA2MBus.cs
    startLine: 216
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Event raised every ~60 Hz (17,063 cycles) to signal vertical blanking interval.
  remarks: >-
    <p>

    <strong>Timing:</strong> Fires at 1,023,000 Hz / 17,063 cycles ≈ 60.02 Hz (NTSC).

    </p>

    <p>

    <strong>Thread Context:</strong> Always raised on the emulator thread. UI subscribers

    must marshal to UI thread via Dispatcher.BeginInvoke or similar.

    </p>

    <p>

    <strong>Use Cases:</strong>

    <ul><li>Frame rendering synchronization</li><li>Cursor blink timing</li><li>Status snapshot generation</li><li>Audio buffer flushing</li></ul>

    </p>
  example: []
  syntax:
    content: public event EventHandler? VBlank
    return:
      type: System.EventHandler
    content.vb: Public Event VBlank As EventHandler
