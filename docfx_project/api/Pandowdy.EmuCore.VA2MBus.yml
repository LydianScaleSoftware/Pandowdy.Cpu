  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Performs a full system reset (power cycle).
  remarks: >-
    <p>

    <strong>Reset Operations:</strong>

    <ol><li>Reset memory ranges (MemoryPool.ResetRanges)</li><li>Reset all soft switches to power-on state</li><li>Reset CPU (PC loaded from $FFFC/$FFFD, SP = $FF)</li><li>Reset system clock to zero</li><li>Reset VBlank cycle counter</li></ol>

    </p>

    <p>

    <strong>Difference from UserReset:</strong> Reset() is a cold boot that clears everything.

    <xref href="Pandowdy.EmuCore.VA2MBus.UserReset" data-throw-if-not-resolved="false"></xref> is a warm reset that preserves more state.

    </p>

    <p>

    <strong>Thread Context:</strong> Must be called from emulator thread only.

    </p>
