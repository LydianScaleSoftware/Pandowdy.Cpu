  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Main Apple IIe emulator orchestrator coordinating CPU, bus, memory, and timing.
  remarks: >-
    <p>

    <strong>⚠️ PLANNED FOR REFACTORING:</strong> This class will be refactored to separate

    concerns (timing, input, state publishing) into dedicated services. See

    Pandowdy.EmuCore/_docs_/VA2MBus-Refactoring-Notes.md for planned architecture.

    </p>

    <p>

    <strong>Name Origin:</strong> "VA2M" = "Virtual Apple II Machinator" - the machine

    orchestrator that brings together all emulator subsystems.

    </p>

    <p>

    <strong>Threading Model:</strong>

    <ul><li><strong>Emulator Thread:</strong> Single-threaded CPU execution (Clock/RunAsync loop)</li><li><strong>External Threads:</strong> UI/input threads enqueue commands via InjectKey(), etc.</li><li><strong>Flash Timer:</strong> Separate timer thread toggles cursor at ~2.1 Hz</li><li><strong>Synchronization:</strong> Commands processed at frame boundaries (thread-safe)</li></ul>

    </p>

    <p>

    <strong>Execution Modes:</strong>

    <ul><li><strong>Clock():</strong> Single-cycle execution, useful for debugging/stepping</li><li><strong>RunAsync():</strong> Continuous batched execution, normal operation mode</li></ul>

    </p>
