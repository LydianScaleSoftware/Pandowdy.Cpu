    path: ../Pandowdy.EmuCore/VA2M.cs
    startLine: 1091
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Sets the state of an Apple IIe pushbutton (game controller button).
  remarks: >-
    <p>

    <strong>Apple IIe Pushbutton Hardware:</strong> The Apple IIe has three pushbutton

    inputs typically used for game controllers (joysticks/paddles). These are read from

    I/O addresses $C061-$C063.

    </p>

    <p>

    <strong>Button Mapping:</strong>

    <ul><li><strong>Button 0 ($C061):</strong> Typically joystick/paddle button 0</li><li><strong>Button 1 ($C062):</strong> Typically joystick/paddle button 1</li><li><strong>Button 2 ($C063):</strong> Typically joystick/paddle button 2</li></ul>

    </p>

    <p>

    <strong>Reading Buttons:</strong> Software reads the button state by checking bit 7

    of the corresponding I/O address. If bit 7 is set, the button is pressed.

    </p>

    <p>

    <strong>Thread Safety:</strong> This method is thread-safe. It enqueues the button

    state change which will be executed on the emulator thread at the next ProcessPending() call.

    </p>
  example: []
  syntax:
    content: public void SetPushButton(byte num, bool pressed)
    parameters:
    - id: num
      type: System.Byte
      description: Button number (0-2). Button 0 is typically button 0, buttons 1-2 are paddle buttons.
    - id: pressed
      type: System.Boolean
      description: True if button is pressed, false if released.
    content.vb: Public Sub SetPushButton(num As Byte, pressed As Boolean)
  overload: Pandowdy.EmuCore.VA2M.SetPushButton*
  nameWithType.vb: VA2M.SetPushButton(Byte, Boolean)
  fullName.vb: Pandowdy.EmuCore.VA2M.SetPushButton(Byte, Boolean)
  name.vb: SetPushButton(Byte, Boolean)
