  - csharp
  - vb
  name: RunAsync(CancellationToken, double)
  nameWithType: VA2M.RunAsync(CancellationToken, double)
  fullName: Pandowdy.EmuCore.VA2M.RunAsync(System.Threading.CancellationToken, double)
  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/VA2M.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: RunAsync
    path: ../Pandowdy.EmuCore/VA2M.cs
    startLine: 834
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: >-
    Run the emulator asynchronously with batched cycles and time slices.

    Batches cycles per tick (e.g.,1 ms or 60 Hz) to reduce overhead of per-cycle waits.

    When ThrottleEnabled is true, pacing uses the periodic timer to approximate TargetHz.

    When false, runs fast batches without waiting.
  remarks: >-
    <p>

    <strong>Throttled Mode (ThrottleEnabled = true):</strong>

    <ul><li>Uses PeriodicTimer to wait for each tick (e.g., 1ms or ~16.67ms for 60 Hz)</li><li>Executes calculated number of cycles per tick (TargetHz / ticksPerSecond)</li><li>Accumulates fractional cycles to prevent drift over time</li><li>Processes pending commands before each batch</li><li>Publishes state after each batch</li></ul>

    </p>

    <p>

    <strong>Fast Mode (ThrottleEnabled = false):</strong>

    <ul><li>Executes 10,000 cycle batches as fast as possible</li><li>No timer delays (runs full CPU speed)</li><li>Yields with Task.Delay(0) to remain responsive</li><li>Useful for loading programs quickly or testing</li></ul>

    </p>

    <p>

    <strong>Recommended ticksPerSecond Values:</strong>

    <ul><li><strong>1000:</strong> 1ms time slices, ~1,023 cycles/tick (balanced)</li><li><strong>60:</strong> ~16.67ms slices, ~17,050 cycles/tick (matches VBlank)</li><li><strong>100:</strong> 10ms slices, ~10,230 cycles/tick (less frequent)</li></ul>

    </p>

    <p>

    <strong>Fractional Cycle Accumulation:</strong> The algorithm tracks fractional

    cycles with a carry variable to prevent cumulative drift. For example, with

    ticksPerSecond=1000, each tick should execute 1023 cycles, but the fractional

    0.0 carry is accumulated so over time the average is exactly 1,023,000 Hz.

    </p>

    <p>

    <strong>Cancellation:</strong> The loop checks the cancellation token after each

    batch and breaks cleanly. OperationCanceledException is caught and handled gracefully.

    </p>

    <p>

    <strong>ConfigureAwait(false):</strong> Used to avoid capturing synchronization

    context, improving performance and preventing potential deadlocks in UI scenarios.

    </p>
  example: []
  syntax:
    content: public Task RunAsync(CancellationToken ct, double ticksPerSecond = 1000)
    parameters:
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token to stop the runner.
    - id: ticksPerSecond
      type: System.Double
      description: Time slice frequency. Use 1000 for 1ms slices or 60 for video-frame pacing.
    return:
      type: System.Threading.Tasks.Task
      description: A task that completes when the cancellation token is triggered or the emulator stops.
    content.vb: Public Function RunAsync(ct As CancellationToken, ticksPerSecond As Double = 1000) As Task
  overload: Pandowdy.EmuCore.VA2M.RunAsync*
  exceptions:
  - type: System.ArgumentOutOfRangeException
    commentId: T:System.ArgumentOutOfRangeException
    description: Thrown if <code class="paramref">ticksPerSecond</code> is zero or negative.
  nameWithType.vb: VA2M.RunAsync(CancellationToken, Double)
  fullName.vb: Pandowdy.EmuCore.VA2M.RunAsync(System.Threading.CancellationToken, Double)
  name.vb: RunAsync(CancellationToken, Double)
