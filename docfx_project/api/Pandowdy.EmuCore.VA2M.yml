  namespace: Pandowdy.EmuCore
  summary: Enqueues generation of a system status snapshot containing soft switch and button states.
  remarks: >-
    <p>

    <strong>Purpose:</strong> Triggers creation of a comprehensive system status snapshot

    that includes all soft switches (memory mapping, video modes, ROM, annunciators)

    and pushbutton states.

    </p>

    <p>

    <strong>Thread Safety:</strong> This method is thread-safe. It enqueues the status

    generation command which will be executed on the emulator thread via <xref href="Pandowdy.EmuCore.VA2M.BuildStatusData" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    <strong>Typical Usage:</strong> Called periodically (e.g., at frame boundaries or on-demand)

    to update UI displays showing soft switch states, debug panels, or system status indicators.

    </p>

    <p>

    <strong>Snapshot Contents:</strong> See <xref href="Pandowdy.EmuCore.VA2M.BuildStatusData" data-throw-if-not-resolved="false"></xref> for details

    on what data is captured in the status snapshot.

    </p>
  example: []
  syntax:
    content: public void GenerateStatusData()
    content.vb: Public Sub GenerateStatusData()
