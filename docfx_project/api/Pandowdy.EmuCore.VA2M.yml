    path: ../Pandowdy.EmuCore/VA2M.cs
    startLine: 545
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: >-
    Advance one system clock (one CPU/bus cycle). If throttling is enabled,

    the call will delay to keep approx TargetHz. Suitable for simple loops.
  remarks: >-
    <p>

    <strong>Execution Sequence:</strong>

    <ol><li>Process pending cross-thread commands (ProcessPending)</li><li>Execute one bus clock cycle (CPU + memory + I/O)</li><li>Increment throttle cycle counter</li><li>Apply throttling delay if enabled (ThrottleOneCycle)</li><li>Publish emulator state snapshot</li></ol>

    </p>

    <p>

    <strong>Use Cases:</strong>

    <ul><li>Single-step debugging (execute one instruction at a time)</li><li>Simple synchronous execution loops</li><li>Testing and verification scenarios</li></ul>

    </p>

    <p>

    <strong>Performance Note:</strong> For continuous operation, use <xref href="Pandowdy.EmuCore.VA2M.RunAsync(System.Threading.CancellationToken%2cSystem.Double)" data-throw-if-not-resolved="false"></xref>

    instead as it batches cycles to reduce per-cycle overhead.

    </p>
  example: []
  syntax:
    content: public void Clock()
    content.vb: Public Sub Clock()
  overload: Pandowdy.EmuCore.VA2M.Clock*
