    path: ../Pandowdy.EmuCore/VA2M.cs
    startLine: 712
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Reset machine and system clock.
  remarks: >-
    <p>

    <strong>Full System Reset (Power Cycle):</strong> This method performs a complete

    hardware reset equivalent to powering off and on the Apple IIe.

    </p>

    <p>

    <strong>Operations Performed:</strong>

    <ul><li>Reset CPU registers (PC loaded from $FFFC/$FFFD, SP = $FF)</li><li>Reset all soft switches to power-on state</li><li>Reset memory bank mappings</li><li>Clear keyboard latch</li><li>Reset cycle counter to zero</li><li>Restart throttle stopwatch</li><li>Reset performance measurement counters</li></ul>

    </p>

    <p>

    <strong>Difference from UserReset:</strong> Reset() is a cold boot that initializes

    everything. <xref href="Pandowdy.EmuCore.VA2M.UserReset" data-throw-if-not-resolved="false"></xref> is a warm reset that preserves memory contents

    and only resets the CPU (Ctrl+Reset behavior).

    </p>

    <p>

    <strong>Thread Safety:</strong> Should be called from the emulator thread.

    For cross-thread reset, enqueue via command queue.

    </p>
  example: []
  syntax:
    content: public void Reset()
    content.vb: Public Sub Reset()
  overload: Pandowdy.EmuCore.VA2M.Reset*
- uid: Pandowdy.EmuCore.VA2M.UserReset
  commentId: M:Pandowdy.EmuCore.VA2M.UserReset
  id: UserReset
  parent: Pandowdy.EmuCore.VA2M
  langs:
  - csharp
  - vb
  name: UserReset()
  nameWithType: VA2M.UserReset()
  fullName: Pandowdy.EmuCore.VA2M.UserReset()
  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/VA2M.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: UserReset
    path: ../Pandowdy.EmuCore/VA2M.cs
    startLine: 772
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Performs a warm reset (Ctrl+Reset) without clearing memory or resetting cycle counters.
  remarks: >-
    <p>

    <strong>Warm Reset Behavior:</strong> Simulates pressing Ctrl+Reset on the Apple IIe,

    which resets the CPU but preserves RAM contents and continues timing.

    </p>

    <p>

    <strong>Operations Performed:</strong>

    <ul><li>Reset CPU registers (PC loaded from $FFFC/$FFFD, SP reset)</li><li>Memory contents preserved (RAM, soft switches mostly unchanged)</li><li>Cycle counter continues (not reset)</li><li>Throttle timing continues (not restarted)</li></ul>

    </p>

    <p>

    <strong>Use Cases:</strong>

    <ul><li>Break out of infinite loop without losing program in memory</li><li>Return to Monitor/BASIC prompt from running program</li><li>Recover from program hang while preserving state</li></ul>

    </p>

    <p>

    <strong>Difference from Reset:</strong> <xref href="Pandowdy.EmuCore.VA2M.Reset" data-throw-if-not-resolved="false"></xref> is a cold boot (power cycle).

    UserReset() is a warm reset that preserves memory and timing state.

    </p>

    <p>

    <strong>Thread Safety:</strong> This method is thread-safe. It enqueues the reset

    operation which will be executed on the emulator thread at the next instruction boundary

    (via ProcessPending). This ensures the reset doesn't interrupt a CPU instruction in progress,

    maintaining 6502 atomic instruction guarantees.

    </p>

    <p>

    <strong>Implementation Note:</strong> The reset command is enqueued and will be processed

    at the next safe point (instruction boundary) on the emulator thread. This prevents

    race conditions and undefined behavior from resetting the CPU mid-instruction.

    </p>
  example: []
  syntax:
    content: public void UserReset()
    content.vb: Public Sub UserReset()
  overload: Pandowdy.EmuCore.VA2M.UserReset*
- uid: Pandowdy.EmuCore.VA2M.RunAsync(System.Threading.CancellationToken,System.Double)
  commentId: M:Pandowdy.EmuCore.VA2M.RunAsync(System.Threading.CancellationToken,System.Double)
  id: RunAsync(System.Threading.CancellationToken,System.Double)
  parent: Pandowdy.EmuCore.VA2M
