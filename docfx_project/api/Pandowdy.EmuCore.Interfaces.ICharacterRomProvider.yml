  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Gets the character ROM data for a specific character.
  remarks: >-
    The character ROM layout is organized by display attributes, not ASCII values:

    <ul><li>0x00-0x1F: Control characters (displayed as inverse uppercase when altChar is false)</li><li>0x20-0x3F: Inverse special characters and numbers</li><li>0x40-0x5F: Flashing uppercase letters (or MouseText when altChar is true)</li><li>0x60-0x7F: Flashing special characters</li><li>0x80-0x9F: Control characters displayed as normal uppercase</li><li>0xA0-0xBF: Normal special characters and numbers</li><li>0xC0-0xDF: Normal uppercase letters</li><li>0xE0-0xFF: Normal lowercase letters and special characters</li></ul>
  example: []
  syntax:
    content: ReadOnlySpan<byte> GetGlyph(byte ch, bool flashOn, bool altChar)
    parameters:
    - id: ch
      type: System.Byte
      description: >-
        The character code (0-255) to retrieve. This is the Apple II
            screen code (not ASCII), which determines the glyph appearance based on inverse,
            flashing, and alternate character set attributes.
    - id: flashOn
      type: System.Boolean
      description: >-
        True if flash mode (inverse video) is currently active.
            When true, flashing characters (codes 0x40-0x7F) are displayed in their inverse
            state. Flash typically alternates at approximately 2 Hz.
    - id: altChar
      type: System.Boolean
      description: >-
        True if the alternate character set (MouseText) should be used.
            MouseText provides graphical symbols for user interfaces, replacing control
            characters in the range 0x40-0x5F when enabled via the SETALTCHAR soft switch.
    return:
      type: System.ReadOnlySpan{System.Byte}
      description: >-
        A read-only span of 8 bytes representing the character glyph, where each
            byte represents one horizontal scanline from top to bottom. Bits 0-6 of each byte
            represent pixels (1=lit, 0=dark), with bit 6 being the leftmost pixel. Bit 7 is ignored.
    content.vb: Function GetGlyph(ch As Byte, flashOn As Boolean, altChar As Boolean) As ReadOnlySpan(Of Byte)
