    id: Restore
    path: ../Pandowdy.UI/Helpers/WindowSettingsHelper.cs
    startLine: 185
  assemblies:
  - Pandowdy.UI
  namespace: Pandowdy.UI.Helpers
  summary: Restores window position and size from saved settings.
  remarks: >-
    <p>

    <strong>Validation:</strong> Checks that the saved position is still on a visible screen.

    If the monitor was disconnected or position is off-screen, uses default centered position.

    </p>

    <p>

    <strong>Windows 11 Note:</strong> This method should be called BEFORE window.Show() for

    best results. Windows 11 is less likely to override positions set before the window

    becomes visible.

    </p>
  example: []
  syntax:
    content: public static void Restore(Window window, WindowSettings? settings)
    parameters:
    - id: window
      type: Avalonia.Controls.Window
      description: Window to restore settings to.
    - id: settings
      type: Pandowdy.UI.Models.WindowSettings
      description: Previously saved settings, or null to use defaults.
    content.vb: Public Shared Sub Restore(window As Window, settings As WindowSettings)
  overload: Pandowdy.UI.Helpers.WindowSettingsHelper.Restore*
  nameWithType.vb: WindowSettingsHelper.Restore(Window, WindowSettings)
