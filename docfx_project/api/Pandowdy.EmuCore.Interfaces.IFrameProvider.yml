    id: Width
    path: ../Pandowdy.EmuCore/Interfaces/IFrameProvider.cs
    startLine: 37
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Gets the width of the frame in pixels.
  remarks: >-
    Currently, this value is determined by the default implementation of

    <xref href="Pandowdy.EmuCore.DataTypes.BitmapDataArray" data-throw-if-not-resolved="false"></xref>. In a future refactoring, the frame provider may

    dictate dimensions at creation time to support additional graphics modes.

    The pixel width represents the final rendered output width, which may include

    horizontal doubling to achieve proper aspect ratio on square-pixel displays.
  example: []
  syntax:
    content: int Width { get; }
    parameters: []
    return:
      type: System.Int32
      description: >-
        The frame width in pixels. For Apple IIe standard modes, this is typically 560 pixels

        (280 pixels doubled for HGR, individual for DHGR, 14 (or 7) pixels per

        character × 40 (or 80) columns).
    content.vb: ReadOnly Property Width As Integer
  overload: Pandowdy.EmuCore.Interfaces.IFrameProvider.Width*
