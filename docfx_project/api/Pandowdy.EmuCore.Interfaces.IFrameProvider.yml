  name: FrameAvailable
  nameWithType: IFrameProvider.FrameAvailable
  fullName: Pandowdy.EmuCore.Interfaces.IFrameProvider.FrameAvailable
  type: Event
  source:
    remote:
      path: Pandowdy.EmuCore/Interfaces/IFrameProvider.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: FrameAvailable
    path: ../Pandowdy.EmuCore/Interfaces/IFrameProvider.cs
    startLine: 90
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Raised after a new frame has been committed and is available for display.
  remarks: >-
    This event is fired by <xref href="Pandowdy.EmuCore.Interfaces.IFrameProvider.CommitWritable" data-throw-if-not-resolved="false"></xref> after the front and back buffers

    have been swapped. Subscribers (typically the UI layer) should respond by reading

    the front buffer via <xref href="Pandowdy.EmuCore.Interfaces.IFrameProvider.GetFrame" data-throw-if-not-resolved="false"></xref> and updating the display. This event

    is typically raised at the video refresh rate (approximately 60 Hz for Apple IIe).
  example: []
  syntax:
    content: event EventHandler? FrameAvailable
    return:
      type: System.EventHandler
    content.vb: Event FrameAvailable As EventHandler
- uid: Pandowdy.EmuCore.Interfaces.IFrameProvider.GetFrame
  commentId: M:Pandowdy.EmuCore.Interfaces.IFrameProvider.GetFrame
  id: GetFrame
  parent: Pandowdy.EmuCore.Interfaces.IFrameProvider
  langs:
  - csharp
