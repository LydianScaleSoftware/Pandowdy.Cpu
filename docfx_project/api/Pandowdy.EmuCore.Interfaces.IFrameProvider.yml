    id: IFrameProvider
    path: ../Pandowdy.EmuCore/Interfaces/IFrameProvider.cs
    startLine: 19
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Provides access to the emulator's frame buffer for rendering with double-buffering support.
  remarks: >-
    This interface manages the frame buffers used for rendering Apple IIe video output.

    It implements a double-buffering pattern where:

    <ul><li>The <strong>back buffer</strong> is used for composing the next frame (writing)</li><li>The <strong>front buffer</strong> is used for display (reading)</li><li>Buffers are swapped atomically when the frame is complete</li></ul>

    This prevents tearing and ensures smooth animation by keeping the display buffer stable

    while the next frame is being rendered. The <xref href="Pandowdy.EmuCore.Interfaces.IFrameProvider.FrameAvailable" data-throw-if-not-resolved="false"></xref> event notifies

    consumers (typically the UI layer) when a new frame is ready for display.
  example: []
  syntax:
    content: public interface IFrameProvider
    content.vb: Public Interface IFrameProvider
