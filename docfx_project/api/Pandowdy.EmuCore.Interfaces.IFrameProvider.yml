      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: IsGraphics
    path: ../Pandowdy.EmuCore/Interfaces/IFrameProvider.cs
    startLine: 61
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Gets or sets whether the emulator is in graphics mode (as opposed to text mode).
  remarks: >-
    This property reflects the state of the TEXT soft switch. When false (text mode),

    the display shows 40-column or 80-column text. When true (graphics mode), the

    display shows lo-res (40×48 color blocks) or hi-res (280×192 pixels) graphics.

    The primary purpose of this flag is to give the UI renderer a hint to use NTSC

    color generation and fringing when applicable.
  example: []
  syntax:
    content: bool IsGraphics { get; set; }
    parameters: []
    return:
      type: System.Boolean
      description: True if displaying graphics (lo-res or hi-res); false if displaying text mode.
    content.vb: Property IsGraphics As Boolean
  overload: Pandowdy.EmuCore.Interfaces.IFrameProvider.IsGraphics*
