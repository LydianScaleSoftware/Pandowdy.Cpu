  name: GetFrame()
  nameWithType: IFrameProvider.GetFrame()
  fullName: Pandowdy.EmuCore.Interfaces.IFrameProvider.GetFrame()
  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/Interfaces/IFrameProvider.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: GetFrame
    path: ../Pandowdy.EmuCore/Interfaces/IFrameProvider.cs
    startLine: 106
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Gets the current front buffer for reading and displaying.
  remarks: >-
    This method is typically called by the UI layer in response to the

    <xref href="Pandowdy.EmuCore.Interfaces.IFrameProvider.FrameAvailable" data-throw-if-not-resolved="false"></xref> event to retrieve the completed frame for display.

    The returned buffer should be treated as read-only to prevent race conditions

    with the rendering thread.
  example: []
  syntax:
    content: BitmapDataArray GetFrame()
    return:
      type: Pandowdy.EmuCore.DataTypes.BitmapDataArray
      description: >-
        A <xref href="Pandowdy.EmuCore.DataTypes.BitmapDataArray" data-throw-if-not-resolved="false"></xref> containing the most recently committed frame,

        ready for display. This buffer is stable and will not change until the next

        call to <xref href="Pandowdy.EmuCore.Interfaces.IFrameProvider.CommitWritable" data-throw-if-not-resolved="false"></xref>.
    content.vb: Function GetFrame() As BitmapDataArray
  overload: Pandowdy.EmuCore.Interfaces.IFrameProvider.GetFrame*
- uid: Pandowdy.EmuCore.Interfaces.IFrameProvider.BorrowWritable
  commentId: M:Pandowdy.EmuCore.Interfaces.IFrameProvider.BorrowWritable
  id: BorrowWritable
  parent: Pandowdy.EmuCore.Interfaces.IFrameProvider
  langs:
  - csharp
  - vb
  name: BorrowWritable()
  nameWithType: IFrameProvider.BorrowWritable()
  fullName: Pandowdy.EmuCore.Interfaces.IFrameProvider.BorrowWritable()
  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/Interfaces/IFrameProvider.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: BorrowWritable
    path: ../Pandowdy.EmuCore/Interfaces/IFrameProvider.cs
    startLine: 121
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Gets the back buffer for writing and composing the next frame.
  remarks: >-
    This method is typically called by the rendering subsystem at the start of each

    frame generation cycle. The caller should render the complete frame into this buffer,

    then call <xref href="Pandowdy.EmuCore.Interfaces.IFrameProvider.CommitWritable" data-throw-if-not-resolved="false"></xref> to make it visible. The term "Borrow" indicates

    that the caller has temporary exclusive access to this buffer for rendering purposes.
  example: []
  syntax:
    content: BitmapDataArray BorrowWritable()
    return:
      type: Pandowdy.EmuCore.DataTypes.BitmapDataArray
      description: >-
        A <xref href="Pandowdy.EmuCore.DataTypes.BitmapDataArray" data-throw-if-not-resolved="false"></xref> that can be written to for composing the next frame.

        This buffer is not visible to the display until <xref href="Pandowdy.EmuCore.Interfaces.IFrameProvider.CommitWritable" data-throw-if-not-resolved="false"></xref> is called.
    content.vb: Function BorrowWritable() As BitmapDataArray
  overload: Pandowdy.EmuCore.Interfaces.IFrameProvider.BorrowWritable*
- uid: Pandowdy.EmuCore.Interfaces.IFrameProvider.CommitWritable
  commentId: M:Pandowdy.EmuCore.Interfaces.IFrameProvider.CommitWritable
  id: CommitWritable
  parent: Pandowdy.EmuCore.Interfaces.IFrameProvider
  langs:
  - csharp
  - vb
  name: CommitWritable()
  nameWithType: IFrameProvider.CommitWritable()
  fullName: Pandowdy.EmuCore.Interfaces.IFrameProvider.CommitWritable()
  type: Method
  source:
    remote:
      path: Pandowdy.EmuCore/Interfaces/IFrameProvider.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: CommitWritable
    path: ../Pandowdy.EmuCore/Interfaces/IFrameProvider.cs
    startLine: 136
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Swaps the front and back buffers and raises the <xref href="Pandowdy.EmuCore.Interfaces.IFrameProvider.FrameAvailable" data-throw-if-not-resolved="false"></xref> event.
  remarks: >-
    This method atomically swaps the front and back buffers, making the newly rendered

    frame visible while providing the previous front buffer as the new back buffer for

    the next frame. After the swap, the <xref href="Pandowdy.EmuCore.Interfaces.IFrameProvider.FrameAvailable" data-throw-if-not-resolved="false"></xref> event is raised to

    notify the UI layer that a new frame is ready for display.

    <p>

    This method should be called by the rendering subsystem after completing a frame

    (typically once per VBlank period, approximately 60 times per second for Apple IIe).

    </p>
  example: []
  syntax:
    content: void CommitWritable()
    content.vb: Sub CommitWritable()
  overload: Pandowdy.EmuCore.Interfaces.IFrameProvider.CommitWritable*
