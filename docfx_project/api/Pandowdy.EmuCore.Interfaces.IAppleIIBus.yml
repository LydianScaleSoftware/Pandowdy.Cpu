      repo: https://github.com/markdavidlong/Pandowdy.git
    id: Clock
    path: ../Pandowdy.EmuCore/Interfaces/IAppleIIBus.cs
    startLine: 107
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Advances the system clock by one cycle.
  remarks: >-
    Increments the <xref href="Pandowdy.EmuCore.Interfaces.IAppleIIBus.SystemClockCounter" data-throw-if-not-resolved="false"></xref> and checks for VBlank timing.

    Should be called once per CPU instruction cycle. The Apple IIe runs at

    approximately 1.023 MHz, so this method is typically called about 1 million

    times per second during emulation.
  example: []
  syntax:
    content: void Clock()
    content.vb: Sub Clock()
  overload: Pandowdy.EmuCore.Interfaces.IAppleIIBus.Clock*
