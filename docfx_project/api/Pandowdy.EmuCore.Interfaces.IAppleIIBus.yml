  source:
    remote:
      path: Pandowdy.EmuCore/Interfaces/IAppleIIBus.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: SetKeyValue
    path: ../Pandowdy.EmuCore/Interfaces/IAppleIIBus.cs
    startLine: 26
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Sets the keyboard latch value (typically with high bit set).
  remarks: >-
    On the Apple II, reading address $C000 returns the keyboard latch value,

    and reading $C010 clears the high bit. This method simulates external keyboard

    input by setting the latch value that the CPU will read.
  example: []
  syntax:
    content: void SetKeyValue(byte key)
    parameters:
    - id: key
      type: System.Byte
      description: >-
        The key value to store in the keyboard latch. 
            The high bit (bit 7) should typically be set to indicate a key is available.
    content.vb: Sub SetKeyValue(key As Byte)
  overload: Pandowdy.EmuCore.Interfaces.IAppleIIBus.SetKeyValue*
