  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Gets the system clock counter tracking elapsed cycles since reset.
  example: []
  syntax:
    content: ulong SystemClockCounter { get; }
    parameters: []
    return:
      type: System.UInt64
      description: >-
        The total number of clock cycles elapsed. This counter increments with each

        call to <xref href="Pandowdy.EmuCore.Interfaces.IAppleIIBus.Clock" data-throw-if-not-resolved="false"></xref> and is used for timing VBlank events and other

        time-sensitive operations. Runs at approximately 1.023 MHz.
    content.vb: ReadOnly Property SystemClockCounter As ULong
  overload: Pandowdy.EmuCore.Interfaces.IAppleIIBus.SystemClockCounter*
