    id: Reset
    path: ../Pandowdy.EmuCore/Interfaces/IAppleIIBus.cs
    startLine: 117
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Resets the bus and connected devices to their initial power-on state.
  remarks: >-
    Resets the system clock counter to zero, clears the keyboard latch,

    resets soft switches to their default values, and triggers a CPU reset.

    This simulates powering on the Apple IIe or pressing the reset button.
  example: []
  syntax:
    content: void Reset()
    content.vb: Sub Reset()
  overload: Pandowdy.EmuCore.Interfaces.IAppleIIBus.Reset*
