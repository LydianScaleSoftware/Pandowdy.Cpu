    id: SetPushButton
    path: ../Pandowdy.EmuCore/Interfaces/IAppleIIBus.cs
    startLine: 38
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Sets the state of a pushbutton (game controller button).
  remarks: >-
    Apple II game controllers have up to 3 buttons that can be read at addresses

    $C061 (button 0), $C062 (button 1), and $C063 (button 2). The high bit of

    the returned byte indicates button state (1=pressed, 0=released).
  example: []
  syntax:
    content: void SetPushButton(int num, bool enabled)
    parameters:
    - id: num
      type: System.Int32
      description: Button number (0-2 for buttons 0, 1, and 2)
    - id: enabled
      type: System.Boolean
      description: True if the button is pressed, false if released
    content.vb: Sub SetPushButton(num As Integer, enabled As Boolean)
  overload: Pandowdy.EmuCore.Interfaces.IAppleIIBus.SetPushButton*
  nameWithType.vb: IAppleIIBus.SetPushButton(Integer, Boolean)
  fullName.vb: Pandowdy.EmuCore.Interfaces.IAppleIIBus.SetPushButton(Integer, Boolean)
  name.vb: SetPushButton(Integer, Boolean)
