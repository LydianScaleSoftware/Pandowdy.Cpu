      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: CpuRead
    path: ../Pandowdy.EmuCore/Interfaces/IAppleIIBus.cs
    startLine: 81
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Reads a byte from the specified memory address as the CPU would.
  remarks: >-
    This method handles I/O address decoding for the $C000-$CFFF range, routing

    reads to appropriate handlers for keyboard, soft switches, and peripheral cards.

    Regular memory reads ($0000-$BFFF, $D000-$FFFF) are routed to the memory pool

    with bank switching and auxiliary memory selection applied.
  example: []
  syntax:
    content: byte CpuRead(ushort address, bool readOnly = false)
    parameters:
    - id: address
      type: System.UInt16
      description: The 16-bit memory address to read from ($0000-$FFFF)
    - id: readOnly
      type: System.Boolean
      description: >-
        If true, performs a read without side effects (for debugging).
            If false, may trigger side effects like clearing soft switches or strobing addresses.
    return:
      type: System.Byte
      description: The byte value at the specified address
    content.vb: Function CpuRead(address As UShort, [readOnly] As Boolean = False) As Byte
  overload: Pandowdy.EmuCore.Interfaces.IAppleIIBus.CpuRead*
  nameWithType.vb: IAppleIIBus.CpuRead(UShort, Boolean)
  fullName.vb: Pandowdy.EmuCore.Interfaces.IAppleIIBus.CpuRead(UShort, Boolean)
  name.vb: CpuRead(UShort, Boolean)
