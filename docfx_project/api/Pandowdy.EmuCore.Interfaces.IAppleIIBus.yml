      path: Pandowdy.EmuCore/Interfaces/IAppleIIBus.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: CpuWrite
    path: ../Pandowdy.EmuCore/Interfaces/IAppleIIBus.cs
    startLine: 96
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Writes a byte to the specified memory address as the CPU would.
  remarks: >-
    This method handles I/O address decoding for the $C000-$CFFF range, routing

    writes to appropriate handlers for soft switches, language card banking,

    and peripheral cards. Regular memory writes are routed to the memory pool

    with bank switching, write protection, and auxiliary memory selection applied.

    Many Apple II soft switches are write-triggered, changing system state based

    on the write address rather than the data value.
  example: []
  syntax:
    content: void CpuWrite(ushort address, byte data)
    parameters:
    - id: address
      type: System.UInt16
      description: The 16-bit memory address to write to ($0000-$FFFF)
    - id: data
      type: System.Byte
      description: The byte value to write
    content.vb: Sub CpuWrite(address As UShort, data As Byte)
  overload: Pandowdy.EmuCore.Interfaces.IAppleIIBus.CpuWrite*
  nameWithType.vb: IAppleIIBus.CpuWrite(UShort, Byte)
  fullName.vb: Pandowdy.EmuCore.Interfaces.IAppleIIBus.CpuWrite(UShort, Byte)
  name.vb: CpuWrite(UShort, Byte)
