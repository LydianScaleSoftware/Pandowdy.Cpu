    id: ReadRawAux
    path: ../Pandowdy.EmuCore/MemoryPool.cs
    startLine: 144
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Reads directly from the auxiliary memory bank, bypassing soft switch mapping.
  remarks: >-
    <p>

    <strong>Direct Access:</strong> Reads from the auxiliary 64KB bank (offset 0x10000

    in the pool). Used for 80-column display, double hi-res graphics, and debugging.

    </p>

    <p>

    <strong>Example:</strong> 80-column text mode interleaves main and auxiliary memory

    for each character position, so the renderer uses this method to access aux memory

    directly.

    </p>
  example: []
  syntax:
    content: public byte ReadRawAux(int address)
    parameters:
    - id: address
      type: System.Int32
      description: Physical address in the pool (0-65535 for aux bank).
    return:
      type: System.Byte
      description: Byte value at the physical location.
    content.vb: Public Function ReadRawAux(address As Integer) As Byte
  overload: Pandowdy.EmuCore.MemoryPool.ReadRawAux*
  implements:
