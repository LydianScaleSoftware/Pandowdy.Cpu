  source:
    remote:
      path: Pandowdy.EmuCore/MemoryPool.cs
      branch: refactor
      repo: https://github.com/markdavidlong/Pandowdy.git
    id: ReadRawMain
    path: ../Pandowdy.EmuCore/MemoryPool.cs
    startLine: 125
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Reads directly from the main memory bank, bypassing soft switch mapping.
  remarks: >-
    <p>

    <strong>Direct Access:</strong> This method bypasses the soft switch mapping system

    and reads directly from the physical main memory bank. Used by debuggers, memory

    viewers, and video renderers that need to see actual RAM contents regardless of

    current bank switching.

    </p>

    <p>

    <strong>Example:</strong> The video renderer needs to read from hi-res page 2 even

    if PAGE2 is off, so it uses this method instead of the normal <xref href="Pandowdy.EmuCore.MemoryPool.Read(System.UInt16)" data-throw-if-not-resolved="false"></xref> method.

    </p>
  example: []
  syntax:
    content: public byte ReadRawMain(int address)
    parameters:
    - id: address
      type: System.Int32
      description: Physical address in the pool (0-65535 for main bank).
    return:
      type: System.Byte
      description: Byte value at the physical location.
    content.vb: Public Function ReadRawMain(address As Integer) As Byte
  overload: Pandowdy.EmuCore.MemoryPool.ReadRawMain*
  implements:
  - Pandowdy.EmuCore.Interfaces.IDirectMemoryPoolReader.ReadRawMain(System.Int32)
  nameWithType.vb: MemoryPool.ReadRawMain(Integer)
  fullName.vb: Pandowdy.EmuCore.MemoryPool.ReadRawMain(Integer)
  name.vb: ReadRawMain(Integer)
