  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Gets the size of the addressable memory space (always 64KB for 6502).
  remarks: >-
    The 6502 has a 16-bit address bus, providing 64KB of address space. The actual

    physical memory may be larger (128KB main+aux + ROM), but it's accessed through

    this 64KB window via soft switch-controlled bank switching.
  example: []
  syntax:
    content: public int Size { get; }
    parameters: []
    return:
      type: System.Int32
      description: 65,536 bytes ($0000-$FFFF).
    content.vb: Public ReadOnly Property Size As Integer
