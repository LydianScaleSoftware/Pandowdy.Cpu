    startLine: 332
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Registers a component to receive notifications when soft switches change.
  remarks: >-
    Responders receive immediate callbacks when switches change via the <xref href="Pandowdy.EmuCore.SoftSwitches.TriggerResponder(Pandowdy.EmuCore.SoftSwitches.SoftSwitchId%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref>

    method. Typical responders include MemoryPool (for memory remapping) and video renderers

    (for display mode changes).
  example: []
  syntax:
    content: public void AddResponder(ISoftSwitchResponder responder)
    parameters:
    - id: responder
      type: Pandowdy.EmuCore.Interfaces.ISoftSwitchResponder
      description: The responder to add. Must implement <xref href="Pandowdy.EmuCore.Interfaces.ISoftSwitchResponder" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Sub AddResponder(responder As ISoftSwitchResponder)
  overload: Pandowdy.EmuCore.SoftSwitches.AddResponder*
