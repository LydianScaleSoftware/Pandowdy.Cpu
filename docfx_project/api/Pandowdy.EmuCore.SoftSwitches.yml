    path: ../Pandowdy.EmuCore/SoftSwitch.cs
    startLine: 120
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Manages all Apple IIe soft switches and notifies responders when switches change.
  remarks: >-
    <p>

    <strong>Responder Pattern:</strong> Components register as <xref href="Pandowdy.EmuCore.Interfaces.ISoftSwitchResponder" data-throw-if-not-resolved="false"></xref>

    to receive notifications when switches change. This decouples switch management from

    the components that react to changes (MemoryPool, video renderer, etc.).

    </p>

    <p>

    <strong>Switch Categories:</strong>

    Memory Mapping (RAMRD, RAMWRT, ALTZP, 80STORE, BANK1),

    Video Mode (TEXT, MIXED, HIRES, PAGE2, 80VID, ALTCHAR),

    ROM Selection (INTCXROM, SLOTC3ROM),

    Annunciators (AN0-AN3).

    </p>
  example: []
  syntax:
    content: public sealed class SoftSwitches
    content.vb: Public NotInheritable Class SoftSwitches
