    path: ../Pandowdy.EmuCore/SoftSwitch.cs
    startLine: 349
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Resets all soft switches to their default power-on state.
  remarks: >-
    <p>

    Default state: All switches off except INTCXROM which is on (matching Apple IIe power-on).

    </p>

    <p>

    All registered responders are notified of the state changes to ensure memory mappings

    and video modes are properly initialized.

    </p>
  example: []
  syntax:
    content: public void ResetAllSwitches()
    content.vb: Public Sub ResetAllSwitches()
