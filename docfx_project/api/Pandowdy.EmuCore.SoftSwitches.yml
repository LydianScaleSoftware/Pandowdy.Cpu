  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Sets the state of a specific soft switch and notifies all registered responders.
  remarks: >-
    This method updates the switch state and immediately triggers responder callbacks,

    which may cause memory remapping or video mode changes. The change counter for

    the switch is automatically incremented if the value changes.
  example: []
  syntax:
    content: public void Set(SoftSwitches.SoftSwitchId id, bool value)
    parameters:
    - id: id
      type: Pandowdy.EmuCore.SoftSwitches.SoftSwitchId
      description: The identifier of the switch to modify.
    - id: value
      type: System.Boolean
      description: The new state for the switch (true = on, false = off).
    content.vb: Public Sub [Set](id As SoftSwitches.SoftSwitchId, value As Boolean)
  overload: Pandowdy.EmuCore.SoftSwitches.Set*
