    id: .ctor
    path: ../Pandowdy.EmuCore/Services/FrameProvider.cs
    startLine: 102
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Services
  summary: Initializes a new instance of the <xref href="Pandowdy.EmuCore.Services.FrameProvider" data-throw-if-not-resolved="false"></xref> class with dimension validation.
  remarks: >-
    <p>

    <strong>Initialization Sequence:</strong>

    <ol><li>Allocates front and back <xref href="Pandowdy.EmuCore.DataTypes.BitmapDataArray" data-throw-if-not-resolved="false"></xref> buffers</li><li>Queries buffer dimensions from static properties</li><li>Validates front and back buffers have matching dimensions</li><li>Validates dimensions match Apple IIe standard (560×192)</li><li>Sets <xref href="Pandowdy.EmuCore.Services.FrameProvider.Width" data-throw-if-not-resolved="false"></xref> and <xref href="Pandowdy.EmuCore.Services.FrameProvider.Height" data-throw-if-not-resolved="false"></xref> properties</li></ol>

    </p>

    <p>

    <strong>Why Validate?</strong> Although the dimensions are determined by

    <xref href="Pandowdy.EmuCore.DataTypes.BitmapDataArray" data-throw-if-not-resolved="false"></xref> constants, explicit validation:

    <ul><li>Catches bugs if BitmapDataArray is refactored incorrectly</li><li>Documents the expected dimensions (560×192) for Apple IIe</li><li>Provides clear error messages if configuration is wrong</li></ul>

    </p>

    <p>

    <strong>Performance:</strong> All validation happens once at construction.

    Runtime frame operations have no validation overhead.

    </p>
  example: []
  syntax:
    content: public FrameProvider()
    content.vb: Public Sub New()
  overload: Pandowdy.EmuCore.Services.FrameProvider.#ctor*
  exceptions:
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: >-
      Thrown if front and back buffer dimensions don't match, or if dimensions don't match

      Apple IIe standard (560×192). These exceptions indicate a configuration error in

      <xref href="Pandowdy.EmuCore.DataTypes.BitmapDataArray" data-throw-if-not-resolved="false"></xref> and should never occur in production with correct constants.
  nameWithType.vb: FrameProvider.New()
  fullName.vb: Pandowdy.EmuCore.Services.FrameProvider.New()
  name.vb: New()
