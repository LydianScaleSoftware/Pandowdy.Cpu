  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Services
  summary: Provides double-buffered frame management for Apple II display with dimension validation.
  remarks: >-
    <p>

    <strong>Implementation:</strong> This class manages two <xref href="Pandowdy.EmuCore.DataTypes.BitmapDataArray" data-throw-if-not-resolved="false"></xref> instances

    as front and back buffers. Frame dimensions are derived from <xref href="Pandowdy.EmuCore.DataTypes.BitmapDataArray.Width" data-throw-if-not-resolved="false"></xref>

    and <xref href="Pandowdy.EmuCore.DataTypes.BitmapDataArray.Height" data-throw-if-not-resolved="false"></xref> static properties and validated at construction.

    </p>

    <p>

    <strong>Buffer Swap:</strong> Uses C# tuple swap pattern <code>(_back, _front) = (_front, _back)</code>

    for atomic buffer exchange. This ensures thread-safe swapping without intermediate variables.

    </p>

    <p>

    <strong>Validation:</strong> Constructor performs strict validation to ensure:

    <ul><li>Front and back buffers have matching dimensions</li><li>Dimensions match Apple IIe standard (560×192 pixels)</li></ul>

    These checks catch configuration errors early and prevent rendering corruption.

    </p>

    <p>

    <strong>Thread Safety:</strong> The buffer swap in <xref href="Pandowdy.EmuCore.Services.FrameProvider.CommitWritable" data-throw-if-not-resolved="false"></xref> is atomic,

    but the caller must ensure only one thread calls rendering methods. The front buffer

    can be safely read by the UI thread while the back buffer is being written by the

    rendering thread.

    </p>

    <p>

    <strong>Display Mode Metadata:</strong> <xref href="Pandowdy.EmuCore.Services.FrameProvider.IsGraphics" data-throw-if-not-resolved="false"></xref> and <xref href="Pandowdy.EmuCore.Services.FrameProvider.IsMixed" data-throw-if-not-resolved="false"></xref>

    properties are set by <xref href="Pandowdy.EmuCore.Services.FrameGenerator" data-throw-if-not-resolved="false"></xref> after rendering to provide hints to

    downstream consumers (NTSC color generation, display adapters). These are not thread-safe

    and should only be set by the rendering thread.

    </p>
  example: []
  syntax:
    content: 'public sealed class FrameProvider : IFrameProvider'
    content.vb: Public NotInheritable Class FrameProvider Implements IFrameProvider
