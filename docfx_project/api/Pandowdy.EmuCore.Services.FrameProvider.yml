  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Services
  summary: Gets the current front buffer for reading and displaying.
  remarks: >-
    This method is typically called by the UI layer in response to the

    <xref href="Pandowdy.EmuCore.Interfaces.IFrameProvider.FrameAvailable" data-throw-if-not-resolved="false"></xref> event to retrieve the completed frame for display.

    The returned buffer should be treated as read-only to prevent race conditions

    with the rendering thread.
  example: []
  syntax:
    content: public BitmapDataArray GetFrame()
    return:
      type: Pandowdy.EmuCore.DataTypes.BitmapDataArray
      description: >-
        A <xref href="Pandowdy.EmuCore.DataTypes.BitmapDataArray" data-throw-if-not-resolved="false"></xref> containing the most recently committed frame,

        ready for display. This buffer is stable and will not change until the next

        call to <xref href="Pandowdy.EmuCore.Interfaces.IFrameProvider.CommitWritable" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Function GetFrame() As BitmapDataArray
  overload: Pandowdy.EmuCore.Services.FrameProvider.GetFrame*
