  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Provides memory access notifications for debugging and monitoring purposes.
  remarks: >-
    This interface is designed for components that need to monitor memory access,

    such as debuggers, memory viewers, and watchpoint systems. It provides events

    that fire when memory is read from or written to, allowing external tools to

    track program behavior, detect specific memory accesses, and implement breakpoint

    and watchpoint functionality.

    <p>

    The interface provides two notification events:

    <ul><li><xref href="Pandowdy.EmuCore.Interfaces.IMemoryAccessNotifier.MemoryRead" data-throw-if-not-resolved="false"></xref>: Fired when a byte is read from memory</li><li><xref href="Pandowdy.EmuCore.Interfaces.IMemoryAccessNotifier.MemoryWritten" data-throw-if-not-resolved="false"></xref>: Fired when a byte is written to memory</li></ul>

    Both events fire for individual byte operations, allowing precise tracking of

    memory access patterns during program execution.

    </p>
  example: []
  syntax:
    content: public interface IMemoryAccessNotifier
    content.vb: Public Interface IMemoryAccessNotifier
