    startLine: 45
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Raised when a byte is written to memory.
  remarks: >-
    This event fires whenever a byte of memory is modified through CPU

    operations or direct memory writes. The <xref href="Pandowdy.EmuCore.MemoryAccessEventArgs" data-throw-if-not-resolved="false"></xref>

    contains the address written to and the new value at that address.

    <p>

    Typical uses include:

    <ul><li>Implementing memory write watchpoints in a debugger</li><li>Tracking changes to specific memory locations</li><li>Logging memory write patterns for analysis</li><li>Triggering breakpoints when specific values are written to specific addresses</li></ul>

    </p>

    <p>

    <strong>Performance Note:</strong> This event can fire very frequently during

    program execution (potentially millions of times per second). Subscribers should

    minimize processing time to avoid impacting emulation performance.

    </p>
  example: []
  syntax:
    content: event EventHandler<MemoryAccessEventArgs> MemoryWritten
    return:
      type: System.EventHandler{Pandowdy.EmuCore.MemoryAccessEventArgs}
    content.vb: Event MemoryWritten As EventHandler(Of MemoryAccessEventArgs)
