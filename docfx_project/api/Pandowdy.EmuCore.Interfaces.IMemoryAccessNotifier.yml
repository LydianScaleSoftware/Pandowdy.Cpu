    startLine: 70
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Raised when a byte is read from memory.
  remarks: >-
    This event fires whenever a byte of memory is accessed through CPU

    operations or direct memory reads. The <xref href="Pandowdy.EmuCore.MemoryAccessEventArgs" data-throw-if-not-resolved="false"></xref>

    contains the address read from and the value at that address.

    <p>

    Typical uses include:

    <ul><li>Implementing memory read watchpoints in a debugger</li><li>Tracking which memory locations a program accesses</li><li>Detecting access to memory-mapped I/O registers</li><li>Profiling memory access patterns for optimization analysis</li></ul>

    </p>

    <p>

    <strong>Performance Note:</strong> This event fires even more frequently than

    <xref href="Pandowdy.EmuCore.Interfaces.IMemoryAccessNotifier.MemoryWritten" data-throw-if-not-resolved="false"></xref> since programs typically read memory more often

    than they write it. Subscribers should be extremely efficient to avoid

    significantly impacting emulation performance.

    </p>
  example: []
  syntax:
    content: event EventHandler<MemoryAccessEventArgs> MemoryRead
    return:
      type: System.EventHandler{Pandowdy.EmuCore.MemoryAccessEventArgs}
    content.vb: Event MemoryRead As EventHandler(Of MemoryAccessEventArgs)
