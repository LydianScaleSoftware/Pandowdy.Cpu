  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.DataTypes
  summary: Multi-bitplane bitmap storage for Apple IIe display rendering (560×192 pixels, 16 bitplanes).
  remarks: >-
    <p>

    <strong>Purpose:</strong> This class provides a packed bitmap representation supporting

    up to 16 independent bitplanes (layers) per pixel. Each pixel position (x, y) has 16

    boolean flags stored in a <xref href="Pandowdy.EmuCore.DataTypes.BitField16" data-throw-if-not-resolved="false"></xref>, allowing efficient storage of

    multi-channel bitmap data.

    </p>

    <p>

    <strong>Apple IIe Dimensions:</strong> Fixed at 560×192 pixels to match Apple IIe

    video output:

    <ul><li><strong>Width (560):</strong> 280 hi-res pixels × 2 (horizontal doubling for square pixels),

    or 80 columns × 7 pixels per character</li><li><strong>Height (192):</strong> 24 text rows × 8 scanlines per row</li></ul>

    These dimensions are hardcoded constants to optimize performance and memory layout.

    </p>

    <p>

    <strong>Bitplane Architecture:</strong> Each pixel has 16 independent boolean channels

    (bitplanes 0-15). In the current implementation:

    <ul><li><strong>Bitplane 0:</strong> Used for monochrome composite output (primary display)</li><li><strong>Bitplanes 1-15:</strong> Reserved for future use (NTSC color separation,

    double hi-res channels, overlay effects, etc.)</li></ul>

    This design enables future NTSC color artifact generation by separating color phases

    or implementing multi-layer rendering without changing the storage format.

    </p>

    <p>

    <strong>Memory Layout:</strong> Stored as a flat array of <code>560 × 192 = 107,520</code>

    <xref href="Pandowdy.EmuCore.DataTypes.BitField16" data-throw-if-not-resolved="false"></xref> values (215 KB). Pixels are stored row-major (left-to-right,

    top-to-bottom). Offset calculation: <code>offset = x + (y × width)</code>.

    </p>

    <p>

    <strong>Thread Safety:</strong> Not thread-safe. Multiple concurrent writes or

    simultaneous read/write operations require external synchronization. Typically

    used in a single-threaded rendering pipeline where one thread writes during frame

    generation and another reads during display.

    </p>

    <p>

    <strong>Performance:</strong> Direct array access with bounds checking. All coordinate

    validation is performed before accessing the underlying array. For bulk operations,

    consider using <xref href="Pandowdy.EmuCore.DataTypes.BitmapDataArray.GetRowDataSpan(System.Int32)" data-throw-if-not-resolved="false"></xref> to access entire rows efficiently.

    </p>
