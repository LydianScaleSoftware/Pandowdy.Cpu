  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.DataTypes
  summary: Clears all pixels across all bitplanes (sets entire bitmap to zero).
  remarks: >-
    <p>

    <strong>Operation:</strong> Uses <xref href="System.Array.Clear(System.Array)" data-throw-if-not-resolved="false"></xref> to zero out the entire

    107,520-element array. This is more efficient than looping through each pixel manually.

    </p>

    <p>

    <strong>Result:</strong> After clearing, all pixels on all bitplanes are set to false

    (off). Equivalent to a blank screen.

    </p>

    <p>

    <strong>Performance:</strong> Fast bulk operation optimized by the .NET runtime

    (typically memset at native level). Much faster than individual pixel operations.

    </p>

    <p>

    <strong>Usage:</strong> Called at the start of each frame by <xref href="Pandowdy.EmuCore.RenderContext.ClearBuffer" data-throw-if-not-resolved="false"></xref>

    to prepare for rendering.

    </p>
  example: []
