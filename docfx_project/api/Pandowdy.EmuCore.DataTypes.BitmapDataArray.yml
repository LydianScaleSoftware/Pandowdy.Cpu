  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.DataTypes
  summary: Gets a read-only span of raw <xref href="Pandowdy.EmuCore.DataTypes.BitField16" data-throw-if-not-resolved="false"></xref> values for an entire row.
  remarks: >-
    <p>

    <strong>Purpose:</strong> Zero-copy access to an entire scanline's raw data. Returns

    a span directly into the underlying <code>_data</code> array without allocation or copying.

    </p>

    <p>

    <strong>Performance:</strong> Extremely efficient - creates a span view over existing

    memory. Ideal for bulk processing or when you need access to all bitplanes simultaneously.

    </p>

    <p>

    <strong>Read-Only:</strong> The span is read-only to prevent accidental modification

    of the underlying array. For modifications, use <xref href="Pandowdy.EmuCore.DataTypes.BitmapDataArray.SetPixel(System.Int32%2cSystem.Int32%2cSystem.Int32)" data-throw-if-not-resolved="false"></xref> or <xref href="Pandowdy.EmuCore.DataTypes.BitmapDataArray.ClearPixel(System.Int32%2cSystem.Int32%2cSystem.Int32)" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    <strong>Usage Example:</strong>


    <pre><code class="lang-csharp">// Process all pixels in row 100 across all bitplanes

    var rowData = bitmap.GetRowDataSpan(100);

    for (int x = 0; x &lt; rowData.Length; x++)

    {
        BitField16 pixel = rowData[x];
        bool plane0 = pixel.GetBit(0);
        bool plane1 = pixel.GetBit(1);
        // Process multi-plane data...
    }</code></pre>

