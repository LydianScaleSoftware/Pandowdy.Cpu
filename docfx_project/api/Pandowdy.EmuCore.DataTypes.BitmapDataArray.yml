  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.DataTypes
  summary: Sets a pixel to on (true) on a specific bitplane.
  remarks: >-
    <p>

    <strong>Operation:</strong> Finds the <xref href="Pandowdy.EmuCore.DataTypes.BitField16" data-throw-if-not-resolved="false"></xref> at (x, y) and sets

    the specified bitplane to true (1). Other bitplanes at this pixel are unaffected.

    </p>

    <p>

    <strong>Idempotent:</strong> Safe to call multiple times with the same coordinates -

    the pixel will remain set. No error if the pixel is already set.

    </p>

    <p>

    <strong>Example:</strong>


    <pre><code class="lang-csharp">bitmap.SetPixel(100, 50, 0);  // Set pixel on bitplane 0 (monochrome)

    bitmap.SetPixel(100, 50, 1);  // Also set on bitplane 1 (independent)</code></pre>

    </p>
