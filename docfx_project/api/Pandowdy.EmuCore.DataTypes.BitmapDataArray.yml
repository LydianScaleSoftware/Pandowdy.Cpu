  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.DataTypes
  summary: Gets a read-only span of boolean values for a single bitplane across an entire row.
  remarks: >-
    <p>

    <strong>Purpose:</strong> Efficient row-based access for rendering or analysis.

    Returns a contiguous view of one bitplane across an entire scanline.

    </p>

    <p>

    <strong>Extraction:</strong> Iterates through the 560 <xref href="Pandowdy.EmuCore.DataTypes.BitField16" data-throw-if-not-resolved="false"></xref> values

    for the row and extracts the specified bitplane bit from each, building a boolean array.

    </p>

    <p>

    <strong>Performance:</strong> Allocates a 560-element boolean array (560 bytes on heap)

    and uses an optimized for-loop for extraction (more efficient than foreach). For

    zero-allocation scenarios, consider using <xref href="Pandowdy.EmuCore.DataTypes.BitmapDataArray.GetRowDataSpan(System.Int32)" data-throw-if-not-resolved="false"></xref> for direct

    <xref href="Pandowdy.EmuCore.DataTypes.BitField16" data-throw-if-not-resolved="false"></xref> access and extracting bits manually.

    </p>

    <p>

    <strong>Usage Example:</strong>


    <pre><code class="lang-csharp">// Get all pixels on bitplane 0 for row 50

    var pixels = bitmap.GetBitplaneSpanForRow(50, 0);

    for (int x = 0; x &lt; pixels.Length; x++)

    {
        bool isLit = pixels[x];
        // Process pixel...
    }</code></pre>

    </p>
  example: []
  syntax:
    content: public ReadOnlySpan<bool> GetBitplaneSpanForRow(int row, int bitplane)
    parameters:
    - id: row
      type: System.Int32
      description: Row index (0-191).
    - id: bitplane
      type: System.Int32
      description: Bitplane index (0-15).
    return:
      type: System.ReadOnlySpan{System.Boolean}
      description: >-
        A <xref href="System.ReadOnlySpan%601" data-throw-if-not-resolved="false"></xref> of 560 boolean values representing the specified

        bitplane for all pixels in the row (left to right).
    content.vb: Public Function GetBitplaneSpanForRow(row As Integer, bitplane As Integer) As ReadOnlySpan(Of Boolean)
