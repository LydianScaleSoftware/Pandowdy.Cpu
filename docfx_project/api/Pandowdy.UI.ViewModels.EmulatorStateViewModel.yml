  assemblies:
  - Pandowdy.UI
  namespace: Pandowdy.UI.ViewModels
  summary: Gets the current Applesoft BASIC line number being executed, or null if not in BASIC.
  remarks: >-
    <p>

    <strong>Detection Method:</strong> The emulator reads zero page locations $75-$76

    which contain the BASIC line pointer. If the value is less than $FA00, it's interpreted

    as a valid BASIC line number.

    </p>

    <p>

    <strong>Use Cases:</strong>

    <ul><li>Display current line during BASIC program execution</li><li>Help users debug BASIC programs by showing execution progress</li><li>Null when in Monitor, running machine code, or in immediate mode</li></ul>

    </p>

    <p>

    <strong>Binding Example:</strong>


    <pre><code class="lang-csharp">&lt;TextBlock Text="{Binding LineNumber, StringFormat='Line: {0}', 
                             TargetNullValue='(not in BASIC)'}" /&gt;</code></pre>
    </p>
  example: []
  syntax:
    content: public int? LineNumber { get; }
    parameters: []
    return:
      type: System.Nullable{System.Int32}
      description: Line number (0-63999) if executing BASIC code, null if in Monitor or machine code.
    content.vb: Public Property LineNumber As Integer?
  overload: Pandowdy.UI.ViewModels.EmulatorStateViewModel.LineNumber*
