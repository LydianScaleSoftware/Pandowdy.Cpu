  assemblies:
  - Pandowdy.UI
  namespace: Pandowdy.UI.ViewModels
  summary: Gets the current 6502 Program Counter (PC) register value.
  remarks: >-
    <p>

    The PC points to the memory address of the next instruction the CPU will execute.

    In the Apple IIe, common PC values include:

    <ul><li>$F666: Monitor prompt</li><li>$E000-$FFFF: ROM (Monitor, BASIC interpreter)</li><li>$0800-$BFFF: User program space</li></ul>

    </p>

    <p>

    Updates approximately 20 times per second (50ms sample interval) when the view model is active.

    </p>
  example: []
  syntax:
    content: public ushort PC { get; }
    parameters: []
    return:
      type: System.UInt16
      description: 16-bit address ($0000-$FFFF) indicating the next instruction to execute.
    content.vb: Public Property PC As UShort
  overload: Pandowdy.UI.ViewModels.EmulatorStateViewModel.PC*
