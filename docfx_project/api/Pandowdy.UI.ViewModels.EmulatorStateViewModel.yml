  assemblies:
  - Pandowdy.UI
  namespace: Pandowdy.UI.ViewModels
  summary: Gets the total number of CPU cycles executed since the last reset.
  remarks: >-
    <p>

    <strong>Cycle Timing:</strong> The Apple IIe runs at approximately 1,023,000 Hz

    (1.023 MHz). This property shows the total number of cycles executed, which can be

    used to:

    <ul><li>Calculate elapsed time: cycles / 1,023,000 = seconds</li><li>Measure performance of BASIC or machine code programs</li><li>Verify emulator timing accuracy</li><li>Display uptime or execution duration</li></ul>

    </p>

    <p>

    <strong>Example Values:</strong>

    <ul><li>1,023,000 cycles ≈ 1 second of emulation</li><li>17,063 cycles ≈ 1 video frame (~60 Hz)</li><li>61,380,000 cycles ≈ 1 minute of emulation</li></ul>

    </p>

    <p>

    <strong>Reset Behavior:</strong> Reset to 0 on full system reset (power cycle).

    Continues counting during warm reset (Ctrl+Reset).

    </p>
  example: []
  syntax:
    content: public ulong Cycles { get; }
    parameters: []
    return:
      type: System.UInt64
      description: Cycle count (0 to ulong.MaxValue), increments at 1.023 MHz rate.
    content.vb: Public Property Cycles As ULong
  overload: Pandowdy.UI.ViewModels.EmulatorStateViewModel.Cycles*
