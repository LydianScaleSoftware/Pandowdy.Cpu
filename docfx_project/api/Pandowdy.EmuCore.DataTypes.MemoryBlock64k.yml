  namespace: Pandowdy.EmuCore.DataTypes
  summary: Convenience class that creates a 64KB (0x10000 bytes) memory block - the full 6502 address space.
  remarks: >-
    <p>

    <strong>Purpose:</strong> Provides a simple way to create a full-sized memory block without

    specifying the size parameter. Equivalent to <code>new MemoryBlock(0x10000)</code>.

    </p>

    <p>

    <strong>6502 Address Space:</strong> The 6502 processor uses 16-bit addresses (ushort),

    allowing access to 65,536 bytes (64KB) of memory from $0000 to $FFFF. This class creates

    a memory block that covers the entire addressable range.

    </p>

    <p>

    <strong>Usage Example:</strong>


    <pre><code class="lang-csharp">// Create full 64KB memory - no size parameter needed

    var memory = new MemoryBlock64k();


    // Can address the entire 6502 range

    memory[0x0000] = 0xFF; // Zero page

    memory[0x0100] = 0xFF; // Stack

    memory[0xFFFF] = 0xFF; // End of memory


    // Size property returns 65,536

    int size = memory.Size; // Returns 0x10000</code></pre>

    </p>

    <p>

    <strong>Performance:</strong> Identical to <xref href="Pandowdy.EmuCore.DataTypes.MemoryBlock" data-throw-if-not-resolved="false"></xref>. This is purely

    a convenience wrapper with no additional overhead or functionality.

    </p>

    <p>

    <strong>Common Use Cases:</strong>

    <ul><li>CPU instruction testing with full address space</li><li>ROM/RAM simulation for 6502-based systems</li><li>Retro computer emulation (Apple II, Commodore 64, NES, etc.)</li><li>6502 programming education and experimentation</li><li>Rapid prototyping of memory-mapped I/O systems</li></ul>

    </p>
