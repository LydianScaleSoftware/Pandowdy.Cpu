  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Services
  summary: Mutable builder for creating <xref href="Pandowdy.EmuCore.Services.SystemStatusSnapshot" data-throw-if-not-resolved="false"></xref> instances.
  remarks: >-
    <p>

    <strong>Builder Pattern:</strong> Provides a mutable workspace for constructing new snapshots.

    All fields can be freely modified before calling <xref href="Pandowdy.EmuCore.Services.SystemStatusSnapshotBuilder.Build" data-throw-if-not-resolved="false"></xref> to produce an

    immutable <xref href="Pandowdy.EmuCore.Services.SystemStatusSnapshot" data-throw-if-not-resolved="false"></xref>. This is more efficient than creating

    snapshots via the record's <code>with</code> syntax when modifying multiple fields.

    </p>

    <p>

    <strong>Usage:</strong> Typically used internally by <xref href="Pandowdy.EmuCore.Services.SystemStatusProvider.Mutate(System.Action%7bPandowdy.EmuCore.Services.SystemStatusSnapshotBuilder%7d)" data-throw-if-not-resolved="false"></xref>

    to batch multiple soft switch updates into a single atomic state change.

    </p>
  example: []
