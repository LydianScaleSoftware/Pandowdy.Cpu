  assemblies:
  - Pandowdy.UI
  namespace: Pandowdy.UI
  summary: Avalonia-based implementation of <xref href="Pandowdy.UI.Interfaces.IRefreshTicker" data-throw-if-not-resolved="false"></xref> providing 60 Hz UI refresh timing.
  remarks: >-
    <p>

    <strong>Purpose:</strong> Provides a 60 Hz timing signal for driving UI-based frame rendering

    and updates. Uses Avalonia's DispatcherTimer to ensure all timing events occur on the UI thread.

    </p>

    <p>

    <strong>Implementation:</strong> Uses Rx.NET's Subject pattern to create an observable stream

    of timestamps. The DispatcherTimer publishes to this stream at approximately 60 Hz (every ~16.67ms).

    </p>

    <p>

    <strong>Thread Safety:</strong> All timer callbacks execute on the Avalonia UI thread via

    DispatcherTimer, ensuring safe interaction with UI elements without explicit marshaling.

    </p>

    <p>

    <strong>Lifecycle:</strong> The timer starts when <xref href="Pandowdy.UI.AvaloniaRefreshTicker.Start" data-throw-if-not-resolved="false"></xref> is called and runs

    continuously until the application closes. The <xref href="Pandowdy.UI.AvaloniaRefreshTicker.Stop" data-throw-if-not-resolved="false"></xref> method is currently a no-op

    as Avalonia's DispatcherTimer automatically stops when the application shuts down.

    </p>

    <p>

    <strong>Usage Pattern:</strong>


    <pre><code class="lang-csharp">var ticker = new AvaloniaRefreshTicker();

    ticker.Stream.Subscribe(timestamp =&gt; RefreshDisplay());

    ticker.Start(); // Begin emitting 60 Hz updates</code></pre>

    </p>
  example: []
