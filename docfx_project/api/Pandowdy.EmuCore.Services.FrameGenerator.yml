  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Services
  summary: >-
    Generates Apple II video frames by coordinating bitmap rendering,

    memory access, and system status. Produces annotated frames for

    downstream consumers (e.g., NTSC post-processing, GUI display).
  remarks: >-
    <p>

    <strong>Architecture:</strong> This implementation acts as a facade/coordinator,

    delegating the actual pixel rendering work to an <xref href="Pandowdy.EmuCore.Interfaces.IDisplayBitmapRenderer" data-throw-if-not-resolved="false"></xref>

    while managing the lifecycle and annotation of frame buffers.

    </p>

    <p>

    <strong>Frame Annotation:</strong> After rendering, this class annotates the frame

    with display mode metadata (IsGraphics, IsMixed) by setting properties on

    <xref href="Pandowdy.EmuCore.Interfaces.IFrameProvider" data-throw-if-not-resolved="false"></xref>. This allows downstream consumers (NTSC renderers, display

    adapters) to access mode information without requiring their own <xref href="Pandowdy.EmuCore.Interfaces.ISystemStatusProvider" data-throw-if-not-resolved="false"></xref>

    reference.

    </p>

    <p>

    <strong>Thread Safety:</strong> Not inherently thread-safe. Frame generation should be

    called from a single thread (typically the emulator thread or a dedicated rendering thread).

    The underlying <xref href="Pandowdy.EmuCore.Interfaces.IFrameProvider" data-throw-if-not-resolved="false"></xref> handles thread-safe buffer swapping between

    renderer and consumer.

    </p>
  example: []
  syntax:
    content: 'public class FrameGenerator : IFrameGenerator'
    content.vb: Public Class FrameGenerator Implements IFrameGenerator
