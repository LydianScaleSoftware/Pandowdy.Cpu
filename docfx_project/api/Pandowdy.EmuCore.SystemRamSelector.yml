    startLine: 32
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Reads a byte from the auxiliary memory pool, bypassing all bus mapping and soft switches.
  remarks: >-
    This method reads directly from the auxiliary 64KB memory pool without any address

    translation, auxiliary memory selection, or bank switching logic. It always reads

    from auxiliary memory, never main memory, and ignores all soft switch states

    (RAMRD, RAMWRT, 80STORE, etc.).

    <p>

    The Apple IIe's auxiliary memory is primarily used for 80-column text mode,

    double hi-res graphics, and extended memory for programs. Use this method when

    you need direct access to the auxiliary memory bank, such as when rendering

    80-column text or double hi-res graphics.

    </p>
  example: []
  syntax:
    content: public byte ReadRawAux(int address)
    parameters:
    - id: address
      type: System.Int32
      description: >-
        The physical address to read from ($0000-$FFFF). Note that
            for the language card region, bank 1 ($D000-$DFFF logical) is physically located
            at $C000-$CFFF, while bank 2 ($D000-$DFFF logical) is at $D000-$DFFF physical.
    return:
      type: System.Byte
      description: >-
        The byte value at the specified physical address in auxiliary memory, or 0
            if the address is not available (e.g., addresses where no auxiliary RAM exists).
    content.vb: Public Function ReadRawAux(address As Integer) As Byte
  overload: Pandowdy.EmuCore.SystemRamSelector.ReadRawAux*
