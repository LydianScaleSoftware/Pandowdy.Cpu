    id: ReadRawMain
    path: ../Pandowdy.EmuCore/SystemRamSelector.cs
    startLine: 25
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore
  summary: Reads a byte from the main memory pool, bypassing all bus mapping and soft switches.
  remarks: >-
    This method reads directly from the main 64KB memory pool without any address

    translation, auxiliary memory selection, or bank switching logic. It always reads

    from main memory, never auxiliary memory, and ignores all soft switch states

    (RAMRD, RAMWRT, 80STORE, etc.).

    <p>

    Use this when you need to access the actual physical memory layout, such as when

    rendering video from specific memory pages or debugging memory contents.

    </p>
  example: []
  syntax:
    content: public byte ReadRawMain(int address)
    parameters:
    - id: address
      type: System.Int32
      description: >-
        The physical address to read from ($0000-$FFFF). Note that
            for the language card region, bank 1 ($D000-$DFFF logical) is physically located
            at $C000-$CFFF, while bank 2 ($D000-$DFFF logical) is at $D000-$DFFF physical.
    return:
      type: System.Byte
      description: >-
        The byte value at the specified physical address in main memory, or 0
            if the address is not available (e.g., ROM regions with no RAM underneath).
    content.vb: Public Function ReadRawMain(address As Integer) As Byte
  overload: Pandowdy.EmuCore.SystemRamSelector.ReadRawMain*
  implements:
