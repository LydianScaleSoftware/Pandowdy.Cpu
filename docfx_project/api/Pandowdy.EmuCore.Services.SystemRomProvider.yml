  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Services
  summary: Reads a byte from the ROM at the specified address.
  remarks: >-
    <p>

    <strong>Address Mapping:</strong>

    <ul><li>0x0000 = $C000 (I/O firmware start)</li><li>0x1000 = $D000 (Monitor ROM start / Language Card bank area)</li><li>0x2000 = $E000 (BASIC ROM start / Language Card common area)</li><li>0x3FFF = $FFFF (End of ROM / Reset vector high byte)</li></ul>

    </p>
  example: []
  syntax:
    content: public byte Read(ushort address)
    parameters:
    - id: address
      type: System.UInt16
      description: Address within the ROM (0x0000-0x3FFF representing $C000-$FFFF).
    return:
      type: System.Byte
      description: Byte value at the specified address.
    content.vb: Public Function Read(address As UShort) As Byte
  overload: Pandowdy.EmuCore.Services.SystemRomProvider.Read*
  exceptions:
  - type: System.IndexOutOfRangeException
    commentId: T:System.IndexOutOfRangeException
    description: Thrown if address is beyond ROM size.
