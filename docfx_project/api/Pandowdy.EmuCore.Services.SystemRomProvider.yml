  summary: Initializes a new instance of the SystemRomProvider class and loads ROM.
  remarks: >-
    <p>

    <strong>File System Example:</strong>


    <pre><code class="lang-csharp">var rom = new SystemRomProvider("roms/AppleIIe.rom");</code></pre>

    </p>

    <p>

    <strong>Embedded Resource Example:</strong>


    <pre><code class="lang-csharp">var rom = new SystemRomProvider("res:Pandowdy.EmuCore.Resources.a2e_enh_c-f.rom");</code></pre>

    </p>
  example: []
  syntax:
    content: public SystemRomProvider(string filename)
    parameters:
    - id: filename
      type: System.String
      description: >-
        Path to the ROM file or resource identifier. Must be exactly 16KB (16,384 bytes).

        Use "res:" prefix for embedded resources (e.g., "res:Pandowdy.EmuCore.Resources.a2e_enh_c-f.rom").
    content.vb: Public Sub New(filename As String)
