  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Services
  summary: Write operation - ROM is read-only, this is a no-op.
  remarks: >-
    ROM is read-only. Writes are silently ignored to maintain IMemory compatibility.

    In real hardware, ROM writes have no effect.
  example: []
