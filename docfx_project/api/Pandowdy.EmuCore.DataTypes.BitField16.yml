    startLine: 187
  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.DataTypes
  summary: Sets or clears a specific bit.
  remarks: >-
    <p>

    <strong>Algorithm:</strong>

    <ol><li>Validates index is in range 0-15</li><li>Creates a mask with only the target bit set: <code>1 &lt;&lt; index</code></li><li>If <code class="paramref">state</code> is true: performs OR to set bit: <code>_value |= mask</code></li><li>If <code class="paramref">state</code> is false: performs AND with inverted mask to clear bit: <code>_value &amp;= ~mask</code></li></ol>

    </p>

    <p>

    <strong>Bit Manipulation:</strong>

    <ul><li><strong>Set bit:</strong> OR operation (<code>|=</code>) turns on the target bit without affecting others</li><li><strong>Clear bit:</strong> AND with complement (<code>&amp;= ~mask</code>) turns off the target bit without affecting others</li></ul>

    </p>

    <p>

    <strong>Example:</strong>


    <pre><code class="lang-csharp">var bf = new BitField16 { Value = 0b0000_0000_0000_0000 };

    bf.SetBit(1, true);   // Value is now 0b0000_0000_0000_0010

    bf.SetBit(3, true);   // Value is now 0b0000_0000_0000_1010

    bf.SetBit(1, false);  // Value is now 0b0000_0000_0000_1000 (bit 1 cleared)</code></pre>

    </p>

    <p>

    <strong>Performance:</strong> Uses direct bit manipulation (shift, OR, AND) which

    compiles to a handful of CPU instructions. Highly efficient for managing packed flags.

    </p>
  example: []
  syntax:
    content: public void SetBit(int index, bool state)
    parameters:
    - id: index
      type: System.Int32
      description: The zero-based index of the bit to modify (0-15).
    - id: state
      type: System.Boolean
      description: <code>true</code> to set the bit to 1; <code>false</code> to clear the bit to 0.
    content.vb: Public Sub SetBit(index As Integer, state As Boolean)
  overload: Pandowdy.EmuCore.DataTypes.BitField16.SetBit*
  exceptions:
  - type: System.ArgumentOutOfRangeException
    commentId: T:System.ArgumentOutOfRangeException
    description: Thrown if <code class="paramref">index</code> is less than 0 or greater than 15.
  nameWithType.vb: BitField16.SetBit(Integer, Boolean)
  fullName.vb: Pandowdy.EmuCore.DataTypes.BitField16.SetBit(Integer, Boolean)
