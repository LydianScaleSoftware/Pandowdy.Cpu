  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.DataTypes
  summary: Gets the value of a specific bit.
  remarks: >-
    <p>

    <strong>Algorithm:</strong>

    <ol><li>Validates index is in range 0-15</li><li>Creates a mask with only the target bit set: <code>1 &lt;&lt; index</code></li><li>Performs bitwise AND with the value: <code>_value &amp; mask</code></li><li>Returns true if result is non-zero (bit is set)</li></ol>

    </p>

    <p>

    <strong>Example:</strong>


    <pre><code class="lang-csharp">var bf = new BitField16 { Value = 0b0000_0000_0000_1010 }; // bits 1 and 3 set

    bool bit1 = bf.GetBit(1);  // true  (bit 1 is set)

    bool bit2 = bf.GetBit(2);  // false (bit 2 is clear)

    bool bit3 = bf.GetBit(3);  // true  (bit 3 is set)</code></pre>

    </p>
  example: []
  syntax:
    content: public readonly bool GetBit(int index)
    parameters:
    - id: index
      type: System.Int32
      description: The zero-based index of the bit to retrieve (0-15).
    return:
      type: System.Boolean
      description: >-
        <code>true</code> if the bit at <code class="paramref">index</code> is set (1);

        <code>false</code> if the bit is clear (0).
    content.vb: Public Function GetBit(index As Integer) As Boolean
  overload: Pandowdy.EmuCore.DataTypes.BitField16.GetBit*
  exceptions:
  - type: System.ArgumentOutOfRangeException
    commentId: T:System.ArgumentOutOfRangeException
    description: Thrown if <code class="paramref">index</code> is less than 0 or greater than 15.
