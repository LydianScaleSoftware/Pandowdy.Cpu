  summary: Provides floating bus data for unmapped or undriven memory/I/O reads.
  remarks: >-
    <p>

    <strong>What is the Floating Bus?</strong>

    </p>

    <p>

    In real Apple II hardware, reading from unmapped memory addresses or undriven I/O locations

    does not return a fixed value like 0x00 or 0xFF. Instead, the data bus "floats" and returns

    the last value that was present on the bus from a previous access. This is typically the

    most recent memory read by either the CPU or the video scanner.

    </p>

    <p>

    <strong>Why It Matters for Emulation:</strong>

    </p>

    <ul><li><strong>Software Compatibility:</strong> Many Apple II programs rely on floating bus

    behavior for copy protection, hardware detection, and timing-sensitive operations.</li><li><strong>Video Effects:</strong> Some software reads video memory through the floating

    bus during display refresh cycles to create visual effects or save memory.</li><li><strong>Emulator Detection:</strong> Copy protection routines often test for floating

    bus behavior to distinguish real hardware from emulators that return zero.</li></ul>

    <p>

    <strong>Implementation Strategies:</strong>

    </p>

    <p>

    Different implementations can provide varying levels of accuracy:

    </p>

    <table><thead><tr><th class="term">Strategy</th><th class="description">Accuracy vs Performance</th></tr></thead><tbody><tr><td class="term">LastValueBus</td><td class="description">Tracks the last CPU read/write value. Fast, moderately accurate.</td></tr><tr><td class="term">VideoScannerBus</td><td class="description">Returns the value being scanned by the video circuitry based on cycle timing.

    Accurate but requires cycle-perfect emulation.</td></tr><tr><td class="term">ZeroBus</td><td class="description">Always returns 0x00. Fast but breaks compatibility with floating bus-dependent software.</td></tr><tr><td class="term">RandomBus</td><td class="description">Returns random values. Useful for testing robustness but not accurate.</td></tr></tbody></table>

    <p>

    <strong>Usage Example:</strong>

    </p>


    <pre><code class="lang-csharp">// In memory read logic:

    public byte Read(ushort address)

    {
        if (IsUnmappedAddress(address))
        {
            // Return floating bus value instead of 0
            return _floatingBusProvider.Read();
        }
        return _memory[address];
    }


    // In I/O space handler:

    public byte ReadIO(ushort address)

    {
        if (!HasIOHandler(address))
        {
            // Unhandled I/O returns floating bus
            return _floatingBusProvider.Read();
        }
        return IOHandlers[address].Read();
    }</code></pre>

    <p>

    <strong>Real-World Example: 80-Column Ghost Characters</strong>

    </p>

    <p>

    On an Apple IIe without an 80-column card, enabling 80-column mode causes characters to

    appear doubled (ghosted) because:

    <ol><li>Video scanner alternates reading main memory (even columns) and aux memory (odd columns)</li><li>Without aux memory installed, aux reads return the floating bus value</li><li>The floating bus contains the character just read from main memory</li><li>Result: Each character appears twice: <code>HELLO</code> becomes <code>HHEELLLLOO</code></li></ol>

    An emulator returning 0 for unmapped reads would show spaces instead of doubled characters,

    breaking visual compatibility.

    </p>

    <p>

    <strong>Thread Safety:</strong>

    </p>

    <p>

    Implementations are not required to be thread-safe. The emulator core should ensure

    single-threaded access, or provide synchronization at a higher level.

    </p>
