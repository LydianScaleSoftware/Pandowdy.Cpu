  namespace: Pandowdy.EmuCore.Interfaces
  summary: Called when the language card read enable state changes ($C080-$C08F).
  remarks: >-
    Controls whether reads from $D000-$FFFF access the language card RAM or the

    built-in ROM. When true, the selected bank ($D000-$DFFF) and upper 8KB

    ($E000-$FFFF) are read from RAM. When false, ROM is visible instead.

    Independent of write enable, allowing read-from-ROM, write-to-RAM configurations.
  example: []
  syntax:
    content: void SetHighRead(bool enabled)
    parameters:
    - id: enabled
      type: System.Boolean
      description: True to read from language card RAM; false to read from ROM
    content.vb: Sub SetHighRead(enabled As Boolean)
