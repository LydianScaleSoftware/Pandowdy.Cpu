  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Called when the PAGE2 soft switch is changed ($C054/$C055).
  remarks: >-
    Selects which video page is displayed. Page 1 uses $0400-$07FF (text) or

    $2000-$3FFF (hi-res). Page 2 uses $0800-$0BFF (text) or $4000-$5FFF (hi-res).

    Can be used for page flipping animation. Interaction with 80STORE affects

    whether page 2 uses main or auxiliary memory.
  example: []
  syntax:
    content: void SetPage2(bool page2)
    parameters:
    - id: page2
      type: System.Boolean
      description: True for page 2; false for page 1
    content.vb: Sub SetPage2(page2 As Boolean)
