  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Called when the language card bank selection changes ($C080-$C08F).
  remarks: >-
    The language card provides two 4KB RAM banks that can be mapped into the

    $D000-$DFFF address space. Bank 1 is physically located at $C000-$CFFF,

    while bank 2 is at $D000-$DFFF. This is often confusing because bank 1's

    physical location overlaps with I/O space in the address map.
  example: []
  syntax:
    content: void SetBank1(bool enabled)
    parameters:
    - id: enabled
      type: System.Boolean
      description: True for bank 1 (D000-DFFF physical at C000); false for bank 2 (at D000)
    content.vb: Sub SetBank1(enabled As Boolean)
