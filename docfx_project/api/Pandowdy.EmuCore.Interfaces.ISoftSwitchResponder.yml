  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Called when the RAMRD soft switch is changed ($C002/$C003).
  remarks: >-
    Controls which 64KB bank (main or auxiliary) is read from for memory accesses.

    This affects most memory regions except those controlled by other soft switches

    (like 80STORE for video pages). Used for accessing the extended 128KB memory space.
  example: []
  syntax:
    content: void SetRamRd(bool ramRd)
    parameters:
    - id: ramRd
      type: System.Boolean
      description: True to read from auxiliary memory; false to read from main memory
    content.vb: Sub SetRamRd(ramRd As Boolean)
