  summary: Called when the 80VID soft switch is changed ($C00C/$C00D).
  remarks: >-
    Enables 80-column text mode, which uses both main and auxiliary memory to display

    80 characters per line (alternating bytes from main and aux memory). When false,

    standard 40-column text mode is used.
  example: []
  syntax:
    content: void Set80Vid(bool vid)
    parameters:
    - id: vid
      type: System.Boolean
      description: True for 80-column mode; false for 40-column mode
