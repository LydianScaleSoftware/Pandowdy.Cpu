  summary: Called when the language card write enable state changes ($C080-$C08F).
  remarks: >-
    Controls whether writes to the $D000-$FFFF range modify the language card RAM

    or are ignored. Write protection is engaged through a two-access sequence to

    prevent accidental modification of critical code. When false, writes to this

    region have no effect (ROM remains visible during reads).
  example: []
  syntax:
    content: void SetHighWrite(bool enabled)
    parameters:
    - id: enabled
      type: System.Boolean
      description: True if writing to language card RAM is enabled; false if write-protected
    content.vb: Sub SetHighWrite(enabled As Boolean)
