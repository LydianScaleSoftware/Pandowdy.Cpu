  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Called when the 80STORE soft switch is changed ($C000/$C001).
  remarks: >-
    When enabled, page 2 memory ($0800-$0BFF for text, $2000-$3FFF for hi-res)

    is redirected to auxiliary memory when PAGE2 is set. This is used for 80-column

    text mode and double hi-res graphics to provide independent main and aux video pages.
  example: []
  syntax:
    content: void Set80Store(bool store80)
    parameters:
    - id: store80
      type: System.Boolean
      description: True if 80STORE is enabled; false if disabled
    content.vb: Sub Set80Store(store80 As Boolean)
