  assemblies:
  - Pandowdy.EmuCore
  namespace: Pandowdy.EmuCore.Interfaces
  summary: Called when the ALTZP soft switch is changed ($C008/$C009).
  remarks: >-
    Controls whether zero page ($0000-$00FF) and stack ($0100-$01FF) access main

    or auxiliary memory. When true, these critical CPU regions use auxiliary memory,

    allowing programs to maintain separate zero page and stack contexts.
  example: []
  syntax:
    content: void SetAltZp(bool altZp)
    parameters:
    - id: altZp
      type: System.Boolean
      description: True to use auxiliary zero page/stack; false for main
    content.vb: Sub SetAltZp(altZp As Boolean)
